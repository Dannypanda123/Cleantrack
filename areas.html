<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanTrack — Edificios y áreas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    :root {
      --verde: #798C81; --verde-claro: #EAEEEB; --verde-texto: #5F7268;
      --azul: #798C81; --azul-claro: #EAEEEB;
      --gris-fondo: #F5F4EF; --gris-texto: #6B6A64; --gris-borde: #E2E0D8;
      --texto: #2C2C2A; --blanco: #FFFFFF; --rojo: #A32D2D; --rojo-claro: #FCEBEB;
      --ambar-claro: #FAEEDA;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--gris-fondo); color: var(--texto); min-height: 100vh; padding: 20px; }
    .contenedor { max-width: 600px; margin: 0 auto; display: none; }
    .verificando { max-width: 600px; margin: 60px auto; text-align: center; color: var(--gris-texto); font-size: 15px; }

    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .top .marca { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gris-texto); font-weight: 600; }
    .top h1 { font-size: 22px; font-weight: 600; margin-top: 2px; }
    .top-botones { display: flex; gap: 8px; }
    .btn-salir { background: transparent; color: var(--gris-texto); border: 1.5px solid var(--gris-borde); padding: 10px 16px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }

    .acciones { display: flex; gap: 12px; margin-bottom: 22px; }
    .btn-accion { flex: 1; padding: 16px; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.08s; }
    .btn-accion:active { transform: scale(0.98); }
    .btn-edificio { background: #3C993C; color: #fff; box-shadow: 0 4px 12px rgba(60,153,60,0.3); }
    .btn-area { background: #3C993C; color: #fff; box-shadow: 0 4px 12px rgba(60,153,60,0.3); }
    @media (max-width: 460px) { .acciones { flex-direction: column; } }

    .tarjeta { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    .tarjeta h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .tarjeta .sub { font-size: 13px; color: var(--gris-texto); margin-bottom: 16px; }

    .area-item { padding: 16px 0; border-bottom: 1px solid var(--gris-borde); }
    .area-item:last-child { border-bottom: none; }
    .area-fila { display: flex; align-items: center; gap: 14px; }
    .area-ico { width: 42px; height: 42px; border-radius: 12px; background: var(--verde-claro); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .area-ico svg { width: 21px; height: 21px; stroke: #5F7268; }
    .area-info { flex: 1; min-width: 0; }
    .area-nombre { font-size: 15px; font-weight: 600; }
    .area-detalle { font-size: 13px; color: var(--gris-texto); }
    .area-inactiva .area-nombre, .area-inactiva .area-detalle { opacity: 0.45; }

    .switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; cursor: pointer; }
    .switch input { display: none; }
    .switch-track { position: absolute; inset: 0; background: #D3D1C7; border-radius: 99px; transition: background 0.28s cubic-bezier(0.34,1.56,0.64,1); }
    .switch input:checked + .switch-track { background: #1D9E75; }
    .switch-thumb { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; box-shadow: 0 1px 4px rgba(0,0,0,0.28); transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1); }
    .switch input:checked ~ .switch-thumb { transform: translateX(18px); }
    .switch:active .switch-thumb { width: 21px; }

    .btn-qr-mini { width: 34px; height: 34px; border-radius: 9px; border: 1.5px solid var(--gris-borde); background: var(--blanco); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; flex-shrink: 0; }
    .btn-qr-mini svg { width: 17px; height: 17px; stroke: #185FA5; }
    .btn-qr-mini:active { transform: scale(0.92); }
    .btn-icono.imprimir-qr svg { stroke: #185FA5; }

    .cargando { text-align: center; color: var(--gris-texto); padding: 20px; font-size: 14px; }

    /* ACORDEÓN DE EDIFICIOS */
    .grupo-edificio { border: 1px solid var(--gris-borde); border-radius: 14px; margin-bottom: 12px; overflow: hidden; background: var(--blanco); }
    .grupo-cabecera { display: flex; align-items: center; gap: 12px; padding: 16px; cursor: pointer; user-select: none; transition: background 0.15s; }
    .grupo-cabecera:hover { background: var(--gris-fondo); }
    .grupo-ico { width: 40px; height: 40px; border-radius: 10px; background: var(--verde-claro); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .grupo-ico svg { width: 20px; height: 20px; stroke: #5F7268; }
    .grupo-info { flex: 1; min-width: 0; }
    .grupo-nombre { font-size: 15px; font-weight: 600; }
    .grupo-conteo { font-size: 12px; color: var(--gris-texto); margin-top: 2px; }
    .grupo-flecha { font-size: 14px; color: var(--gris-texto); transition: transform 0.2s; flex-shrink: 0; cursor: pointer; }
    .grupo-edificio.abierto .grupo-flecha { transform: rotate(90deg); }
    .grupo-cuerpo { display: none; padding: 0 16px 8px; border-top: 1px solid var(--gris-borde); }
    .grupo-edificio.abierto .grupo-cuerpo { display: block; }
    .grupo-cabecera { cursor: default; }
    .grupo-ico, .grupo-info { cursor: pointer; }
    .grupo-acciones { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .btn-icono { width: 34px; height: 34px; border-radius: 9px; border: 1.5px solid var(--gris-borde); background: var(--blanco); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
    .btn-icono svg { width: 16px; height: 16px; stroke: var(--gris-verde-900, #5F7268); }
    .btn-icono:active { transform: scale(0.92); }
    .edificio-inactivo .grupo-nombre, .edificio-inactivo .grupo-conteo { opacity: 0.5; }
    .sin-areas { font-size: 13px; color: var(--gris-texto); padding: 14px 4px; font-style: italic; }

    /* MODALES */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
    .modal.abierto { display: flex; }
    .modal-caja { background: #fff; border-radius: 18px; padding: 26px; max-width: 440px; width: 100%; margin: auto; }
    .modal-titulo { font-size: 18px; font-weight: 600; margin-bottom: 18px; }

    label { display: block; font-size: 13px; font-weight: 600; color: var(--gris-texto); margin-bottom: 6px; }
    input, select, textarea { width: 100%; padding: 13px; font-size: 16px; border: 1.5px solid var(--gris-borde); border-radius: 12px; margin-bottom: 14px; outline: none; background: var(--blanco); color: var(--texto); font-family: inherit; }
    input:focus, select:focus, textarea:focus { border-color: var(--azul); }
    textarea { resize: vertical; min-height: 70px; }

    .checkbox-fila { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .checkbox-fila input { width: auto; margin: 0; }
    .checkbox-fila label { margin: 0; font-weight: 400; color: var(--texto); font-size: 14px; }

    .modal-botones { display: flex; gap: 10px; margin-top: 6px; }
    .btn-guardar { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; color: #fff; }
    .btn-guardar.azul { background: #3C993C; }
    .btn-guardar.verde { background: #3C993C; }
    .btn-guardar:disabled { opacity: 0.6; }
    .btn-cancelar { flex: 0 0 auto; padding: 14px 20px; border: 1.5px solid var(--gris-borde); border-radius: 12px; background: transparent; color: var(--gris-texto); font-size: 15px; font-weight: 600; cursor: pointer; }

    .mensaje { text-align: center; font-size: 13px; margin-top: 12px; padding: 10px; border-radius: 10px; display: none; }
    .mensaje.ok { background: var(--verde-claro); color: var(--verde-texto); display: block; }
    .mensaje.error { background: var(--rojo-claro); color: var(--rojo); display: block; }

    /* Modal QR */
    .modal-qr-caja { background: #fff; border-radius: 18px; padding: 24px; max-width: 320px; width: 100%; text-align: center; margin: auto; }
    .qr-ref-area { font-size: 13px; color: var(--gris-texto); margin-bottom: 14px; font-weight: 500; }
    .tarjeta-preview { border: 1px dashed #C0BEB6; border-radius: 14px; padding: 20px 18px; text-align: center; margin-bottom: 18px; }
    .tarjeta-preview .tp-marca { text-align: center; margin-bottom: 12px; }
    .tarjeta-preview .tp-ini { display: inline-block; width: 26px; height: 26px; border-radius: 7px; background: #185FA5; color: #fff; font-weight: 700; font-size: 11px; line-height: 26px; vertical-align: middle; }
    .tarjeta-preview .tp-nom { font-size: 12px; font-weight: 600; color: var(--texto); vertical-align: middle; margin-left: 7px; }
    #qr-canvas { display: flex; justify-content: center; margin: 0 auto; }
    #qr-canvas img, #qr-canvas canvas { width: 100% !important; height: auto !important; max-width: 200px; }
    .tarjeta-preview .tp-mensaje { font-family: 'Fraunces', Georgia, serif; font-style: italic; font-weight: 500; font-size: 15px; color: var(--texto); margin-top: 12px; line-height: 1.28; }
    .tarjeta-preview .tp-pie { font-size: 9px; color: #C0BEB6; margin-top: 11px; border-top: 0.5px solid #EFEEE8; padding-top: 7px; letter-spacing: 0.03em; }
  </style>
</head>
<body>

  <div class="verificando" id="verificando">Verificando sesión...</div>

  <div class="contenedor" id="contenedor">

    <div class="top">
      <div>
        <div class="marca">CleanTrack</div>
        <h1>Edificios y áreas</h1>
      </div>
      <div class="top-botones">
        <a class="btn-salir" href="inicio.html">← Inicio</a>
        <button class="btn-salir" onclick="salir()">Salir</button>
      </div>
    </div>

    <div class="acciones">
      <button class="btn-accion btn-edificio" onclick="abrirModalEdificio()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><path d="M3 21h18"></path><path d="M5 21V7l8-4v18"></path><path d="M19 21V11l-6-4"></path></svg> Crear edificio</button>
      <button class="btn-accion btn-area" onclick="abrirModalArea()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg> Crear área</button>
    </div>

    <div class="tarjeta">
      <h2>Edificios y sus áreas</h2>
      <div class="sub">Cada edificio con sus áreas. Toca "Generar código QR" para descargar el QR de cada área.</div>
      <div id="lista-areas"><div class="cargando">Cargando...</div></div>
    </div>

  </div>

  <!-- MODAL CREAR EDIFICIO -->
  <div class="modal" id="modal-edificio">
    <div class="modal-caja">
      <div class="modal-titulo">Crear edificio</div>
      <label>Nombre del edificio *</label>
      <input type="text" id="e-nombre" placeholder="Ej. Marbella I" />
      <label>Dirección</label>
      <input type="text" id="e-direccion" placeholder="Ej. Av. Principal 123" />
      <label>Persona de contacto</label>
      <input type="text" id="e-contacto" placeholder="Ej. Sr. Pérez (administrador)" />
      <label>Teléfono</label>
      <input type="text" id="e-telefono" placeholder="Ej. 555-1234" inputmode="tel" />
      <label>Email</label>
      <input type="email" id="e-email" placeholder="Ej. admin@marbella.com" />
      <label>Número de pisos</label>
      <input type="text" id="e-pisos" placeholder="Ej. 12" />
      <label>Notas</label>
      <textarea id="e-notas" placeholder="Ej. Acceso por puerta trasera después de las 8pm"></textarea>
      <div class="mensaje" id="mensaje-edificio"></div>
      <div class="modal-botones">
        <button class="btn-cancelar" onclick="cerrar('modal-edificio')">Cancelar</button>
        <button class="btn-guardar azul" id="btn-guardar-edificio" onclick="guardarEdificio()">Guardar edificio</button>
      </div>
    </div>
  </div>

  <!-- MODAL EDITAR EDIFICIO -->
  <div class="modal" id="modal-editar-edificio">
    <div class="modal-caja">
      <div class="modal-titulo">Editar edificio</div>
      <label>Nombre del edificio *</label>
      <input type="text" id="ee-nombre" />
      <label>Dirección</label>
      <input type="text" id="ee-direccion" />
      <label>Persona de contacto</label>
      <input type="text" id="ee-contacto" />
      <label>Teléfono</label>
      <input type="text" id="ee-telefono" inputmode="tel" />
      <label>Email</label>
      <input type="email" id="ee-email" />
      <label>Número de pisos</label>
      <input type="text" id="ee-pisos" />
      <label>Notas</label>
      <textarea id="ee-notas"></textarea>
      <div class="mensaje" id="mensaje-editar-edificio"></div>
      <div class="modal-botones">
        <button class="btn-cancelar" onclick="cerrar('modal-editar-edificio')">Cancelar</button>
        <button class="btn-guardar azul" id="btn-guardar-editar-edificio" onclick="guardarEdicionEdificio()">Guardar cambios</button>
      </div>
    </div>
  </div>

  <!-- MODAL CREAR ÁREA -->
  <div class="modal" id="modal-area">
    <div class="modal-caja">
      <div class="modal-titulo">Crear área</div>
      <label>Nombre del área *</label>
      <input type="text" id="a-nombre" placeholder="Ej. Baño Piso 3 — Hombres" />
      <label>Edificio *</label>
      <select id="a-edificio">
        <option value="">Selecciona un edificio...</option>
      </select>
      <div class="checkbox-fila">
        <input type="checkbox" id="a-requiere-foto" />
        <label for="a-requiere-foto">Esta área siempre requiere foto</label>
      </div>
      <div class="mensaje" id="mensaje-area"></div>
      <div class="modal-botones">
        <button class="btn-cancelar" onclick="cerrar('modal-area')">Cancelar</button>
        <button class="btn-guardar verde" id="btn-guardar-area" onclick="guardarArea()">Crear área</button>
      </div>
    </div>
  </div>

  <!-- MODAL QR -->
  <div class="modal" id="modal-qr">
    <div class="modal-qr-caja">
      <div class="qr-ref-area" id="qr-ref-area">Área</div>
      <div class="tarjeta-preview" id="tarjeta-preview">
        <div class="tp-marca"><span class="tp-ini" id="tp-ini">CT</span><span class="tp-nom" id="tp-nom">Empresa</span></div>
        <div id="qr-canvas"></div>
        <div class="tp-mensaje">This space is cleaned &amp; verified</div>
        <div class="tp-pie">Powered by CleanTrack</div>
      </div>
      <div class="modal-botones">
        <button class="btn-cancelar" onclick="cerrar('modal-qr')">Cerrar</button>
        <button class="btn-guardar verde" onclick="imprimirUnaTarjeta()">Imprimir tarjeta</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://saoirivninhucrkhckaj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_DeKuX1LvrvruEXzfPvumnw_g5N1Jw4k";
    const BASE_URL = "https://cleantrack-app.com";

    let db = null;
    try {
      const { createClient } = supabase;
      db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) { console.error(e); }

    var nombreAreaActual = "";

    async function verificarAcceso() {
      if (!db) { document.getElementById("verificando").textContent = "Sin conexión."; return; }
      const { data } = await db.auth.getSession();
      if (!data.session) { window.location.href = "login.html"; return; }
      document.getElementById("verificando").style.display = "none";
      document.getElementById("contenedor").style.display = "block";
      cargarAreas();
    }

    async function salir() {
      if (db) await db.auth.signOut();
      window.location.href = "login.html";
    }

    function cerrar(idModal) {
      document.getElementById(idModal).classList.remove("abierto");
    }

    // ===== MODAL EDIFICIO =====
    function abrirModalEdificio() {
      document.getElementById("mensaje-edificio").className = "mensaje";
      document.getElementById("modal-edificio").classList.add("abierto");
    }

    async function guardarEdificio() {
      var nombre = document.getElementById("e-nombre").value.trim();
      var msg = document.getElementById("mensaje-edificio");
      if (!nombre) { msg.textContent = "El nombre del edificio es obligatorio."; msg.className = "mensaje error"; return; }

      document.getElementById("btn-guardar-edificio").disabled = true;
      msg.textContent = "Guardando..."; msg.className = "mensaje"; msg.style.display = "block";

      const { error } = await db.from("edificios").insert([{
        nombre: nombre,
        direccion: document.getElementById("e-direccion").value.trim(),
        contacto: document.getElementById("e-contacto").value.trim(),
        telefono: document.getElementById("e-telefono").value.trim(),
        email: document.getElementById("e-email").value.trim(),
        pisos: document.getElementById("e-pisos").value.trim(),
        notas: document.getElementById("e-notas").value.trim(),
        activo: true
      }]);

      document.getElementById("btn-guardar-edificio").disabled = false;

      if (error) {
        msg.textContent = "Error: " + error.message; msg.className = "mensaje error";
      } else {
        msg.textContent = "✓ Edificio creado"; msg.className = "mensaje ok";
        // Limpiar campos
        ["e-nombre","e-direccion","e-contacto","e-telefono","e-email","e-pisos","e-notas"].forEach(function(id){ document.getElementById(id).value = ""; });
        setTimeout(function(){ cerrar("modal-edificio"); }, 800);
      }
    }

    // ===== MODAL ÁREA =====
    async function abrirModalArea() {
      document.getElementById("mensaje-area").className = "mensaje";
      // Cargar edificios en el desplegable
      var select = document.getElementById("a-edificio");
      select.innerHTML = '<option value="">Cargando edificios...</option>';
      const { data, error } = await db.from("edificios").select("*").eq("activo", true).order("nombre", { ascending: true });
      select.innerHTML = '<option value="">Selecciona un edificio...</option>';
      if (!error && data) {
        data.forEach(function(e){
          var opt = document.createElement("option");
          opt.value = e.nombre; opt.textContent = e.nombre;
          select.appendChild(opt);
        });
        if (data.length === 0) {
          select.innerHTML = '<option value="">Primero crea un edificio</option>';
        }
      }
      document.getElementById("modal-area").classList.add("abierto");
    }

    async function guardarArea() {
      var nombre = document.getElementById("a-nombre").value.trim();
      var edificio = document.getElementById("a-edificio").value;
      var requiereFoto = document.getElementById("a-requiere-foto").checked;
      var msg = document.getElementById("mensaje-area");

      if (!nombre) { msg.textContent = "Escribe el nombre del área."; msg.className = "mensaje error"; return; }
      if (!edificio) { msg.textContent = "Selecciona un edificio."; msg.className = "mensaje error"; return; }

      document.getElementById("btn-guardar-area").disabled = true;
      msg.textContent = "Creando..."; msg.className = "mensaje"; msg.style.display = "block";

      const { error } = await db.from("areas").insert([{ nombre: nombre, edificio: edificio, requiere_foto: requiereFoto, activa: true }]);
      document.getElementById("btn-guardar-area").disabled = false;

      if (error) {
        msg.textContent = "Error: " + error.message; msg.className = "mensaje error";
      } else {
        msg.textContent = "✓ Área creada"; msg.className = "mensaje ok";
        document.getElementById("a-nombre").value = "";
        document.getElementById("a-edificio").value = "";
        document.getElementById("a-requiere-foto").checked = false;
        cargarAreas();
        setTimeout(function(){ cerrar("modal-area"); }, 800);
      }
    }

    // ===== LISTA DE EDIFICIOS (todos) CON SUS ÁREAS =====
    var edificiosCache = [];
    var todasLasAreas = [];
    var nombreCompania = "";

    // Cargar el nombre de la compañía (para las iniciales en los QR)
    async function cargarNombreCompania() {
      try {
        var res = await db.from("companias").select("nombre").limit(1);
        if (res.data && res.data.length > 0 && res.data[0].nombre) {
          nombreCompania = res.data[0].nombre;
        }
      } catch (e) { /* si falla, se queda vacío y usamos un fallback */ }
    }

    // Generar iniciales a partir del nombre de la empresa (máx 2 letras)
    function inicialesDe(nombre) {
      if (!nombre) return "CT";
      var palabras = nombre.trim().split(/\s+/).filter(function(p){ return p.length > 0 && !/^(s\.?a\.?|s\.?a\.?s\.?|ltda\.?|inc\.?|llc\.?|de|del|la|el|y|&)$/i.test(p); });
      if (palabras.length === 0) palabras = nombre.trim().split(/\s+/);
      if (palabras.length === 1) return palabras[0].substring(0, 2).toUpperCase();
      return (palabras[0][0] + palabras[1][0]).toUpperCase();
    }

    async function cargarAreas() {
      var cont = document.getElementById("lista-areas");
      cont.innerHTML = '<div class="cargando">Cargando...</div>';

      // Traer edificios y áreas en paralelo
      var resEd = await db.from("edificios").select("*").order("nombre", { ascending: true });
      var resAr = await db.from("areas").select("*").order("created_at", { ascending: true });
      if (!nombreCompania) { await cargarNombreCompania(); }

      if (resEd.error) { cont.innerHTML = '<div class="mensaje error" style="display:block">Error: ' + resEd.error.message + '</div>'; return; }

      var edificios = resEd.data || [];
      var areas = resAr.data || [];
      edificiosCache = edificios;
      todasLasAreas = areas;

      if (edificios.length === 0) {
        cont.innerHTML = '<div class="cargando">Aún no hay edificios. Crea el primero con el botón de arriba.</div>';
        return;
      }

      // Agrupar áreas por nombre de edificio
      var areasPorEdificio = {};
      areas.forEach(function(a){
        var ed = a.edificio || "Sin edificio";
        if (!areasPorEdificio[ed]) areasPorEdificio[ed] = [];
        areasPorEdificio[ed].push(a);
      });

      cont.innerHTML = "";
      edificios.forEach(function(edi, idx) {
        var nombreEd = edi.nombre;
        var areasEd = areasPorEdificio[nombreEd] || [];
        var activas = areasEd.filter(function(a){ return a.activa; }).length;

        // Áreas internas
        var areasHTML = "";
        if (areasEd.length === 0) {
          areasHTML = '<div class="sin-areas">Este edificio aún no tiene áreas. Usa "Crear área" para agregar la primera.</div>';
        } else {
          areasEd.forEach(function(a){
            areasHTML +=
              '<div class="area-item' + (a.activa ? "" : " area-inactiva") + '">' +
                '<div class="area-fila">' +
                  '<div class="area-ico"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg></div>' +
                  '<div class="area-info">' +
                    '<div class="area-nombre">' + a.nombre + '</div>' +
                    '<div class="area-detalle">' + (a.requiere_foto ? 'Requiere foto · ' : '') + (a.activa ? 'Activa' : 'Inactiva') + '</div>' +
                  '</div>' +
                  '<button class="btn-qr-mini" title="Código QR de esta área" onclick="mostrarQR(' + a.id + ', \'' + a.nombre.replace(/'/g, "\\'") + '\', \'' + nombreEd.replace(/'/g, "\\'") + '\')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><line x1="14" y1="14" x2="14" y2="14.01"></line><line x1="21" y1="14" x2="21" y2="14.01"></line><line x1="14" y1="21" x2="21" y2="21"></line></svg></button>' +
                  '<label class="switch">' +
                    '<input type="checkbox" ' + (a.activa ? "checked" : "") + ' onchange="cambiarEstadoArea(' + a.id + ', this.checked)" />' +
                    '<span class="switch-track"></span><span class="switch-thumb"></span>' +
                  '</label>' +
                '</div>' +
              '</div>';
          });
        }

        var claseAbierto = idx === 0 ? " abierto" : "";
        var claseInactivo = edi.activo ? "" : " edificio-inactivo";
        var estadoTexto = edi.activo ? "" : " · Inactivo";

        var grupo = document.createElement("div");
        grupo.className = "grupo-edificio" + claseAbierto + claseInactivo;
        grupo.innerHTML =
          '<div class="grupo-cabecera">' +
            '<div class="grupo-ico" onclick="toggleGrupo(this)"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"></path><path d="M5 21V7l8-4v18"></path><path d="M19 21V11l-6-4"></path></svg></div>' +
            '<div class="grupo-info" onclick="toggleGrupo(this)">' +
              '<div class="grupo-nombre">' + nombreEd + estadoTexto + '</div>' +
              '<div class="grupo-conteo">' + areasEd.length + ' área' + (areasEd.length !== 1 ? 's' : '') + ' · ' + activas + ' activa' + (activas !== 1 ? 's' : '') + '</div>' +
            '</div>' +
            '<div class="grupo-acciones">' +
              '<button class="btn-icono imprimir-qr" title="Imprimir códigos QR del edificio" onclick="imprimirQRedificio(' + edi.id + ', \'' + nombreEd.replace(/'/g, "\\'") + '\')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg></button>' +
              '<button class="btn-icono editar" title="Editar edificio" onclick="abrirEditarEdificio(' + edi.id + ')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"></path></svg></button>' +
              '<label class="switch" title="Activar/desactivar edificio">' +
                '<input type="checkbox" ' + (edi.activo ? "checked" : "") + ' onchange="cambiarEstadoEdificio(' + edi.id + ', this.checked)" />' +
                '<span class="switch-track"></span><span class="switch-thumb"></span>' +
              '</label>' +
              '<div class="grupo-flecha" onclick="toggleGrupo(this)">▶</div>' +
            '</div>' +
          '</div>' +
          '<div class="grupo-cuerpo">' + areasHTML + '</div>';
        cont.appendChild(grupo);
      });
    }

    function toggleGrupo(el) {
      var grupo = el.closest(".grupo-edificio");
      grupo.classList.toggle("abierto");
    }

    async function cambiarEstadoArea(id, nuevoEstado) {
      const { error } = await db.from("areas").update({ activa: nuevoEstado }).eq("id", id);
      if (error) alert("No se pudo cambiar: " + error.message);
      cargarAreas();
    }

    async function cambiarEstadoEdificio(id, nuevoEstado) {
      // Buscar el edificio para conocer su nombre (las áreas se relacionan por nombre de edificio)
      var edi = edificiosCache.find(function(e){ return e.id === id; });

      const { error } = await db.from("edificios").update({ activo: nuevoEstado }).eq("id", id);
      if (error) { alert("No se pudo cambiar: " + error.message); return; }

      // Si se DESACTIVA el edificio, desactivar también todas sus áreas
      // (al reactivar el edificio, las áreas NO se reactivan solas: las activa el usuario)
      if (nuevoEstado === false && edi) {
        const { error: errAreas } = await db.from("areas").update({ activa: false }).eq("edificio", edi.nombre);
        if (errAreas) alert("El edificio se desactivó, pero hubo un problema al desactivar sus áreas: " + errAreas.message);
      }

      cargarAreas();
    }

    // ===== EDITAR EDIFICIO =====
    function abrirEditarEdificio(id) {
      var edi = edificiosCache.find(function(e){ return e.id === id; });
      if (!edi) return;
      editandoEdificioId = id;
      document.getElementById("ee-nombre").value = edi.nombre || "";
      document.getElementById("ee-direccion").value = edi.direccion || "";
      document.getElementById("ee-contacto").value = edi.contacto || "";
      document.getElementById("ee-telefono").value = edi.telefono || "";
      document.getElementById("ee-email").value = edi.email || "";
      document.getElementById("ee-pisos").value = edi.pisos || "";
      document.getElementById("ee-notas").value = edi.notas || "";
      document.getElementById("mensaje-editar-edificio").className = "mensaje";
      document.getElementById("modal-editar-edificio").classList.add("abierto");
    }

    var editandoEdificioId = null;

    async function guardarEdicionEdificio() {
      var nombre = document.getElementById("ee-nombre").value.trim();
      var msg = document.getElementById("mensaje-editar-edificio");
      if (!nombre) { msg.textContent = "El nombre del edificio es obligatorio."; msg.className = "mensaje error"; return; }

      document.getElementById("btn-guardar-editar-edificio").disabled = true;
      msg.textContent = "Guardando..."; msg.className = "mensaje"; msg.style.display = "block";

      const { error } = await db.from("edificios").update({
        nombre: nombre,
        direccion: document.getElementById("ee-direccion").value.trim(),
        contacto: document.getElementById("ee-contacto").value.trim(),
        telefono: document.getElementById("ee-telefono").value.trim(),
        email: document.getElementById("ee-email").value.trim(),
        pisos: document.getElementById("ee-pisos").value.trim(),
        notas: document.getElementById("ee-notas").value.trim()
      }).eq("id", editandoEdificioId);

      document.getElementById("btn-guardar-editar-edificio").disabled = false;
      if (error) {
        msg.textContent = "Error: " + error.message; msg.className = "mensaje error";
      } else {
        cerrar("modal-editar-edificio");
        cargarAreas();
      }
    }

    // ===== QR individual =====
    var areaActualId = null;
    function mostrarQR(id, nombre, edificio) {
      areaActualId = id;
      nombreAreaActual = nombre;
      var empresa = nombreCompania || "CleanTrack";
      var ini = inicialesDe(empresa);
      document.getElementById("qr-ref-area").textContent = "↳ " + nombre;
      document.getElementById("tp-ini").textContent = ini;
      document.getElementById("tp-nom").textContent = empresa;
      var cont = document.getElementById("qr-canvas");
      cont.innerHTML = "";
      new QRCode(cont, { text: BASE_URL + "/Empleado.html?area=" + id, width: 240, height: 240, colorDark: "#185FA5", colorLight: "#ffffff" });
      document.getElementById("modal-qr").classList.add("abierto");
    }

    // Imprimir UNA sola tarjeta, con el mismo diseño bonito que la hoja
    function imprimirUnaTarjeta() {
      var img = document.querySelector("#qr-canvas img") || document.querySelector("#qr-canvas canvas");
      if (!img) { alert("Espera a que el QR cargue."); return; }
      var src = img.tagName === "IMG" ? img.src : img.toDataURL("image/png");
      var empresa = nombreCompania || "CleanTrack";
      var ini = inicialesDe(empresa);
      function escapar(t){ return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

      var html =
        '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>QR — ' + escapar(nombreAreaActual) + '</title>' +
        '<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500&display=swap" rel="stylesheet">' +
        '<style>' +
        '* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }' +
        'body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }' +
        '.ref { font-size: 11px; color: #B0AEA6; font-style: italic; text-align: center; margin-bottom: 8px; }' +
        '.tarjeta { border: 1px dashed #C0BEB6; border-radius: 16px; padding: 26px 22px; text-align: center; width: 300px; }' +
        '.marca-cliente { text-align: center; margin-bottom: 16px; }' +
        '.marca-cliente .ini { display: inline-block; width: 30px; height: 30px; border-radius: 8px; background: #185FA5; color: #fff; font-weight: 700; font-size: 13px; line-height: 30px; vertical-align: middle; }' +
        '.marca-cliente .nom-cliente { font-size: 13px; font-weight: 600; color: #1F2A37; vertical-align: middle; margin-left: 8px; }' +
        '.tarjeta img { width: 100%; height: auto; display: block; }' +
        '.mensaje { font-family: "Fraunces", Georgia, serif; font-style: italic; font-weight: 500; font-size: 17px; color: #1F2A37; margin-top: 14px; line-height: 1.28; }' +
        '.pie { font-size: 9px; color: #C0BEB6; margin-top: 13px; border-top: 0.5px solid #EFEEE8; padding-top: 8px; letter-spacing: 0.03em; }' +
        '@media print { body { padding: 0; } }' +
        '</style></head><body>' +
        '<div>' +
          '<div class="ref">&#8627; ' + escapar(nombreAreaActual) + '</div>' +
          '<div class="tarjeta">' +
            '<div class="marca-cliente"><span class="ini">' + escapar(ini) + '</span><span class="nom-cliente">' + escapar(empresa) + '</span></div>' +
            '<img src="' + src + '" />' +
            '<div class="mensaje">This space is cleaned &amp; verified</div>' +
            '<div class="pie">Powered by CleanTrack</div>' +
          '</div>' +
        '</div>' +
        '</body></html>';

      var ventana = window.open("", "_blank");
      ventana.document.write(html);
      ventana.document.close();
      setTimeout(function(){ ventana.focus(); ventana.print(); }, 450);
    }

    // ===== Imprimir TODOS los QR de un edificio =====
    function imprimirQRedificio(edificioId, nombreEd) {
      var areasEd = todasLasAreas.filter(function(a){ return a.edificio === nombreEd; });
      if (areasEd.length === 0) { alert("Este edificio no tiene áreas para generar códigos."); return; }

      var empresa = nombreCompania || "CleanTrack";
      var ini = inicialesDe(empresa);

      // Generar cada QR como imagen en un contenedor temporal oculto
      var temp = document.createElement("div");
      temp.style.position = "absolute"; temp.style.left = "-9999px";
      document.body.appendChild(temp);

      var imagenes = [];
      areasEd.forEach(function(a){
        var div = document.createElement("div");
        temp.appendChild(div);
        new QRCode(div, { text: BASE_URL + "/Empleado.html?area=" + a.id, width: 240, height: 240, colorDark: "#185FA5", colorLight: "#ffffff" });
        imagenes.push({ div: div, nombre: a.nombre });
      });

      // Esperar a que los QR se rendericen, luego construir la hoja
      setTimeout(function(){
        function escapar(t){ return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
        var celdas = [];
        imagenes.forEach(function(item){
          var img = item.div.querySelector("img") || item.div.querySelector("canvas");
          var src = img ? (img.tagName === "IMG" ? img.src : img.toDataURL("image/png")) : "";
          celdas.push(
            '<div class="ref">&#8627; ' + escapar(item.nombre) + '</div>' +
            '<div class="tarjeta">' +
              '<div class="marca-cliente"><span class="ini">' + escapar(ini) + '</span><span class="nom-cliente">' + escapar(empresa) + '</span></div>' +
              '<img src="' + src + '" />' +
              '<div class="mensaje">This space is cleaned &amp; verified</div>' +
              '<div class="pie">Powered by CleanTrack</div>' +
            '</div>'
          );
        });
        // Armar filas de 3 columnas con tabla (compatible con todos los navegadores al imprimir)
        var tarjetas = "";
        for (var i = 0; i < celdas.length; i += 3) {
          tarjetas += '<tr>' +
            '<td>' + (celdas[i] || "") + '</td>' +
            '<td>' + (celdas[i+1] || "") + '</td>' +
            '<td>' + (celdas[i+2] || "") + '</td>' +
          '</tr>';
        }

        var html =
          '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>QR codes — ' + escapar(nombreEd) + '</title>' +
          '<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500&display=swap" rel="stylesheet">' +
          '<style>' +
          '* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }' +
          'body { padding: 28px; color: #1F2A37; }' +
          '.hoja-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #185FA5; padding-bottom: 12px; margin-bottom: 18px; }' +
          '.h-izq { display: flex; align-items: center; gap: 11px; }' +
          '.h-logo { width: 44px; height: 44px; border-radius: 10px; background: #185FA5; color: #fff; font-weight: 700; font-size: 18px; display: flex; align-items: center; justify-content: center; }' +
          '.h-empresa { font-size: 17px; font-weight: 700; color: #1F2A37; }' +
          '.h-sub { font-size: 11px; color: #888780; }' +
          '.h-der { text-align: right; font-size: 10px; color: #B0AEA6; }' +
          '.qr-tabla { width: 100%; border-collapse: separate; border-spacing: 16px 6px; }' +
          '.qr-tabla td { width: 33.33%; vertical-align: top; }' +
          '.ref { font-size: 10px; color: #B0AEA6; font-style: italic; padding: 4px 2px 3px; }' +
          '.tarjeta { border: 1px dashed #C0BEB6; border-radius: 12px; padding: 16px 12px; text-align: center; page-break-inside: avoid; }' +
          '.marca-cliente { text-align: center; margin-bottom: 11px; }' +
          '.marca-cliente .ini { display: inline-block; width: 24px; height: 24px; border-radius: 6px; background: #185FA5; color: #fff; font-weight: 700; font-size: 10px; line-height: 24px; vertical-align: middle; }' +
          '.marca-cliente .nom-cliente { font-size: 11px; font-weight: 600; color: #1F2A37; vertical-align: middle; margin-left: 6px; }' +
          '.tarjeta img { width: 100%; height: auto; display: block; }' +
          '.mensaje { font-family: "Fraunces", Georgia, serif; font-style: italic; font-weight: 500; font-size: 14px; color: #1F2A37; margin-top: 11px; line-height: 1.28; }' +
          '.pie { font-size: 8px; color: #C0BEB6; margin-top: 10px; border-top: 0.5px solid #EFEEE8; padding-top: 6px; letter-spacing: 0.03em; }' +
          '@media print { body { padding: 0; } }' +
          '</style></head><body>' +
          '<div class="hoja-header">' +
            '<div class="h-izq">' +
              '<div class="h-logo">' + escapar(ini) + '</div>' +
              '<div><div class="h-empresa">' + escapar(empresa) + '</div><div class="h-sub">' + escapar(nombreEd) + ' &middot; QR codes</div></div>' +
            '</div>' +
            '<div class="h-der">Cut along the<br>dotted line &#9986;</div>' +
          '</div>' +
          '<table class="qr-tabla"><tbody>' + tarjetas + '</tbody></table>' +
          '</body></html>';

        var ventana = window.open("", "_blank");
        ventana.document.write(html);
        ventana.document.close();
        document.body.removeChild(temp);

        setTimeout(function(){ ventana.focus(); ventana.print(); }, 450);
      }, 500);
    }

    verificarAcceso();
  </script>
</body>
