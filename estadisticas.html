<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanTrack — Estadísticas</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --verde: #1D9E75;
      --verde-claro: #EAF3DE;
      --verde-texto: #0F6E56;
      --azul: #185FA5;
      --azul-claro: #E6F1FB;
      --gris-fondo: #F5F4EF;
      --gris-texto: #6B6A64;
      --gris-borde: #E2E0D8;
      --texto: #2C2C2A;
      --blanco: #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--gris-fondo); color: var(--texto); min-height: 100vh; padding: 20px; }
    .contenedor { max-width: 720px; margin: 0 auto; display: none; }
    .verificando { max-width: 720px; margin: 60px auto; text-align: center; color: var(--gris-texto); font-size: 15px; }

    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .top .marca { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gris-texto); font-weight: 600; }
    .top h1 { font-size: 22px; font-weight: 600; margin-top: 2px; }
    .top-botones { display: flex; gap: 8px; }
    .btn-salir { background: transparent; color: var(--gris-texto); border: 1.5px solid var(--gris-borde); padding: 10px 16px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }

    /* Selector de edificio */
    .selector-cont { margin-bottom: 22px; }
    .selector-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gris-texto); margin-bottom: 8px; }
    .selector { width: 100%; padding: 14px; font-size: 16px; border: 1.5px solid var(--gris-borde); border-radius: 12px; background: var(--blanco); color: var(--texto); outline: none; cursor: pointer; }
    .selector:focus { border-color: var(--azul); }

    .metricas { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    @media (max-width: 560px) { .metricas { grid-template-columns: repeat(2, 1fr); } }
    .metrica { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 14px; padding: 16px; }
    .metrica .label { font-size: 11px; color: var(--gris-texto); margin-bottom: 6px; }
    .metrica .valor { font-size: 26px; font-weight: 600; }

    .tarjeta { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    .tarjeta h2 { font-size: 15px; font-weight: 600; margin-bottom: 18px; }

    .grafica-dias { display: flex; align-items: flex-end; gap: 8px; height: 160px; padding-top: 10px; }
    .barra-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
    .barra { width: 100%; max-width: 40px; background: var(--azul); border-radius: 6px 6px 0 0; min-height: 4px; transition: height 0.4s; }
    .barra-valor { font-size: 12px; font-weight: 600; color: var(--azul); }
    .barra-dia { font-size: 11px; color: var(--gris-texto); }

    .rank-fila { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .rank-fila:last-child { margin-bottom: 0; }
    .rank-nombre { font-size: 14px; flex-shrink: 0; width: 38%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rank-barra-fondo { flex: 1; height: 24px; background: var(--gris-fondo); border-radius: 6px; overflow: hidden; }
    .rank-barra { height: 100%; border-radius: 6px; min-width: 2px; }
    .rank-valor { font-size: 13px; font-weight: 600; color: var(--gris-texto); width: 30px; text-align: right; flex-shrink: 0; }

    .vacio { text-align: center; color: var(--gris-texto); padding: 20px; font-size: 14px; }
    .cargando { text-align: center; color: var(--gris-texto); padding: 40px; font-size: 14px; }
    .titulo-edificio { font-size: 18px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .subtitulo-edificio { font-size: 13px; color: var(--gris-texto); margin-bottom: 18px; }
  </style>
</head>
<body>

  <div class="verificando" id="verificando">Verificando sesión...</div>

  <div class="contenedor" id="contenedor">

    <div class="top">
      <div>
        <div class="marca">CleanTrack</div>
        <h1>Estadísticas</h1>
      </div>
      <div class="top-botones">
        <a class="btn-salir" href="inicio.html">← Inicio</a>
        <button class="btn-salir" onclick="salir()">Salir</button>
      </div>
    </div>

    <div class="selector-cont">
      <div class="selector-label">Edificio</div>
      <select class="selector" id="selector-edificio" onchange="mostrarEdificio()">
        <option value="">Cargando edificios...</option>
      </select>
    </div>

    <div id="contenido-edificio">
      <div class="cargando">Cargando estadísticas...</div>
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://saoirivninhucrkhckaj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_DeKuX1LvrvruEXzfPvumnw_g5N1Jw4k";

    let db = null;
    try {
      const { createClient } = supabase;
      db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) { console.error(e); }

    var todosLosRegistros = [];

    async function verificarAcceso() {
      if (!db) { document.getElementById("verificando").textContent = "Sin conexión."; return; }
      const { data } = await db.auth.getSession();
      if (!data.session) { window.location.href = "login.html"; return; }

      // Verificar que la compañía tenga plan Pro (esta función es solo Pro)
      try {
        const { data: planData, error } = await db.rpc("mi_plan");
        var plan = (!error && planData) ? String(planData).toLowerCase().trim() : "basico";
        if (plan !== "pro") { window.location.href = "inicio.html"; return; }
      } catch (e) { window.location.href = "inicio.html"; return; }

      document.getElementById("verificando").style.display = "none";
      document.getElementById("contenedor").style.display = "block";
      cargarDatos();
    }

    async function salir() {
      if (db) await db.auth.signOut();
      window.location.href = "login.html";
    }

    function mismoDia(f1, f2) {
      return f1.getFullYear() === f2.getFullYear() && f1.getMonth() === f2.getMonth() && f1.getDate() === f2.getDate();
    }

    async function cargarDatos() {
      const { data, error } = await db.from("registros").select("*").order("created_at", { ascending: false });
      if (error) { console.error(error); return; }
      todosLosRegistros = data || [];

      // Sacar lista de edificios únicos
      var edificios = {};
      todosLosRegistros.forEach(function(r){
        var e = r.edificio || "Sin edificio";
        edificios[e] = true;
      });
      var listaEdificios = Object.keys(edificios).sort();

      var sel = document.getElementById("selector-edificio");
      if (listaEdificios.length === 0) {
        sel.innerHTML = '<option value="">No hay datos aún</option>';
        document.getElementById("contenido-edificio").innerHTML = '<div class="vacio">Aún no hay registros. Cuando los empleados registren áreas, sus estadísticas aparecerán aquí agrupadas por edificio.</div>';
        return;
      }

      sel.innerHTML = "";
      listaEdificios.forEach(function(e){
        var opt = document.createElement("option");
        opt.value = e;
        opt.textContent = e;
        sel.appendChild(opt);
      });

      // Mostrar el primero por defecto
      mostrarEdificio();
    }

    function mostrarEdificio() {
      var edificio = document.getElementById("selector-edificio").value;
      var regs = todosLosRegistros.filter(function(r){ return (r.edificio || "Sin edificio") === edificio; });
      var hoy = new Date();

      var total = regs.length;
      var nHoy = regs.filter(function(r){ return mismoDia(new Date(r.created_at), hoy); }).length;
      var hace7 = new Date(); hace7.setDate(hace7.getDate() - 6); hace7.setHours(0,0,0,0);
      var nSemana = regs.filter(function(r){ return new Date(r.created_at) >= hace7; }).length;
      var conFoto = regs.filter(function(r){ return r.con_foto; }).length;
      var pctFoto = total > 0 ? Math.round((conFoto / total) * 100) : 0;

      // Gráfica 7 días
      var dias = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
      var conteoDias = []; var maxDia = 1;
      for (var i = 6; i >= 0; i--) {
        var d = new Date(); d.setDate(d.getDate() - i);
        var c = regs.filter(function(r){ return mismoDia(new Date(r.created_at), d); }).length;
        conteoDias.push({ etiqueta: dias[d.getDay()], valor: c });
        if (c > maxDia) maxDia = c;
      }
      var barrasHTML = "";
      conteoDias.forEach(function(d){
        var altura = Math.round((d.valor / maxDia) * 130);
        barrasHTML += '<div class="barra-col"><div class="barra-valor">' + d.valor + '</div><div class="barra" style="height:' + altura + 'px;"></div><div class="barra-dia">' + d.etiqueta + '</div></div>';
      });

      var cont = document.getElementById("contenido-edificio");
      cont.innerHTML =
        '<div class="titulo-edificio"><svg viewBox="0 0 24 24" fill="none" stroke="#5F7268" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;flex-shrink:0;"><path d="M3 21h18"></path><path d="M5 21V7l8-4v18"></path><path d="M19 21V11l-6-4"></path></svg>' + edificio + '</div>' +
        '<div class="subtitulo-edificio">Estadísticas de este edificio</div>' +
        '<div class="metricas">' +
          '<div class="metrica"><div class="label">Total registros</div><div class="valor">' + total + '</div></div>' +
          '<div class="metrica"><div class="label">Hoy</div><div class="valor">' + nHoy + '</div></div>' +
          '<div class="metrica"><div class="label">Esta semana</div><div class="valor">' + nSemana + '</div></div>' +
          '<div class="metrica"><div class="label">% con foto</div><div class="valor">' + pctFoto + '%</div></div>' +
        '</div>' +
        '<div class="tarjeta"><h2>Actividad últimos 7 días</h2><div class="grafica-dias">' + barrasHTML + '</div></div>' +
        '<div class="tarjeta"><h2>Áreas más atendidas</h2><div id="rank-areas"></div></div>' +
        '<div class="tarjeta"><h2>Actividad por empleado</h2><div id="rank-empleados"></div></div>';

      pintarRanking(regs, "area", "rank-areas", "#185FA5");
      pintarRanking(regs, "nombre_empleado", "rank-empleados", "#1D9E75");
    }

    function pintarRanking(regs, campo, contId, color) {
      var conteo = {};
      regs.forEach(function(r){
        var k = r[campo] || "Sin dato";
        conteo[k] = (conteo[k] || 0) + 1;
      });
      var arr = Object.keys(conteo).map(function(k){ return { nombre: k, valor: conteo[k] }; });
      arr.sort(function(a,b){ return b.valor - a.valor; });
      arr = arr.slice(0, 6);

      var cont = document.getElementById(contId);
      if (arr.length === 0) { cont.innerHTML = '<div class="vacio">Sin datos</div>'; return; }
      var max = arr[0].valor;
      cont.innerHTML = "";
      arr.forEach(function(item){
        var pct = Math.round((item.valor / max) * 100);
        cont.innerHTML += '<div class="rank-fila"><div class="rank-nombre">' + item.nombre + '</div><div class="rank-barra-fondo"><div class="rank-barra" style="width:' + pct + '%; background:' + color + ';"></div></div><div class="rank-valor">' + item.valor + '</div></div>';
      });
    }

    verificarAcceso();
  </script>
</body>
</html>
