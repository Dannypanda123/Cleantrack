<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanTrack — Estadísticas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="idiomas.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  <style>
    :root {
      --azul-osc: #0C447C;
      --azul: #185FA5;
      --azul-suave: #BBD2EA;
      --verde: #1D9E75;
      --verde-claro: #EAF3DE;
      --verde-texto: #0F6E56;
      --azul-claro: #E6F1FB;
      --gris-fondo: #F5F4EF;
      --gris-texto: #5A6573;
      --gris-borde: #E2E0D8;
      --texto: #1B2733;
      --blanco: #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--gris-fondo); color: var(--texto); min-height: 100vh;
    }
    .verificando { max-width: 720px; margin: 60px auto; text-align: center; color: var(--gris-texto); font-size: 15px; padding: 0 20px; }
    .contenedor { display: none; }

    /* ===== Cabecera azul ===== */
    .cabecera { background: var(--azul-osc); }
    .cab-inner { max-width: 720px; margin: 0 auto; padding: 18px 20px 22px; }
    .cab-fila { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.16); }
    .barra-marca { display: flex; align-items: center; gap: 9px; }
    .logo-simbolo { height: 30px; width: auto; display: block; }
    .marca-texto { font-family: "Sora", sans-serif; font-size: 18px; font-weight: 600; color: var(--blanco); letter-spacing: -0.01em; }
    .cab-botones { display: flex; gap: 8px; }
    .btn-cab {
      background: transparent; color: var(--blanco);
      border: 1.5px solid rgba(255,255,255,0.45);
      padding: 8px 15px; border-radius: 11px; font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none; display: inline-block; font-family: inherit; white-space: nowrap;
    }
    .btn-cab:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.65); }
    .btn-cab:active { transform: scale(0.97); }
    .cab-titulo { margin-top: 16px; }
    .cab-titulo h1 { font-size: 23px; font-weight: 600; color: var(--blanco); }
    .cab-sub { font-size: 13px; color: var(--azul-suave); margin-top: 3px; }

    /* ===== Cuerpo ===== */
    .main { max-width: 720px; margin: 0 auto; padding: 22px 20px 40px; }

    .selector-cont { margin-bottom: 20px; }
    .selector-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gris-texto); margin-bottom: 7px; }
    .selector { width: 100%; padding: 13px 14px; font-size: 15px; border: 1.5px solid var(--gris-borde); border-radius: 12px; background: var(--blanco); color: var(--texto); outline: none; cursor: pointer; font-family: inherit; }
    .selector:focus { border-color: var(--azul); }

    .titulo-edificio { font-size: 18px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; word-break: break-word; }
    .subtitulo-edificio { font-size: 13px; color: var(--gris-texto); margin-bottom: 18px; }

    .metricas { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (max-width: 560px) { .metricas { grid-template-columns: repeat(2, 1fr); } }
    .metrica { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 14px; padding: 15px; }
    .metrica .label { font-size: 11px; color: var(--gris-texto); margin-bottom: 5px; }
    .metrica .valor { font-size: 25px; font-weight: 600; color: var(--azul); }
    .metrica.foto .valor { color: var(--verde); }

    .graficos { display: grid; grid-template-columns: 1fr; gap: 18px; }
    .tarjeta { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 16px; padding: 20px; }
    .tarjeta h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
    .grafico-cont { position: relative; width: 100%; }

    .leyenda { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; font-size: 12px; color: var(--gris-texto); }
    .leyenda span { display: flex; align-items: center; gap: 5px; }
    .leyenda .punto { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

    .vacio { text-align: center; color: var(--gris-texto); padding: 20px; font-size: 14px; }
    .cargando { text-align: center; color: var(--gris-texto); padding: 40px; font-size: 14px; }

    /* ===================== PC (pantallas anchas) ===================== */
    @media (min-width: 900px) {
      .cab-inner { max-width: 1100px; padding: 20px 32px 24px; }
      .main { max-width: 1100px; padding: 24px 32px 48px; }
      .cab-titulo h1 { font-size: 25px; }
      .selector { max-width: 360px; }
      /* Gráficas lado a lado; "por empleado" ocupa el ancho completo */
      .graficos { grid-template-columns: 1fr 1fr; }
      .tarjeta.ancho-completo { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>

  <div class="verificando" id="verificando">Verificando sesión...</div>

  <div class="contenedor" id="contenedor">

    <header class="cabecera">
      <div class="cab-inner">
        <div class="cab-fila">
          <div class="barra-marca">
            <img src="logo-simbolo.png" alt="" class="logo-simbolo" />
            <span class="marca-texto">CleanTrack</span>
          </div>
          <div class="cab-botones">
            <a class="btn-cab" href="inicio.html" data-i18n="comun.inicio">← Inicio</a>
            <button class="btn-cab" data-i18n-toggle onclick="I18N.toggle()" aria-label="Cambiar idioma">EN</button>
            <button class="btn-cab" onclick="salir()" data-i18n="comun.salir">Salir</button>
          </div>
        </div>
        <div class="cab-titulo">
          <h1 data-i18n="est.titulo">Estadísticas</h1>
          <div class="cab-sub" data-i18n="est.subtitulo">Rendimiento y tendencias por edificio</div>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="selector-cont">
        <div class="selector-label" data-i18n="reg.edificio">Edificio</div>
        <select class="selector" id="selector-edificio" onchange="mostrarEdificio()">
          <option value="">Cargando edificios...</option>
        </select>
      </div>

      <div id="contenido-edificio">
        <div class="cargando" data-i18n="est.cargando">Cargando estadísticas...</div>
      </div>
    </main>

  </div>

  <script>
    var todosLosRegistros = [];
    var chartDias = null, chartAreas = null, chartEmp = null;

    var PALETA = ["#185FA5", "#378ADD", "#85B7EB", "#1D9E75", "#5DCAA5", "#9FE1CB", "#B4B2A9"];

    async function verificarAcceso() {
      if (!db) { document.getElementById("verificando").textContent = I18N.t("comun.sin_conexion"); return; }
      const { data } = await db.auth.getSession();
      if (!data.session) { window.location.href = "login.html"; return; }

      // Se eliminó la verificación de plan: ahora cualquier supervisor o admin
      // logueado puede entrar a Estadísticas. El acceso a los datos sigue
      // protegido por RLS de Supabase a nivel de compañía.

      document.getElementById("verificando").style.display = "none";
      document.getElementById("contenedor").style.display = "block";
      I18N.aplicar();
      I18N.onChange(function(){ I18N.aplicar(); if (document.getElementById("selector-edificio").value) mostrarEdificio(); });
      cargarDatos();
    }

    async function salir() {
      if (db) await db.auth.signOut();
      window.location.href = "login.html";
    }

    function mismoDia(f1, f2) {
      return f1.getFullYear() === f2.getFullYear() && f1.getMonth() === f2.getMonth() && f1.getDate() === f2.getDate();
    }

    async function cargarDatos() {
      const { data, error } = await db.from("registros").select("*").order("created_at", { ascending: false });
      if (error) { console.error(error); return; }
      todosLosRegistros = data || [];

      var edificios = {};
      todosLosRegistros.forEach(function(r){ edificios[r.edificio || "Sin edificio"] = true; });
      var listaEdificios = Object.keys(edificios).sort();

      var sel = document.getElementById("selector-edificio");
      if (listaEdificios.length === 0) {
        sel.innerHTML = "";
        var optVacio = document.createElement("option");
        optVacio.value = "";
        optVacio.textContent = I18N.t("est.sin_datos");
        sel.appendChild(optVacio);

        document.getElementById("contenido-edificio").innerHTML = "";
        var vacioDiv = document.createElement("div");
        vacioDiv.className = "vacio";
        vacioDiv.textContent = I18N.t("est.vacio");
        document.getElementById("contenido-edificio").appendChild(vacioDiv);
        return;
      }

      sel.innerHTML = "";
      listaEdificios.forEach(function(e){
        var opt = document.createElement("option");
        opt.value = e;
        opt.textContent = e;
        sel.appendChild(opt);
      });

      mostrarEdificio();
    }

    function mostrarEdificio() {
      var edificio = document.getElementById("selector-edificio").value;
      var regs = todosLosRegistros.filter(function(r){ return (r.edificio || "Sin edificio") === edificio; });
      var hoy = new Date();

      var total = regs.length;
      var nHoy = regs.filter(function(r){ return mismoDia(new Date(r.created_at), hoy); }).length;
      var hace7 = new Date(); hace7.setDate(hace7.getDate() - 6); hace7.setHours(0,0,0,0);
      var nSemana = regs.filter(function(r){ return new Date(r.created_at) >= hace7; }).length;
      var conFoto = regs.filter(function(r){ return r.con_foto; }).length;
      var pctFoto = total > 0 ? Math.round((conFoto / total) * 100) : 0;

      var cont = document.getElementById("contenido-edificio");

      cont.innerHTML =
        '<div class="titulo-edificio"><svg viewBox="0 0 24 24" fill="none" stroke="#5A6573" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;flex-shrink:0;"><path d="M3 21h18"></path><path d="M5 21V7l8-4v18"></path><path d="M19 21V11l-6-4"></path></svg><span class="nombre-edificio"></span></div>' +
        '<div class="subtitulo-edificio">' + I18N.t("est.de_edificio") + '</div>' +
        '<div class="metricas">' +
          '<div class="metrica"><div class="label">' + I18N.t("est.m_total") + '</div><div class="valor">' + total + '</div></div>' +
          '<div class="metrica"><div class="label">' + I18N.t("est.m_hoy") + '</div><div class="valor">' + nHoy + '</div></div>' +
          '<div class="metrica"><div class="label">' + I18N.t("est.m_semana") + '</div><div class="valor">' + nSemana + '</div></div>' +
          '<div class="metrica foto"><div class="label">' + I18N.t("est.m_foto") + '</div><div class="valor">' + pctFoto + '%</div></div>' +
        '</div>' +
        '<div class="graficos">' +
          '<div class="tarjeta"><h2>' + I18N.t("est.g_dias") + '</h2><div class="grafico-cont" style="height:200px;"><canvas id="cv-dias"></canvas></div></div>' +
          '<div class="tarjeta"><h2>' + I18N.t("est.g_areas") + '</h2><div id="leyenda-areas" class="leyenda"></div><div class="grafico-cont" style="height:240px;"><canvas id="cv-areas"></canvas></div></div>' +
          '<div class="tarjeta ancho-completo"><h2>' + I18N.t("est.g_emp") + '</h2><div class="grafico-cont" id="cont-emp"><canvas id="cv-emp"></canvas></div></div>' +
        '</div>';

      // Nombre del edificio con textContent (anti-XSS)
      cont.querySelector(".nombre-edificio").textContent = edificio;

      if (chartDias) { chartDias.destroy(); chartDias = null; }
      if (chartAreas) { chartAreas.destroy(); chartAreas = null; }
      if (chartEmp) { chartEmp.destroy(); chartEmp = null; }

      if (total === 0) {
        return;
      }

      pintarGraficos(regs);
    }

    function pintarGraficos(regs) {
      if (!window.Chart) { setTimeout(function(){ pintarGraficos(regs); }, 120); return; }
      Chart.defaults.font.family = "Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif";
      Chart.defaults.font.size = 12;
      var tt = { backgroundColor: "#1B2733", padding: 10, cornerRadius: 8 };

      var dias = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
      var etiquetas = [], valores = [];
      for (var i = 6; i >= 0; i--) {
        var d = new Date(); d.setDate(d.getDate() - i);
        var c = regs.filter(function(r){ return mismoDia(new Date(r.created_at), d); }).length;
        etiquetas.push(dias[d.getDay()]); valores.push(c);
      }
      chartDias = new Chart(document.getElementById("cv-dias"), {
        type: "line",
        data: { labels: etiquetas, datasets: [{ label: "Limpiezas", data: valores, borderColor: "#185FA5", backgroundColor: "rgba(24,95,165,0.12)", borderWidth: 3, tension: 0.35, fill: true, pointRadius: 4, pointBackgroundColor: "#185FA5" }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: tt }, scales: { y: { beginAtZero: true, ticks: { precision: 0 }, grid: { color: "#EFEEE8" } }, x: { grid: { display: false } } }, animation: { duration: 800 } }
      });

      var conteoA = {};
      regs.forEach(function(r){ var k = r.area || "Sin área"; conteoA[k] = (conteoA[k] || 0) + 1; });
      var arrA = Object.keys(conteoA).map(function(k){ return { nombre: k, valor: conteoA[k] }; });
      arrA.sort(function(a,b){ return b.valor - a.valor; });
      var topA = arrA.slice(0, 6);
      var restoA = arrA.slice(6);
      if (restoA.length > 0) {
        var sumaResto = restoA.reduce(function(s,x){ return s + x.valor; }, 0);
        topA.push({ nombre: I18N.t("est.otras"), valor: sumaResto });
      }
      var totalA = topA.reduce(function(s,x){ return s + x.valor; }, 0);
      var labelsA = topA.map(function(x){ return x.nombre; });
      var dataA = topA.map(function(x){ return x.valor; });
      var coloresA = topA.map(function(x, idx){ return PALETA[idx % PALETA.length]; });

      // Leyenda personalizada (anti-XSS: cada item creado con createElement/textContent)
      var legCont = document.getElementById("leyenda-areas");
      legCont.innerHTML = "";
      topA.forEach(function(x, idx){
        var pct = totalA > 0 ? Math.round((x.valor / totalA) * 100) : 0;
        var span = document.createElement("span");
        var punto = document.createElement("span");
        punto.className = "punto";
        punto.style.background = coloresA[idx];
        span.appendChild(punto);
        span.appendChild(document.createTextNode(" " + x.nombre + " " + pct + "%"));
        legCont.appendChild(span);
      });

      chartAreas = new Chart(document.getElementById("cv-areas"), {
        type: "doughnut",
        data: { labels: labelsA, datasets: [{ data: dataA, backgroundColor: coloresA, borderWidth: 2, borderColor: "#fff" }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: "60%", plugins: { legend: { display: false }, tooltip: tt }, animation: { duration: 800 } }
      });

      var conteoE = {};
      regs.forEach(function(r){ var k = r.nombre_empleado || "Sin dato"; conteoE[k] = (conteoE[k] || 0) + 1; });
      var arrE = Object.keys(conteoE).map(function(k){ return { nombre: k, valor: conteoE[k] }; });
      arrE.sort(function(a,b){ return b.valor - a.valor; });
      arrE = arrE.slice(0, 6);
      var labelsE = arrE.map(function(x){ return x.nombre; });
      var dataE = arrE.map(function(x){ return x.valor; });

      var alturaEmp = Math.max(arrE.length * 40 + 40, 120);
      document.getElementById("cont-emp").style.height = alturaEmp + "px";

      chartEmp = new Chart(document.getElementById("cv-emp"), {
        type: "bar",
        data: { labels: labelsE, datasets: [{ label: "Limpiezas", data: dataE, backgroundColor: "#1D9E75", borderRadius: 6, maxBarThickness: 26 }] },
        options: { indexAxis: "y", responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: tt }, scales: { x: { beginAtZero: true, ticks: { precision: 0 }, grid: { color: "#EFEEE8" } }, y: { grid: { display: false } } }, animation: { duration: 800 } }
      });
    }

    verificarAcceso();
  </script>
</body>
</html>
