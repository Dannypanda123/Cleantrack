<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanTrack — Reportes</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --verde: #1D9E75; --verde-claro: #EAF3DE; --verde-texto: #0F6E56;
      --azul: #185FA5; --azul-claro: #E6F1FB;
      --gris-fondo: #F5F4EF; --gris-texto: #6B6A64; --gris-borde: #E2E0D8;
      --texto: #2C2C2A; --blanco: #FFFFFF; --rojo: #A32D2D; --rojo-claro: #FCEBEB;
      --ambar-claro: #FAEEDA; --ambar-texto: #854F0B;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--gris-fondo); color: var(--texto); min-height: 100vh; padding: 20px; }
    .contenedor { max-width: 600px; margin: 0 auto; display: none; }
    .verificando { max-width: 600px; margin: 60px auto; text-align: center; color: var(--gris-texto); font-size: 15px; }

    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .top .marca { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gris-texto); font-weight: 600; }
    .top h1 { font-size: 22px; font-weight: 600; margin-top: 2px; }
    .top-botones { display: flex; gap: 8px; }
    .btn-salir { background: transparent; color: var(--gris-texto); border: 1.5px solid var(--gris-borde); padding: 10px 16px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }

    .tarjeta { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    .tarjeta h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .tarjeta .sub { font-size: 13px; color: var(--gris-texto); margin-bottom: 18px; }

    label { display: block; font-size: 13px; font-weight: 600; color: var(--gris-texto); margin-bottom: 6px; }
    select, input[type="date"] { width: 100%; padding: 13px; font-size: 16px; border: 1.5px solid var(--gris-borde); border-radius: 12px; margin-bottom: 16px; outline: none; background: var(--blanco); color: var(--texto); cursor: pointer; }
    select:focus, input[type="date"]:focus { border-color: var(--azul); }

    .btn-generar { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; background: #3C993C; color: #fff; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-generar:active { transform: scale(0.98); }
    .btn-generar:disabled { opacity: 0.6; }

    .preview { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 16px; padding: 20px; margin-bottom: 20px; display: none; }
    .preview h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .preview-metricas { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .pm { background: var(--gris-fondo); border-radius: 12px; padding: 14px; text-align: center; }
    .pm .v { font-size: 22px; font-weight: 600; }
    .pm .v.inc { color: var(--ambar-texto); }
    .pm .l { font-size: 10px; color: var(--gris-texto); margin-top: 2px; }

    .mensaje { text-align: center; font-size: 13px; margin-top: 12px; padding: 10px; border-radius: 10px; display: none; }
    .mensaje.ok { background: var(--verde-claro); color: var(--verde-texto); display: block; }
    .mensaje.error { background: var(--rojo-claro); color: var(--rojo); display: block; }
    .mensaje.cargando { background: var(--azul-claro); color: var(--azul); display: block; }
  </style>
</head>
<body>

  <div class="verificando" id="verificando">Verificando sesión...</div>

  <div class="contenedor" id="contenedor">

    <div class="top">
      <div>
        <div class="marca">CleanTrack</div>
        <h1>Reportes</h1>
      </div>
      <div class="top-botones">
        <a class="btn-salir" href="inicio.html">← Inicio</a>
        <button class="btn-salir" onclick="salir()">Salir</button>
      </div>
    </div>

    <div class="tarjeta">
      <h2>Generar informe</h2>
      <div class="sub">Crea un informe en PDF para presentar al property manager</div>

      <label for="sel-edificio">Edificio</label>
      <select id="sel-edificio"><option value="">Cargando...</option></select>

      <label for="sel-periodo">Tipo de informe</label>
      <select id="sel-periodo" onchange="cambioPeriodo()">
        <option value="diario">Diario (un día)</option>
        <option value="7-dias">Semanal (últimos 7 días)</option>
        <option value="mes-actual">Mensual (este mes)</option>
        <option value="mes-pasado">Mensual (mes pasado)</option>
      </select>

      <div id="cont-fecha" style="display:none;">
        <label for="sel-fecha">Día del informe</label>
        <input type="date" id="sel-fecha" min="2020-01-01" max="2040-12-31" />
      </div>

      <button class="btn-generar" id="btn-generar" onclick="generar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg> Generar PDF</button>
      <div class="mensaje" id="mensaje"></div>
    </div>

    <div class="preview" id="preview">
      <h2>Vista previa del informe</h2>
      <div class="preview-metricas">
        <div class="pm"><div class="v" id="pv-total">—</div><div class="l">Áreas limpiadas</div></div>
        <div class="pm"><div class="v" id="pv-foto">—</div><div class="l">Con foto</div></div>
        <div class="pm"><div class="v" id="pv-dias">—</div><div class="l" id="lbl-dias">Días activos</div></div>
        <div class="pm"><div class="v inc" id="pv-inc">—</div><div class="l">Incidencias</div></div>
      </div>
    </div>

  </div>

  <script>
    // El cliente de Supabase (db) y las credenciales vienen de config.js
    const db = window.db;

    var todosRegistros = [];
    var todasIncidencias = [];
    var todasAreas = [];
    var logoDataUrl = null;  // se carga al inicio
    var empresaNombre = "CleanTrack";   // se reemplaza con el nombre real de la compañía
    var empresaIniciales = "CT";        // iniciales para el cuadro de la cabecera

    // ============================================================
    // PALETA DE COLORES PARA LOS PDFs (RGB)
    // ============================================================
    var PDF_COLORS = {
      azul:        [24, 95, 165],   // #185FA5
      azulOsc:     [12, 68, 124],
      azulClaro:   [230, 241, 251], // #E6F1FB
      verde:       [29, 158, 117],  // #1D9E75
      verdeClaro:  [216, 240, 228],
      verdeTexto:  [15, 110, 86],
      ambar:       [186, 117, 23],  // amarillo/ámbar para empleados
      ambarSoft:   [253, 243, 219],
      rojo:        [186, 59, 59],
      rojoSoft:    [251, 234, 234],
      texto:       [27, 39, 51],
      textoSoft:   [90, 101, 115],
      gris:        [120, 128, 140],
      borde:       [226, 224, 216],
      bordeSuave:  [240, 238, 230],
      cabeceraBg:  [248, 250, 253], // fondo sutil de tarjetas grandes
      tablaBg:     [248, 247, 243],
      panelVerde:  [232, 245, 238], // estado vacío "sin incidencias"
      blanco:      [255, 255, 255]
    };

    // ============================================================
    // CARGAR LOGO COMO BASE64 PARA USAR EN PDFs
    // ============================================================
    async function cargarLogoBase64() {
      try {
        const res = await fetch('logo-simbolo.png');
        const blob = await res.blob();
        return await new Promise(function(resolve) {
          const reader = new FileReader();
          reader.onload = function() { resolve(reader.result); };
          reader.readAsDataURL(blob);
        });
      } catch (e) {
        console.warn("No se pudo cargar logo-simbolo.png para el PDF:", e);
        return null;
      }
    }

    async function verificarAcceso() {
      if (!db) { document.getElementById("verificando").textContent = "Sin conexión."; return; }
      const { data } = await db.auth.getSession();
      if (!data.session) { window.location.href = "login.html"; return; }

      document.getElementById("verificando").style.display = "none";
      document.getElementById("contenedor").style.display = "block";
      var hoy = new Date();
      var hoyStr = hoy.getFullYear() + "-" + String(hoy.getMonth()+1).padStart(2,"0") + "-" + String(hoy.getDate()).padStart(2,"0");
      var campoFecha = document.getElementById("sel-fecha");
      campoFecha.value = hoyStr;
      campoFecha.max = hoyStr;
      cambioPeriodo();
      // Cargar el logo en paralelo a los datos
      logoDataUrl = await cargarLogoBase64();
      await cargarEmpresa();
      cargarTodo();
    }

    // Carga el nombre de la compañía (RLS ya filtra a la empresa del usuario)
    async function cargarEmpresa() {
      try {
        const { data, error } = await db.from("companias").select("nombre").limit(1);
        if (!error && data && data.length > 0 && data[0].nombre) {
          empresaNombre = data[0].nombre;
          empresaIniciales = calcularIniciales(empresaNombre);
        }
      } catch (e) {
        console.warn("No se pudo cargar la compañía para el informe:", e);
      }
    }

    // Iniciales = primera letra de las 2 primeras palabras (con respaldos)
    function calcularIniciales(nombre) {
      var limpio = (nombre || "").trim();
      if (!limpio) return "CT";
      var palabras = limpio.split(/\s+/).filter(function(p){ return p.length > 0; });
      if (palabras.length >= 2) {
        return (palabras[0].charAt(0) + palabras[1].charAt(0)).toUpperCase();
      }
      // Una sola palabra: usar sus 2 primeras letras (o 1 si es muy corta)
      return limpio.substring(0, 2).toUpperCase();
    }

    async function salir() {
      if (db) await db.auth.signOut();
      window.location.href = "login.html";
    }

    function cambioPeriodo() {
      var periodo = document.getElementById("sel-periodo").value;
      document.getElementById("cont-fecha").style.display = (periodo === "diario") ? "block" : "none";
    }

    async function cargarTodo() {
      const reg = await db.from("registros").select("*").order("created_at", { ascending: false });
      todosRegistros = (reg.data) || [];
      const inc = await db.from("incidencias").select("*").order("created_at", { ascending: false });
      todasIncidencias = (inc.data) || [];
      const ar = await db.from("areas").select("*");
      todasAreas = (ar.data) || [];

      var edificios = {};
      todosRegistros.forEach(function(r){ edificios[r.edificio || "Sin edificio"] = true; });
      todasIncidencias.forEach(function(i){ edificios[i.edificio || "Sin edificio"] = true; });
      var lista = Object.keys(edificios).sort();
      var sel = document.getElementById("sel-edificio");
      if (lista.length === 0) {
        sel.innerHTML = '<option value="">No hay datos aún</option>';
      } else {
        sel.innerHTML = "";
        lista.forEach(function(e){
          var o = document.createElement("option"); o.value = e; o.textContent = e; sel.appendChild(o);
        });
      }
    }

    function rangoFechas(periodo) {
      var ahora = new Date();
      var inicio, fin = new Date();
      if (periodo === "diario") {
        var val = document.getElementById("sel-fecha").value;
        var partes = val.split("-");
        inicio = new Date(partes[0], partes[1]-1, partes[2], 0, 0, 0);
        fin = new Date(partes[0], partes[1]-1, partes[2], 23, 59, 59);
      } else if (periodo === "mes-actual") {
        inicio = new Date(ahora.getFullYear(), ahora.getMonth(), 1);
      } else if (periodo === "mes-pasado") {
        inicio = new Date(ahora.getFullYear(), ahora.getMonth() - 1, 1);
        fin = new Date(ahora.getFullYear(), ahora.getMonth(), 0, 23, 59, 59);
      } else {
        inicio = new Date(); inicio.setDate(inicio.getDate() - 6); inicio.setHours(0,0,0,0);
      }
      return { inicio: inicio, fin: fin };
    }

    function nombrePeriodo(periodo) {
      var meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
      var ahora = new Date();
      if (periodo === "diario") {
        var val = document.getElementById("sel-fecha").value;
        var partes = val.split("-");
        return partes[2] + " de " + meses[partes[1]-1] + " " + partes[0];
      }
      if (periodo === "mes-actual") return meses[ahora.getMonth()] + " " + ahora.getFullYear();
      if (periodo === "mes-pasado") { var m = ahora.getMonth() - 1; var y = ahora.getFullYear(); if (m < 0) { m = 11; y--; } return meses[m] + " " + y; }
      return "últimos 7 días";
    }

    function fmtFecha(iso) {
      var f = new Date(iso);
      var dd = f.getDate(); var mm = f.getMonth() + 1; var hh = f.getHours(); var mi = f.getMinutes();
      var ampm = hh >= 12 ? "pm" : "am"; hh = hh % 12; if (hh === 0) hh = 12;
      return (dd<10?"0":"")+dd + "/" + (mm<10?"0":"")+mm + " " + hh + ":" + (mi<10?"0":"")+mi + ampm;
    }

    function fmtFechaCorta() {
      var f = new Date();
      return f.getDate() + "/" + (f.getMonth()+1) + "/" + f.getFullYear();
    }

    // ============================================================
    //              HELPERS DE DIBUJADO DEL PDF (NUEVO LOOK)
    // ============================================================

    // Aplicar color de relleno
    function fillRGB(doc, c) { doc.setFillColor(c[0], c[1], c[2]); }
    function textRGB(doc, c) { doc.setTextColor(c[0], c[1], c[2]); }
    function strokeRGB(doc, c) { doc.setDrawColor(c[0], c[1], c[2]); }

    // Cabecera de informe (logo del pin + CleanTrack + subtítulo + bloque de info a la derecha)
    function dibujarCabecera(doc, subtitulo, infoDerecha) {
      var pageW = doc.internal.pageSize.getWidth();
      var y = 18;

      // Cuadro con las iniciales de la empresa (en vez del logo de CleanTrack)
      fillRGB(doc, PDF_COLORS.azul);
      doc.roundedRect(14, y, 13, 13, 2.5, 2.5, "F");
      textRGB(doc, PDF_COLORS.blanco);
      doc.setFontSize(11); doc.setFont(undefined, "bold");
      doc.text(empresaIniciales, 20.5, y + 8.6, { align: "center" });

      // Nombre de la empresa en azul oscuro
      textRGB(doc, PDF_COLORS.azulOsc);
      doc.setFontSize(20); doc.setFont(undefined, "bold");
      doc.text(empresaNombre, 31, y + 7);

      // Subtítulo en cursiva azul
      textRGB(doc, PDF_COLORS.azul);
      doc.setFontSize(11); doc.setFont(undefined, "italic");
      doc.text(subtitulo, 31, y + 14);

      // Bloque de info a la derecha
      var infoX = pageW - 14;
      var infoY = y + 1;
      textRGB(doc, PDF_COLORS.texto);
      doc.setFontSize(9.5); doc.setFont(undefined, "normal");
      infoDerecha.forEach(function(linea, i) {
        // Cada línea es {icono: 'pin'|'cal'|'reloj', texto: '...'}
        var lineaY = infoY + i * 6 + 4;
        // Dibujar icono pequeño (geometría simple)
        textRGB(doc, PDF_COLORS.azulOsc);
        if (linea.icono === 'pin') {
          // pin: pequeño círculo y triangulo
          doc.circle(infoX - 65, lineaY - 1.5, 1.5, "F");
        } else if (linea.icono === 'cal') {
          // Calendario: rectángulo
          fillRGB(doc, PDF_COLORS.azulOsc);
          doc.rect(infoX - 67, lineaY - 3, 4, 3.5, "F");
        } else if (linea.icono === 'reloj') {
          // Reloj: círculo con manecillas
          strokeRGB(doc, PDF_COLORS.azulOsc);
          doc.setLineWidth(0.5);
          doc.circle(infoX - 65, lineaY - 1.5, 2, "S");
          doc.line(infoX - 65, lineaY - 1.5, infoX - 65, lineaY - 3); // hora
          doc.line(infoX - 65, lineaY - 1.5, infoX - 64, lineaY - 1); // minuto
        }
        // Texto
        textRGB(doc, PDF_COLORS.texto);
        doc.setFont(undefined, "normal");
        doc.text(linea.texto, infoX - 60, lineaY);
      });

      // Línea separadora
      strokeRGB(doc, PDF_COLORS.borde);
      doc.setLineWidth(0.4);
      doc.line(14, y + 24, pageW - 14, y + 24);

      return y + 32;  // y donde sigue el contenido
    }

    // Dibujar las 4 tarjetas grandes de métricas (estilo mockup)
    // cards = [{icono, color, valor, etiqueta}, ...]
    // icono: 'escoba'|'camara'|'persona'|'alerta'|'check'|'edificio'|'reloj'
    function dibujarTarjetasMetricas(doc, y, cards) {
      var pageW = doc.internal.pageSize.getWidth();
      var gap = 4;
      var cardW = (pageW - 28 - gap * (cards.length - 1)) / cards.length;
      var cardH = 38;

      cards.forEach(function(c, i) {
        var x = 14 + i * (cardW + gap);
        // Fondo tarjeta
        fillRGB(doc, PDF_COLORS.cabeceraBg);
        doc.roundedRect(x, y, cardW, cardH, 3, 3, "F");

        // Círculo de color con icono
        var cx = x + cardW / 2;
        var cy = y + 9;
        fillRGB(doc, c.color);
        doc.circle(cx, cy, 4.5, "F");
        // Dibujar el icono dentro del círculo (color blanco)
        dibujarIcono(doc, c.icono, cx, cy, PDF_COLORS.blanco);

        // Número grande
        textRGB(doc, PDF_COLORS.azulOsc);
        doc.setFontSize(18); doc.setFont(undefined, "bold");
        doc.text(String(c.valor), cx, y + 22, { align: "center" });

        // Etiqueta
        textRGB(doc, PDF_COLORS.textoSoft);
        doc.setFontSize(8); doc.setFont(undefined, "normal");
        doc.text(c.etiqueta, cx, y + 30, { align: "center" });
      });

      return y + cardH + 10;
    }

    // Dibujar iconos pequeños dentro de un círculo (color en RGB)
    function dibujarIcono(doc, tipo, cx, cy, color) {
      strokeRGB(doc, color);
      fillRGB(doc, color);
      doc.setLineWidth(0.6);

      if (tipo === 'escoba') {
        // Escoba: rectángulo (cepillo) + línea (palo) + 2 chispas (estrellas pequeñas)
        // Cepillo - rectángulo
        doc.rect(cx - 1.8, cy + 0.3, 2.4, 1.2, "F");
        // Palo
        doc.setLineWidth(0.7);
        doc.line(cx + 0.6, cy + 1.5, cx + 2, cy + 2.8);
        // 2 chispas (asteriscos pequeños)
        doc.setLineWidth(0.4);
        doc.line(cx - 2, cy - 1.5, cx - 2, cy - 0.7);
        doc.line(cx - 2.4, cy - 1.1, cx - 1.6, cy - 1.1);
        doc.line(cx + 0.4, cy - 2.2, cx + 0.4, cy - 1.5);
        doc.line(cx + 0, cy - 1.85, cx + 0.8, cy - 1.85);
      } else if (tipo === 'camara') {
        // Cámara: rectángulo con lente circular
        doc.rect(cx - 2.4, cy - 1.2, 4.8, 3.2, "F");
        // Pequeña parte de arriba (visor)
        doc.rect(cx - 0.8, cy - 1.8, 1.6, 0.6, "F");
        // Lente (círculo blanco dentro)
        textRGB(doc, color);  // dummy
        // Cambiar relleno temporalmente: usamos el color de fondo del círculo (verde) para "vaciar"
        // Truco: dibujar dentro de la cámara un círculo en azul oscuro para simular lente
        doc.setFillColor(255, 255, 255);
        doc.circle(cx, cy + 0.4, 1.1, "F");
        // Restaurar fill al color original
        fillRGB(doc, color);
      } else if (tipo === 'persona') {
        // Persona: círculo (cabeza) + arco (hombros)
        doc.circle(cx, cy - 1.5, 1.2, "F");
        // Cuerpo: rectángulo redondeado tipo trapecio
        doc.roundedRect(cx - 2.2, cy + 0.3, 4.4, 2.2, 1.1, 1.1, "F");
      } else if (tipo === 'alerta') {
        // Triángulo de alerta con signo
        var p1x = cx, p1y = cy - 2.5;
        var p2x = cx - 2.5, p2y = cy + 1.7;
        var p3x = cx + 2.5, p3y = cy + 1.7;
        doc.triangle(p1x, p1y, p2x, p2y, p3x, p3y, "F");
        // signo de exclamación dentro
        doc.setFillColor(186, 59, 59); // color del fondo (rojo)
        // Línea vertical (! pequeño)
        doc.rect(cx - 0.25, cy - 1.2, 0.5, 1.7, "F");
        doc.circle(cx, cy + 1, 0.35, "F");
        fillRGB(doc, color);  // restaurar
      } else if (tipo === 'check') {
        // Check: línea diagonal de palomita
        doc.setLineWidth(0.9);
        doc.line(cx - 1.8, cy + 0.2, cx - 0.4, cy + 1.4);
        doc.line(cx - 0.4, cy + 1.4, cx + 2, cy - 1.4);
      } else if (tipo === 'edificio') {
        // Edificio: rectángulo con ventanas
        doc.rect(cx - 2, cy - 2, 4, 4.2, "F");
        // 4 ventanas (puntos)
        doc.setFillColor(255, 255, 255);
        doc.rect(cx - 1.4, cy - 1.4, 0.6, 0.6, "F");
        doc.rect(cx + 0.4, cy - 1.4, 0.6, 0.6, "F");
        doc.rect(cx - 1.4, cy - 0.2, 0.6, 0.6, "F");
        doc.rect(cx + 0.4, cy - 0.2, 0.6, 0.6, "F");
        // Puerta
        doc.rect(cx - 0.5, cy + 1.0, 1.0, 1.2, "F");
        fillRGB(doc, color);
      } else if (tipo === 'reloj') {
        // Círculo + manecillas
        strokeRGB(doc, color);
        doc.setLineWidth(0.6);
        doc.circle(cx, cy, 2.4, "S");
        doc.line(cx, cy, cx, cy - 1.6);  // hora
        doc.line(cx, cy, cx + 1.2, cy);  // minuto
      }
    }

    // Título de sección (icono cuadrado azul + título)
    function dibujarTituloSeccion(doc, y, icono, titulo) {
      // Cuadrado azul con icono blanco
      fillRGB(doc, PDF_COLORS.azulOsc);
      doc.roundedRect(14, y - 5, 7, 7, 1.5, 1.5, "F");
      // Dibujar icono dentro
      dibujarIcono(doc, icono, 17.5, y - 1.5, PDF_COLORS.blanco);

      // Título
      textRGB(doc, PDF_COLORS.azulOsc);
      doc.setFontSize(13); doc.setFont(undefined, "bold");
      doc.text(titulo, 24, y);

      return y + 8;
    }

    // Tabla de limpiezas con cabecera azul y botones "Ver" azules
    // cols = [{label, width, align?}, ...]
    // rows = arrays de strings; el botón Ver se maneja aparte
    function dibujarTablaCabecera(doc, y, cols) {
      var pageW = doc.internal.pageSize.getWidth();
      var tableW = pageW - 28;
      // Cabecera azul redondeada arriba
      fillRGB(doc, PDF_COLORS.azulOsc);
      doc.roundedRect(14, y, tableW, 9, 2, 2, "F");
      // "Bocacuadrar" abajo (rectángulo blanco que pisa solo la parte inferior)
      // No es estrictamente necesario; dejamos las cuatro esquinas redondas en la cabecera.

      textRGB(doc, PDF_COLORS.blanco);
      doc.setFontSize(9.5); doc.setFont(undefined, "bold");
      var cx = 14 + 6;
      cols.forEach(function(c) {
        var align = c.align || "left";
        var tx = cx;
        if (align === "right") tx = cx + c.width - 4;
        else if (align === "center") tx = cx + c.width / 2;
        doc.text(c.label, tx, y + 6, { align: align });
        cx += c.width;
      });

      return y + 12;
    }

    // Dibujar una fila de la tabla con botón "Ver" opcional
    function dibujarFilaTabla(doc, y, cols, reg) {
      var pageW = doc.internal.pageSize.getWidth();
      var tableW = pageW - 28;
      var rowH = 11;

      // Línea inferior sutil
      strokeRGB(doc, PDF_COLORS.bordeSuave);
      doc.setLineWidth(0.3);
      doc.line(20, y + rowH - 2, pageW - 14, y + rowH - 2);

      textRGB(doc, PDF_COLORS.texto);
      doc.setFontSize(9.5); doc.setFont(undefined, "normal");

      var cx = 14 + 6;
      cols.forEach(function(c, i) {
        var align = c.align || "left";
        var tx = cx;
        if (align === "right") tx = cx + c.width - 4;
        else if (align === "center") tx = cx + c.width / 2;

        if (c.tipo === "boton-ver") {
          // Dibujar botón "Ver" azul
          if (reg.con_foto && reg.foto_url) {
            // Botón con borde azul, fondo blanco
            strokeRGB(doc, PDF_COLORS.azul);
            doc.setLineWidth(0.6);
            doc.setFillColor(255, 255, 255);
            doc.roundedRect(tx - 9, y + 1, 18, 6, 1.5, 1.5, "FD");
            textRGB(doc, PDF_COLORS.azul);
            doc.setFontSize(8); doc.setFont(undefined, "bold");
            doc.textWithLink("Ver", tx + 1.5, y + 5, { url: reg.foto_url, align: "center" });
            // Icono de imagen pequeño antes del texto
            // (cuadradito con esquina diagonal)
            strokeRGB(doc, PDF_COLORS.azul);
            doc.setLineWidth(0.5);
            doc.rect(tx - 6, y + 2.3, 3.5, 2.7, "S");
            doc.line(tx - 6, y + 4.5, tx - 4.5, y + 3.5);
            doc.line(tx - 4.5, y + 3.5, tx - 2.5, y + 4.8);
            doc.setFontSize(9.5);
          } else {
            textRGB(doc, PDF_COLORS.gris);
            doc.text("—", tx, y + 5, { align: "center" });
          }
        } else {
          var valor = String(c.get(reg) || "");
          // Truncar si es muy largo
          var maxChars = Math.floor(c.width / 1.8);
          if (valor.length > maxChars) valor = valor.substring(0, maxChars - 1) + "…";
          doc.text(valor, tx, y + 5, { align: align });
        }
        cx += c.width;
      });

      return y + rowH;
    }

    // Estado vacío bonito para incidencias (banner verde con check + texto)
    function dibujarEstadoVacioVerde(doc, y, texto) {
      var pageW = doc.internal.pageSize.getWidth();
      fillRGB(doc, PDF_COLORS.panelVerde);
      doc.roundedRect(14, y, pageW - 28, 14, 3, 3, "F");
      // Círculo verde con check
      var cx = 22, cy = y + 7;
      strokeRGB(doc, PDF_COLORS.verde);
      doc.setLineWidth(0.7);
      doc.circle(cx, cy, 3.5, "S");
      doc.setLineWidth(0.9);
      doc.line(cx - 1.5, cy + 0.1, cx - 0.4, cy + 1.2);
      doc.line(cx - 0.4, cy + 1.2, cx + 1.7, cy - 1.2);
      // Texto
      textRGB(doc, PDF_COLORS.verdeTexto);
      doc.setFontSize(10); doc.setFont(undefined, "normal");
      doc.text(texto, 30, cy + 1);

      return y + 18;
    }

    // Fila de incidencia (badge tipo + estado + descripción + fecha)
    function dibujarFilaIncidencia(doc, y, inc) {
      var pageW = doc.internal.pageSize.getWidth();
      var esInsumo = inc.tipo === "insumo";

      // Caja contenedora
      fillRGB(doc, esInsumo ? PDF_COLORS.azulClaro : PDF_COLORS.ambarSoft);
      doc.roundedRect(14, y, pageW - 28, 16, 2, 2, "F");

      // Badge tipo
      fillRGB(doc, esInsumo ? PDF_COLORS.azul : PDF_COLORS.ambar);
      doc.roundedRect(18, y + 3, esInsumo ? 28 : 22, 5, 1, 1, "F");
      textRGB(doc, PDF_COLORS.blanco);
      doc.setFontSize(7); doc.setFont(undefined, "bold");
      doc.text(esInsumo ? "FALTA INSUMO" : "PROBLEMA", 18 + (esInsumo ? 14 : 11), y + 6.5, { align: "center" });

      // Estado (resuelta / pendiente)
      var estadoX = 18 + (esInsumo ? 30 : 24) + 2;
      if (inc.resuelto) textRGB(doc, PDF_COLORS.verdeTexto);
      else textRGB(doc, PDF_COLORS.ambar);
      doc.setFontSize(8); doc.setFont(undefined, "bold");
      doc.text(inc.resuelto ? "Resuelta" : "Pendiente", estadoX, y + 6.5);

      // Fecha a la derecha
      textRGB(doc, PDF_COLORS.textoSoft);
      doc.setFontSize(8); doc.setFont(undefined, "normal");
      doc.text(fmtFecha(inc.created_at), pageW - 18, y + 6.5, { align: "right" });

      // Descripción
      textRGB(doc, PDF_COLORS.texto);
      doc.setFontSize(9); doc.setFont(undefined, "normal");
      var desc = (inc.descripcion || "") + (inc.area ? "  ·  " + inc.area : "");
      var lineas = doc.splitTextToSize(desc, pageW - 36);
      doc.text(lineas[0] || "", 18, y + 12.5);

      return y + 20;
    }

    // Pie del informe
    function dibujarPie(doc, y, extraTexto) {
      var pageW = doc.internal.pageSize.getWidth();
      var pageH = doc.internal.pageSize.getHeight();

      // Si el contenido se acerca al final, mover el pie al fondo
      var pieY = Math.max(y + 8, pageH - 18);

      // Línea separadora
      strokeRGB(doc, PDF_COLORS.borde);
      doc.setLineWidth(0.3);
      doc.line(14, pieY - 3, pageW - 14, pieY - 3);

      // Icono "i" en círculo
      strokeRGB(doc, PDF_COLORS.azulOsc);
      doc.setLineWidth(0.5);
      doc.circle(18, pieY + 2, 2.5, "S");
      textRGB(doc, PDF_COLORS.azulOsc);
      doc.setFontSize(8); doc.setFont(undefined, "bold");
      doc.text("i", 18, pieY + 3.3, { align: "center" });

      // Texto del pie
      textRGB(doc, PDF_COLORS.textoSoft);
      doc.setFontSize(8); doc.setFont(undefined, "normal");
      var txt = "Informe generado por CleanTrack" + (extraTexto ? " — " + extraTexto : "");
      doc.text(txt, 23, pieY + 3);
    }

    // ============================================================
    //              FLUJO PRINCIPAL DE GENERACIÓN
    // ============================================================

    function generar() {
      var edificio = document.getElementById("sel-edificio").value;
      var periodo = document.getElementById("sel-periodo").value;
      var msg = document.getElementById("mensaje");

      if (!edificio) { msg.textContent = "Selecciona un edificio."; msg.className = "mensaje error"; return; }

      var r = rangoFechas(periodo);
      var regs = todosRegistros.filter(function(reg){
        var f = new Date(reg.created_at);
        return (reg.edificio || "Sin edificio") === edificio && f >= r.inicio && f <= r.fin;
      });
      regs.sort(function(a,b){ return new Date(a.created_at) - new Date(b.created_at); });

      var incs = todasIncidencias.filter(function(inc){
        var f = new Date(inc.created_at);
        return (inc.edificio || "Sin edificio") === edificio && f >= r.inicio && f <= r.fin;
      });
      incs.sort(function(a,b){ return new Date(a.created_at) - new Date(b.created_at); });

      var total = regs.length;
      var conFoto = regs.filter(function(x){ return x.con_foto; }).length;
      var dias = {};
      regs.forEach(function(x){ var f = new Date(x.created_at); dias[f.getFullYear()+"-"+f.getMonth()+"-"+f.getDate()] = true; });
      var nDias = Object.keys(dias).length;
      var emps = {};
      regs.forEach(function(x){ if (x.nombre_empleado) emps[x.nombre_empleado] = true; });
      var nEmps = Object.keys(emps).length;

      var esDiario = (periodo === "diario");
      var esSemanal = (periodo === "7-dias");
      var esMensual = (periodo === "mes-actual" || periodo === "mes-pasado");

      var areasCubiertas = {};
      regs.forEach(function(x){ if (x.area) areasCubiertas[x.area] = true; });
      var nAreasCubiertas = Object.keys(areasCubiertas).length;
      var areasDelEdificio = todasAreas.filter(function(a){ return (a.edificio || "") === edificio; });
      var nAreasTotal = areasDelEdificio.length;
      var incResueltas = incs.filter(function(i){ return i.resuelto; }).length;

      // Vista previa en HTML
      document.getElementById("pv-total").textContent = total;
      document.getElementById("pv-foto").textContent = conFoto;
      document.getElementById("pv-dias").textContent = esDiario ? nEmps : nDias;
      document.getElementById("lbl-dias").textContent = esDiario ? "Empleados" : "Días activos";
      document.getElementById("pv-inc").textContent = incs.length;
      document.getElementById("preview").style.display = "block";

      if (total === 0 && incs.length === 0) {
        msg.textContent = "No hay datos para ese edificio en ese período."; msg.className = "mensaje error"; return;
      }

      msg.textContent = "Generando PDF..."; msg.className = "mensaje cargando";
      try {
        var datos = { total: total, conFoto: conFoto, nDias: nDias, nEmps: nEmps, esDiario: esDiario,
                      nAreasCubiertas: nAreasCubiertas, nAreasTotal: nAreasTotal, incResueltas: incResueltas };
        if (esSemanal) {
          crearPDFSemanal(edificio, periodo, regs, incs, datos);
        } else if (esMensual) {
          crearPDFMensual(edificio, periodo, regs, incs, datos);
        } else {
          crearPDF(edificio, periodo, regs, incs, datos);
        }
        msg.textContent = "✓ PDF generado y descargado"; msg.className = "mensaje ok";
      } catch (e) {
        console.error(e);
        msg.textContent = "Error al generar el PDF: " + e.message; msg.className = "mensaje error";
      }
    }

    // ============================================================
    //          INFORME DIARIO (estilo mockup)
    // ============================================================
    function crearPDF(edificio, periodo, regs, incs, resumen) {
      var jsPDF = window.jspdf.jsPDF;
      var doc = new jsPDF();
      var pageW = doc.internal.pageSize.getWidth();

      // CABECERA
      var y = dibujarCabecera(doc, "Informe diario de limpieza", [
        { icono: 'pin',   texto: edificio },
        { icono: 'cal',   texto: "Período: " + nombrePeriodo(periodo) },
        { icono: 'reloj', texto: "Generado: " + fmtFechaCorta() }
      ]);

      // 4 TARJETAS DE MÉTRICAS (como en el mockup)
      var cards = [
        { icono: 'escoba',  color: PDF_COLORS.azul,  valor: resumen.total,    etiqueta: "Áreas limpiadas" },
        { icono: 'camara',  color: PDF_COLORS.verde, valor: resumen.conFoto,  etiqueta: "Con foto" },
        { icono: 'persona', color: PDF_COLORS.ambar, valor: resumen.nEmps,    etiqueta: "Empleados" },
        { icono: 'alerta',  color: PDF_COLORS.rojo,  valor: incs.length,      etiqueta: "Incidencias" }
      ];
      y = dibujarTarjetasMetricas(doc, y, cards);

      // DETALLE DE LIMPIEZAS
      y = dibujarTituloSeccion(doc, y + 4, "edificio", "Detalle de limpiezas");

      var cols = [
        { label: "Fecha/Hora", width: 40, get: function(r){ return fmtFecha(r.created_at); } },
        { label: "Área",       width: 55, get: function(r){ return r.area || ""; } },
        { label: "Empleado",   width: 55, get: function(r){ return r.nombre_empleado || ""; } },
        { label: "Foto",       width: 32, align: "right", tipo: "boton-ver" }
      ];
      y = dibujarTablaCabecera(doc, y, cols);

      if (regs.length === 0) {
        textRGB(doc, PDF_COLORS.textoSoft);
        doc.setFontSize(9.5); doc.setFont(undefined, "italic");
        doc.text("No se registraron limpiezas en este período.", 20, y + 4);
        y += 12;
      } else {
        regs.forEach(function(reg) {
          if (y > 240) { doc.addPage(); y = 22; }
          y = dibujarFilaTabla(doc, y, cols, reg);
        });
      }

      // INCIDENCIAS REPORTADAS
      y += 8;
      if (y > 230) { doc.addPage(); y = 22; }
      y = dibujarTituloSeccion(doc, y, "alerta", "Incidencias reportadas");

      if (incs.length === 0) {
        y = dibujarEstadoVacioVerde(doc, y, "No se reportaron incidencias en este período.");
      } else {
        incs.forEach(function(inc) {
          if (y > 240) { doc.addPage(); y = 22; }
          y = dibujarFilaIncidencia(doc, y, inc);
        });
      }

      // PIE
      dibujarPie(doc, y, "Los enlaces 'Ver' abren la foto del registro.");

      var nombreArch = "Informe_diario_" + edificio.replace(/[^a-zA-Z0-9]/g, "_") + ".pdf";
      doc.save(nombreArch);
    }

    // ============================================================
    //          INFORME SEMANAL (estilo mockup)
    // ============================================================
    function crearPDFSemanal(edificio, periodo, regs, incs, datos) {
      var jsPDF = window.jspdf.jsPDF;
      var doc = new jsPDF();
      var pageW = doc.internal.pageSize.getWidth();

      var y = dibujarCabecera(doc, "Informe semanal de limpieza", [
        { icono: 'pin',   texto: edificio },
        { icono: 'cal',   texto: "Período: " + nombrePeriodo(periodo) },
        { icono: 'reloj', texto: "Generado: " + fmtFechaCorta() }
      ]);

      // 4 tarjetas
      var areasCobertura = datos.nAreasTotal > 0
        ? (datos.nAreasCubiertas + "/" + datos.nAreasTotal)
        : String(datos.nAreasCubiertas);
      var cards = [
        { icono: 'escoba',   color: PDF_COLORS.azul,  valor: datos.total,        etiqueta: "Limpiezas" },
        { icono: 'reloj',    color: PDF_COLORS.verde, valor: datos.nDias,        etiqueta: "Días trabajados" },
        { icono: 'edificio', color: PDF_COLORS.ambar, valor: areasCobertura,     etiqueta: "Áreas cubiertas" },
        { icono: 'alerta',   color: PDF_COLORS.rojo,  valor: incs.length,        etiqueta: "Incidencias" }
      ];
      y = dibujarTarjetasMetricas(doc, y, cards);

      // ACTIVIDAD POR DÍA (barras horizontales)
      y = dibujarTituloSeccion(doc, y + 4, "reloj", "Actividad por día");

      var r = rangoFechas(periodo);
      var diasArr = [];
      var nombresDia = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
      var cursor = new Date(r.inicio); cursor.setHours(0,0,0,0);
      for (var i = 0; i < 7; i++) {
        var key = cursor.getFullYear()+"-"+cursor.getMonth()+"-"+cursor.getDate();
        var etiqueta = nombresDia[cursor.getDay()] + " " + cursor.getDate();
        diasArr.push({ key: key, etiqueta: etiqueta, count: 0 });
        cursor.setDate(cursor.getDate() + 1);
      }
      regs.forEach(function(reg){
        var f = new Date(reg.created_at);
        var key = f.getFullYear()+"-"+f.getMonth()+"-"+f.getDate();
        var d = diasArr.find(function(x){ return x.key === key; });
        if (d) d.count++;
      });
      var maxLimp = Math.max.apply(null, diasArr.map(function(d){ return d.count; }));
      if (maxLimp === 0) maxLimp = 1;
      var barMax = pageW - 80;

      diasArr.forEach(function(d){
        textRGB(doc, PDF_COLORS.texto);
        doc.setFontSize(9); doc.setFont(undefined, "bold");
        doc.text(d.etiqueta, 18, y + 4);

        // Barra de fondo
        fillRGB(doc, PDF_COLORS.bordeSuave);
        doc.roundedRect(40, y + 1, barMax, 5, 1, 1, "F");
        // Barra de valor
        if (d.count > 0) {
          var w = (d.count / maxLimp) * barMax;
          fillRGB(doc, PDF_COLORS.azul);
          doc.roundedRect(40, y + 1, w, 5, 1, 1, "F");
        }

        // Etiqueta del conteo a la derecha
        textRGB(doc, d.count > 0 ? PDF_COLORS.texto : PDF_COLORS.textoSoft);
        doc.setFontSize(9); doc.setFont(undefined, "normal");
        var tx = d.count > 0
          ? (d.count + (d.count === 1 ? " limpieza" : " limpiezas"))
          : "Sin actividad";
        doc.text(tx, pageW - 18, y + 4, { align: "right" });

        y += 9;
      });

      // INCIDENCIAS
      y += 6;
      if (y > 230) { doc.addPage(); y = 22; }
      y = dibujarTituloSeccion(doc, y, "alerta", "Incidencias de la semana");

      if (incs.length === 0) {
        y = dibujarEstadoVacioVerde(doc, y, "No se reportaron incidencias esta semana.");
      } else {
        // Resumen breve
        textRGB(doc, PDF_COLORS.textoSoft);
        doc.setFontSize(9.5); doc.setFont(undefined, "italic");
        doc.text("Se detectaron " + incs.length + " incidencia(s), de las cuales " + datos.incResueltas + " ya están resueltas.", 18, y);
        y += 7;
        incs.forEach(function(inc){
          if (y > 245) { doc.addPage(); y = 22; }
          y = dibujarFilaIncidencia(doc, y, inc);
        });
      }

      dibujarPie(doc, y, null);
      doc.save("Informe_semanal_" + edificio.replace(/[^a-zA-Z0-9]/g, "_") + ".pdf");
    }

    // ============================================================
    //          INFORME MENSUAL (estilo mockup)
    // ============================================================
    function crearPDFMensual(edificio, periodo, regs, incs, datos) {
      var jsPDF = window.jspdf.jsPDF;
      var doc = new jsPDF();
      var pageW = doc.internal.pageSize.getWidth();

      var y = dibujarCabecera(doc, "Informe mensual de limpieza", [
        { icono: 'pin',   texto: edificio },
        { icono: 'cal',   texto: "Período: " + nombrePeriodo(periodo) },
        { icono: 'reloj', texto: "Generado: " + fmtFechaCorta() }
      ]);

      // Mensaje de resumen positivo en banner verde
      var pctInc = incs.length > 0 ? Math.round((datos.incResueltas / incs.length) * 100) : 100;
      fillRGB(doc, PDF_COLORS.panelVerde);
      doc.roundedRect(14, y, pageW - 28, 12, 3, 3, "F");
      textRGB(doc, PDF_COLORS.verdeTexto);
      doc.setFontSize(10); doc.setFont(undefined, "bold");
      doc.text(datos.total + " limpiezas realizadas este mes  ·  " + pctInc + "% de incidencias resueltas",
               pageW/2, y + 7.5, { align: "center" });
      y += 16;

      // 4 tarjetas grandes
      var areasCobertura = datos.nAreasTotal > 0
        ? (datos.nAreasCubiertas + "/" + datos.nAreasTotal)
        : String(datos.nAreasCubiertas);
      var cards = [
        { icono: 'escoba',   color: PDF_COLORS.azul,  valor: datos.total,            etiqueta: "Limpiezas realizadas" },
        { icono: 'reloj',    color: PDF_COLORS.verde, valor: datos.nDias,            etiqueta: "Días trabajados" },
        { icono: 'edificio', color: PDF_COLORS.ambar, valor: areasCobertura,         etiqueta: "Áreas cubiertas" },
        { icono: 'check',    color: PDF_COLORS.verde, valor: datos.incResueltas + "/" + incs.length, etiqueta: "Incid. resueltas" }
      ];
      y = dibujarTarjetasMetricas(doc, y, cards);

      // ACTIVIDAD POR SEMANA (barras)
      y = dibujarTituloSeccion(doc, y + 4, "reloj", "Actividad por semana");

      var r = rangoFechas(periodo);
      var semanas = [];
      var ini = new Date(r.inicio); ini.setHours(0,0,0,0);
      var finMes = new Date(r.fin);
      var idx = 1;
      var cur = new Date(ini);
      while (cur <= finMes) {
        var desde = new Date(cur);
        var hasta = new Date(cur); hasta.setDate(hasta.getDate() + 6); hasta.setHours(23,59,59);
        semanas.push({ sem: "Semana " + idx, desde: desde, hasta: hasta, count: 0 });
        cur.setDate(cur.getDate() + 7);
        idx++;
      }
      regs.forEach(function(reg){
        var f = new Date(reg.created_at);
        for (var i = 0; i < semanas.length; i++) {
          if (f >= semanas[i].desde && f <= semanas[i].hasta) { semanas[i].count++; break; }
        }
      });
      var maxSem = Math.max.apply(null, semanas.map(function(s){ return s.count; }));
      if (maxSem === 0) maxSem = 1;
      var barMax = pageW - 90;

      semanas.forEach(function(s){
        textRGB(doc, PDF_COLORS.texto);
        doc.setFontSize(9); doc.setFont(undefined, "bold");
        doc.text(s.sem, 18, y + 4);

        fillRGB(doc, PDF_COLORS.bordeSuave);
        doc.roundedRect(45, y + 1, barMax, 5, 1, 1, "F");

        if (s.count > 0) {
          var w = (s.count / maxSem) * barMax;
          fillRGB(doc, PDF_COLORS.verde);
          doc.roundedRect(45, y + 1, w, 5, 1, 1, "F");
        }

        textRGB(doc, s.count > 0 ? PDF_COLORS.texto : PDF_COLORS.textoSoft);
        doc.setFontSize(9); doc.setFont(undefined, "normal");
        var tx = s.count > 0 ? (s.count + " limpiezas") : "—";
        doc.text(tx, pageW - 18, y + 4, { align: "right" });

        y += 9;
      });

      // ÁREAS MÁS ATENDIDAS
      y += 6;
      if (y > 220) { doc.addPage(); y = 22; }
      y = dibujarTituloSeccion(doc, y, "edificio", "Áreas más atendidas");

      var conteoAreas = {};
      regs.forEach(function(reg){ var a = reg.area || "Sin área"; conteoAreas[a] = (conteoAreas[a] || 0) + 1; });
      var topAreas = Object.keys(conteoAreas).map(function(k){ return { area: k, veces: conteoAreas[k] }; });
      topAreas.sort(function(a,b){ return b.veces - a.veces; });
      topAreas = topAreas.slice(0, 5);

      if (topAreas.length === 0) {
        textRGB(doc, PDF_COLORS.textoSoft);
        doc.setFontSize(9.5); doc.setFont(undefined, "italic");
        doc.text("Sin datos de áreas en este período.", 18, y + 3);
        y += 10;
      } else {
        topAreas.forEach(function(a, i){
          fillRGB(doc, i === 0 ? PDF_COLORS.cabeceraBg : PDF_COLORS.blanco);
          doc.roundedRect(14, y, pageW - 28, 8, 1.5, 1.5, "F");
          textRGB(doc, PDF_COLORS.azulOsc);
          doc.setFontSize(9.5); doc.setFont(undefined, "bold");
          doc.text((i+1) + ".", 18, y + 5);
          textRGB(doc, PDF_COLORS.texto);
          doc.setFont(undefined, "normal");
          var nombreArea = a.area.length > 40 ? a.area.substring(0, 39) + "…" : a.area;
          doc.text(nombreArea, 24, y + 5);
          textRGB(doc, PDF_COLORS.textoSoft);
          doc.setFontSize(9);
          doc.text(a.veces + (a.veces === 1 ? " vez" : " veces"), pageW - 18, y + 5, { align: "right" });
          y += 10;
        });
      }

      // INCIDENCIAS
      y += 6;
      if (y > 220) { doc.addPage(); y = 22; }
      y = dibujarTituloSeccion(doc, y, "alerta", "Incidencias del mes");

      if (incs.length === 0) {
        y = dibujarEstadoVacioVerde(doc, y, "No se reportaron incidencias este mes.");
      } else {
        textRGB(doc, PDF_COLORS.textoSoft);
        doc.setFontSize(9.5); doc.setFont(undefined, "italic");
        doc.text("Se detectaron " + incs.length + " incidencia(s), con " + datos.incResueltas + " resueltas (" + pctInc + "%).", 18, y);
        y += 7;
        incs.forEach(function(inc){
          if (y > 245) { doc.addPage(); y = 22; }
          y = dibujarFilaIncidencia(doc, y, inc);
        });
      }

      // Espacio para comentarios del property manager
      y += 8;
      if (y > 230) { doc.addPage(); y = 22; }
      strokeRGB(doc, PDF_COLORS.borde);
      doc.setLineWidth(0.4);
      fillRGB(doc, PDF_COLORS.cabeceraBg);
      doc.roundedRect(14, y, pageW - 28, 32, 3, 3, "FD");
      textRGB(doc, PDF_COLORS.azulOsc);
      doc.setFontSize(10); doc.setFont(undefined, "bold");
      doc.text("Comentarios del property manager:", 20, y + 7);
      strokeRGB(doc, PDF_COLORS.borde);
      doc.setLineWidth(0.3);
      doc.line(20, y + 17, pageW - 20, y + 17);
      doc.line(20, y + 25, pageW - 20, y + 25);
      y += 36;

      dibujarPie(doc, y, null);
      doc.save("Informe_mensual_" + edificio.replace(/[^a-zA-Z0-9]/g, "_") + ".pdf");
    }

    verificarAcceso();
  </script>
</body>
</html>
