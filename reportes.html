<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanTrack — Reportes</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --verde: #1D9E75; --verde-claro: #EAF3DE; --verde-texto: #0F6E56;
      --azul: #185FA5; --azul-claro: #E6F1FB;
      --gris-fondo: #F5F4EF; --gris-texto: #6B6A64; --gris-borde: #E2E0D8;
      --texto: #2C2C2A; --blanco: #FFFFFF; --rojo: #A32D2D; --rojo-claro: #FCEBEB;
      --ambar-claro: #FAEEDA; --ambar-texto: #854F0B;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--gris-fondo); color: var(--texto); min-height: 100vh; padding: 20px; }
    .contenedor { max-width: 600px; margin: 0 auto; display: none; }
    .verificando { max-width: 600px; margin: 60px auto; text-align: center; color: var(--gris-texto); font-size: 15px; }

    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .top .marca { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gris-texto); font-weight: 600; }
    .top h1 { font-size: 22px; font-weight: 600; margin-top: 2px; }
    .top-botones { display: flex; gap: 8px; }
    .btn-salir { background: transparent; color: var(--gris-texto); border: 1.5px solid var(--gris-borde); padding: 10px 16px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }

    .tarjeta { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    .tarjeta h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .tarjeta .sub { font-size: 13px; color: var(--gris-texto); margin-bottom: 18px; }

    label { display: block; font-size: 13px; font-weight: 600; color: var(--gris-texto); margin-bottom: 6px; }
    select, input[type="date"] { width: 100%; padding: 13px; font-size: 16px; border: 1.5px solid var(--gris-borde); border-radius: 12px; margin-bottom: 16px; outline: none; background: var(--blanco); color: var(--texto); cursor: pointer; }
    select:focus, input[type="date"]:focus { border-color: var(--azul); }

    .btn-generar { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; background: #3C993C; color: #fff; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-generar:active { transform: scale(0.98); }
    .btn-generar:disabled { opacity: 0.6; }

    .preview { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 16px; padding: 20px; margin-bottom: 20px; display: none; }
    .preview h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .preview-metricas { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .pm { background: var(--gris-fondo); border-radius: 12px; padding: 14px; text-align: center; }
    .pm .v { font-size: 22px; font-weight: 600; }
    .pm .v.inc { color: var(--ambar-texto); }
    .pm .l { font-size: 10px; color: var(--gris-texto); margin-top: 2px; }

    .mensaje { text-align: center; font-size: 13px; margin-top: 12px; padding: 10px; border-radius: 10px; display: none; }
    .mensaje.ok { background: var(--verde-claro); color: var(--verde-texto); display: block; }
    .mensaje.error { background: var(--rojo-claro); color: var(--rojo); display: block; }
    .mensaje.cargando { background: var(--azul-claro); color: var(--azul); display: block; }
  </style>
</head>
<body>

  <div class="verificando" id="verificando">Verificando sesión...</div>

  <div class="contenedor" id="contenedor">

    <div class="top">
      <div>
        <div class="marca">CleanTrack</div>
        <h1>Reportes</h1>
      </div>
      <div class="top-botones">
        <a class="btn-salir" href="inicio.html">← Inicio</a>
        <button class="btn-salir" onclick="salir()">Salir</button>
      </div>
    </div>

    <div class="tarjeta">
      <h2>Generar informe</h2>
      <div class="sub">Crea un informe en PDF para presentar al property manager</div>

      <label for="sel-edificio">Edificio</label>
      <select id="sel-edificio"><option value="">Cargando...</option></select>

      <label for="sel-periodo">Tipo de informe</label>
      <select id="sel-periodo" onchange="cambioPeriodo()">
        <option value="diario">Diario (un día)</option>
        <option value="7-dias">Semanal (últimos 7 días)</option>
        <option value="mes-actual">Mensual (este mes)</option>
        <option value="mes-pasado">Mensual (mes pasado)</option>
      </select>

      <div id="cont-fecha" style="display:none;">
        <label for="sel-fecha">Día del informe</label>
        <input type="date" id="sel-fecha" min="2020-01-01" max="2040-12-31" />
        <!-- El max se ajusta automaticamente a hoy al cargar (ver script) -->
      </div>

      <button class="btn-generar" id="btn-generar" onclick="generar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg> Generar PDF</button>
      <div class="mensaje" id="mensaje"></div>
    </div>

    <div class="preview" id="preview">
      <h2>Vista previa del informe</h2>
      <div class="preview-metricas">
        <div class="pm"><div class="v" id="pv-total">—</div><div class="l">Áreas limpiadas</div></div>
        <div class="pm"><div class="v" id="pv-foto">—</div><div class="l">Con foto</div></div>
        <div class="pm"><div class="v" id="pv-dias">—</div><div class="l" id="lbl-dias">Días activos</div></div>
        <div class="pm"><div class="v inc" id="pv-inc">—</div><div class="l">Incidencias</div></div>
      </div>
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://saoirivninhucrkhckaj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_DeKuX1LvrvruEXzfPvumnw_g5N1Jw4k";

    let db = null;
    try {
      const { createClient } = supabase;
      db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) { console.error(e); }

    var todosRegistros = [];
    var todasIncidencias = [];

    async function verificarAcceso() {
      if (!db) { document.getElementById("verificando").textContent = "Sin conexión."; return; }
      const { data } = await db.auth.getSession();
      if (!data.session) { window.location.href = "login.html"; return; }

      try {
        const { data: planData, error } = await db.rpc("mi_plan");
        var plan = (!error && planData) ? String(planData).toLowerCase().trim() : "basico";
        if (plan !== "pro") { window.location.href = "inicio.html"; return; }
      } catch (e) { window.location.href = "inicio.html"; return; }

      document.getElementById("verificando").style.display = "none";
      document.getElementById("contenedor").style.display = "block";
      // Fecha de hoy por defecto en el selector de día
      var hoy = new Date();
      var hoyStr = hoy.getFullYear() + "-" + String(hoy.getMonth()+1).padStart(2,"0") + "-" + String(hoy.getDate()).padStart(2,"0");
      var campoFecha = document.getElementById("sel-fecha");
      campoFecha.value = hoyStr;
      campoFecha.max = hoyStr;
      cambioPeriodo();
      cargarTodo();
    }

    async function salir() {
      if (db) await db.auth.signOut();
      window.location.href = "login.html";
    }

    function cambioPeriodo() {
      var periodo = document.getElementById("sel-periodo").value;
      document.getElementById("cont-fecha").style.display = (periodo === "diario") ? "block" : "none";
    }

    var todasAreas = [];

    async function cargarTodo() {
      const reg = await db.from("registros").select("*").order("created_at", { ascending: false });
      todosRegistros = (reg.data) || [];
      const inc = await db.from("incidencias").select("*").order("created_at", { ascending: false });
      todasIncidencias = (inc.data) || [];
      const ar = await db.from("areas").select("*");
      todasAreas = (ar.data) || [];

      var edificios = {};
      todosRegistros.forEach(function(r){ edificios[r.edificio || "Sin edificio"] = true; });
      todasIncidencias.forEach(function(i){ edificios[i.edificio || "Sin edificio"] = true; });
      var lista = Object.keys(edificios).sort();
      var sel = document.getElementById("sel-edificio");
      if (lista.length === 0) {
        sel.innerHTML = '<option value="">No hay datos aún</option>';
      } else {
        sel.innerHTML = "";
        lista.forEach(function(e){
          var o = document.createElement("option"); o.value = e; o.textContent = e; sel.appendChild(o);
        });
      }
    }

    function rangoFechas(periodo) {
      var ahora = new Date();
      var inicio, fin = new Date();
      if (periodo === "diario") {
        var val = document.getElementById("sel-fecha").value;
        var partes = val.split("-");
        inicio = new Date(partes[0], partes[1]-1, partes[2], 0, 0, 0);
        fin = new Date(partes[0], partes[1]-1, partes[2], 23, 59, 59);
      } else if (periodo === "mes-actual") {
        inicio = new Date(ahora.getFullYear(), ahora.getMonth(), 1);
      } else if (periodo === "mes-pasado") {
        inicio = new Date(ahora.getFullYear(), ahora.getMonth() - 1, 1);
        fin = new Date(ahora.getFullYear(), ahora.getMonth(), 0, 23, 59, 59);
      } else {
        inicio = new Date(); inicio.setDate(inicio.getDate() - 6); inicio.setHours(0,0,0,0);
      }
      return { inicio: inicio, fin: fin };
    }

    function nombrePeriodo(periodo) {
      var meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
      var ahora = new Date();
      if (periodo === "diario") {
        var val = document.getElementById("sel-fecha").value;
        var partes = val.split("-");
        return partes[2] + " de " + meses[partes[1]-1] + " " + partes[0];
      }
      if (periodo === "mes-actual") return meses[ahora.getMonth()] + " " + ahora.getFullYear();
      if (periodo === "mes-pasado") { var m = ahora.getMonth() - 1; var y = ahora.getFullYear(); if (m < 0) { m = 11; y--; } return meses[m] + " " + y; }
      return "últimos 7 días";
    }

    function fmtFecha(iso) {
      var f = new Date(iso);
      var dd = f.getDate(); var mm = f.getMonth() + 1; var hh = f.getHours(); var mi = f.getMinutes();
      var ampm = hh >= 12 ? "pm" : "am"; hh = hh % 12; if (hh === 0) hh = 12;
      return (dd<10?"0":"")+dd + "/" + (mm<10?"0":"")+mm + " " + hh + ":" + (mi<10?"0":"")+mi + ampm;
    }

    function generar() {
      var edificio = document.getElementById("sel-edificio").value;
      var periodo = document.getElementById("sel-periodo").value;
      var msg = document.getElementById("mensaje");

      if (!edificio) { msg.textContent = "Selecciona un edificio."; msg.className = "mensaje error"; return; }

      var r = rangoFechas(periodo);
      var regs = todosRegistros.filter(function(reg){
        var f = new Date(reg.created_at);
        return (reg.edificio || "Sin edificio") === edificio && f >= r.inicio && f <= r.fin;
      });
      regs.sort(function(a,b){ return new Date(a.created_at) - new Date(b.created_at); });

      var incs = todasIncidencias.filter(function(inc){
        var f = new Date(inc.created_at);
        return (inc.edificio || "Sin edificio") === edificio && f >= r.inicio && f <= r.fin;
      });
      incs.sort(function(a,b){ return new Date(a.created_at) - new Date(b.created_at); });

      var total = regs.length;
      var conFoto = regs.filter(function(x){ return x.con_foto; }).length;
      var dias = {};
      regs.forEach(function(x){ var f = new Date(x.created_at); dias[f.getFullYear()+"-"+f.getMonth()+"-"+f.getDate()] = true; });
      var nDias = Object.keys(dias).length;

      // Empleados únicos que trabajaron (para informe diario)
      var emps = {};
      regs.forEach(function(x){ if (x.nombre_empleado) emps[x.nombre_empleado] = true; });
      var nEmps = Object.keys(emps).length;

      var esDiario = (periodo === "diario");
      var esSemanal = (periodo === "7-dias");
      var esMensual = (periodo === "mes-actual" || periodo === "mes-pasado");

      // Datos extra para el semanal
      var areasCubiertas = {};
      regs.forEach(function(x){ if (x.area) areasCubiertas[x.area] = true; });
      var nAreasCubiertas = Object.keys(areasCubiertas).length;
      var areasDelEdificio = todasAreas.filter(function(a){ return (a.edificio || "") === edificio; });
      var nAreasTotal = areasDelEdificio.length;
      var incResueltas = incs.filter(function(i){ return i.resuelto; }).length;

      document.getElementById("pv-total").textContent = total;
      document.getElementById("pv-foto").textContent = conFoto;
      document.getElementById("pv-dias").textContent = esDiario ? nEmps : nDias;
      document.getElementById("lbl-dias").textContent = esDiario ? "Empleados" : "Días activos";
      document.getElementById("pv-inc").textContent = incs.length;
      document.getElementById("preview").style.display = "block";

      if (total === 0 && incs.length === 0) {
        msg.textContent = "No hay datos para ese edificio en ese período."; msg.className = "mensaje error"; return;
      }

      msg.textContent = "Generando PDF..."; msg.className = "mensaje cargando";
      try {
        var datos = { total: total, conFoto: conFoto, nDias: nDias, nEmps: nEmps, esDiario: esDiario,
                      nAreasCubiertas: nAreasCubiertas, nAreasTotal: nAreasTotal, incResueltas: incResueltas };
        if (esSemanal) {
          crearPDFSemanal(edificio, periodo, regs, incs, datos);
        } else if (esMensual) {
          crearPDFMensual(edificio, periodo, regs, incs, datos);
        } else {
          crearPDF(edificio, periodo, regs, incs, datos);
        }
        msg.textContent = "✓ PDF generado y descargado"; msg.className = "mensaje ok";
      } catch (e) {
        console.error(e);
        msg.textContent = "Error al generar el PDF: " + e.message; msg.className = "mensaje error";
      }
    }

    function crearPDFMensual(edificio, periodo, regs, incs, datos) {
      var jsPDF = window.jspdf.jsPDF;
      var doc = new jsPDF();
      var pageW = doc.internal.pageSize.getWidth();
      var y = 0;

      // ENCABEZADO celebratorio (verde)
      doc.setFillColor(29, 158, 117);
      doc.rect(0, 0, pageW, 46, "F");
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(13); doc.setFont(undefined, "bold");
      doc.text("CleanTrack", 14, 16);
      doc.setFontSize(22); doc.setFont(undefined, "bold");
      doc.text("Resumen del mes", 14, 30);
      doc.setFontSize(13); doc.setFont(undefined, "normal");
      doc.text(edificio + "  ·  " + nombrePeriodo(periodo), 14, 40);

      // Mensaje positivo destacado
      y = 56;
      var pctInc = incs.length > 0 ? Math.round((datos.incResueltas / incs.length) * 100) : 100;
      doc.setFillColor(234, 243, 222);
      doc.roundedRect(14, y, pageW - 28, 16, 3, 3, "F");
      doc.setTextColor(15, 110, 86);
      doc.setFontSize(10.5); doc.setFont(undefined, "bold");
      var msjPos = "Un mes de servicio dedicado: " + datos.total + " limpiezas realizadas y " + pctInc + "% de incidencias resueltas.";
      doc.text(msjPos, pageW/2, y + 10, { align: "center" });

      // TARJETAS GRANDES de logros (2x2)
      y += 26;
      function tarjeta(x, yy, w, h, color, valor, etiqueta) {
        doc.setFillColor(color[0], color[1], color[2]);
        doc.roundedRect(x, yy, w, h, 3, 3, "F");
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(26); doc.setFont(undefined, "bold");
        doc.text(String(valor), x + w/2, yy + h/2 + 1, { align: "center" });
        doc.setFontSize(9); doc.setFont(undefined, "normal");
        doc.text(etiqueta, x + w/2, yy + h - 6, { align: "center" });
      }
      var gap = 8;
      var cardW = (pageW - 28 - gap) / 2;
      var cardH = 30;
      tarjeta(14, y, cardW, cardH, [24,95,165], datos.total, "Limpiezas realizadas");
      tarjeta(14 + cardW + gap, y, cardW, cardH, [29,158,117], datos.nDias, "Días trabajados");
      y += cardH + gap;
      var cobertura = datos.nAreasTotal > 0 ? (datos.nAreasCubiertas + " / " + datos.nAreasTotal) : String(datos.nAreasCubiertas);
      tarjeta(14, y, cardW, cardH, [186,117,23], cobertura, "Áreas cubiertas");
      tarjeta(14 + cardW + gap, y, cardW, cardH, [83,74,183], datos.incResueltas + " / " + incs.length, "Incidencias resueltas");

      // TENDENCIA POR SEMANA
      y += cardH + 16;
      doc.setTextColor(44, 44, 42);
      doc.setFontSize(13); doc.setFont(undefined, "bold");
      doc.text("Actividad por semana", 14, y);
      y += 10;
      // Agrupar registros en semanas del mes (bloques de 7 días desde el inicio)
      var r = rangoFechas(periodo);
      var semanas = [];
      var ini = new Date(r.inicio); ini.setHours(0,0,0,0);
      var finMes = new Date(r.fin);
      var idx = 1;
      var cur = new Date(ini);
      while (cur <= finMes) {
        var desde = new Date(cur);
        var hasta = new Date(cur); hasta.setDate(hasta.getDate() + 6); hasta.setHours(23,59,59);
        semanas.push({ sem: "Semana " + idx, desde: desde, hasta: hasta, count: 0 });
        cur.setDate(cur.getDate() + 7);
        idx++;
      }
      regs.forEach(function(reg){
        var f = new Date(reg.created_at);
        for (var i = 0; i < semanas.length; i++) {
          if (f >= semanas[i].desde && f <= semanas[i].hasta) { semanas[i].count++; break; }
        }
      });
      var maxSem = Math.max.apply(null, semanas.map(function(s){ return s.count; }));
      if (maxSem === 0) maxSem = 1;
      var barMax = pageW - 90;
      semanas.forEach(function(s){
        doc.setFontSize(9.5); doc.setFont(undefined, "normal"); doc.setTextColor(44, 44, 42);
        doc.text(s.sem, 16, y + 4);
        var w = s.count === 0 ? 0 : (s.count / maxSem) * barMax;
        if (w > 0) { doc.setFillColor(29, 158, 117); doc.roundedRect(48, y, w, 7, 1, 1, "F"); }
        if (w > 16) { doc.setTextColor(255,255,255); doc.setFontSize(8.5); doc.setFont(undefined, "bold"); doc.text(String(s.count), 48 + w - 8, y + 5); }
        else { doc.setTextColor(107,106,100); doc.setFontSize(8.5); doc.text(String(s.count), 48 + w + 3, y + 5); }
        y += 12;
      });

      // AREAS MAS ATENDIDAS
      y += 6;
      doc.setTextColor(44, 44, 42);
      doc.setFontSize(13); doc.setFont(undefined, "bold");
      doc.text("Áreas más atendidas", 14, y);
      y += 9;
      var conteoAreas = {};
      regs.forEach(function(reg){ var a = reg.area || "Sin área"; conteoAreas[a] = (conteoAreas[a] || 0) + 1; });
      var topAreas = Object.keys(conteoAreas).map(function(k){ return { area: k, veces: conteoAreas[k] }; });
      topAreas.sort(function(a,b){ return b.veces - a.veces; });
      topAreas = topAreas.slice(0, 5);
      if (topAreas.length === 0) {
        doc.setFontSize(9.5); doc.setFont(undefined, "normal"); doc.setTextColor(107,106,100);
        doc.text("Sin datos de áreas en este período.", 16, y); y += 8;
      } else {
        topAreas.forEach(function(a, i){
          doc.setFontSize(9.5); doc.setFont(undefined, "normal");
          doc.setTextColor(60, 60, 58);
          doc.text((i+1) + ".  " + a.area.substring(0,40), 16, y + 3);
          doc.setTextColor(107, 106, 100);
          doc.text(a.veces + (a.veces === 1 ? " vez" : " veces"), pageW - 40, y + 3);
          y += 8;
        });
      }

      // ===== PAGINA 2: incidencias + feedback =====
      doc.addPage();
      y = 24;
      doc.setTextColor(44, 44, 42);
      doc.setFontSize(14); doc.setFont(undefined, "bold");
      doc.text("Incidencias del mes", 14, y);
      y += 10;
      if (incs.length === 0) {
        doc.setFontSize(10); doc.setFont(undefined, "normal"); doc.setTextColor(107,106,100);
        doc.text("No se reportaron incidencias este mes.", 16, y); y += 8;
      } else {
        doc.setFontSize(10); doc.setFont(undefined, "normal"); doc.setTextColor(60,60,58);
        doc.text("Se detectaron " + incs.length + " incidencia(s) y se resolvieron " + datos.incResueltas + " (" + pctInc + "%).", 16, y);
        y += 9;
        incs.forEach(function(inc){
          if (y > 275) { doc.addPage(); y = 20; }
          var esInsumo = inc.tipo === "insumo";
          if (inc.resuelto) doc.setTextColor(15, 110, 86); else doc.setTextColor(133, 79, 11);
          doc.setFontSize(9.5);
          var txt = "• " + (esInsumo ? "Falta insumo" : "Problema") + ": " + (inc.descripcion || "");
          if (inc.area) txt += " (" + inc.area + ")";
          txt += " - " + (inc.resuelto ? "Resuelta" : "Pendiente");
          var lineas = doc.splitTextToSize(txt, pageW - 36);
          doc.text(lineas, 18, y);
          y += lineas.length * 5 + 1;
        });
      }

      // ESPACIO PARA FEEDBACK DEL PROPERTY MANAGER
      y += 12;
      if (y > 235) { doc.addPage(); y = 20; }
      doc.setDrawColor(200, 198, 190);
      doc.setFillColor(250, 249, 245);
      doc.roundedRect(14, y, pageW - 28, 40, 3, 3, "FD");
      doc.setTextColor(107, 106, 100);
      doc.setFontSize(11); doc.setFont(undefined, "bold");
      doc.text("Sus comentarios sobre el servicio:", 18, y + 9);
      doc.setDrawColor(210, 208, 200);
      doc.line(18, y + 20, pageW - 18, y + 20);
      doc.line(18, y + 30, pageW - 18, y + 30);

      // Pie
      y += 50;
      if (y > 285) { doc.addPage(); y = 20; }
      doc.setTextColor(107, 106, 100); doc.setFontSize(8);
      doc.text("Informe generado por CleanTrack — " + nombrePeriodo(periodo), 14, y);

      doc.save("Informe_mensual_" + edificio.replace(/[^a-zA-Z0-9]/g, "_") + ".pdf");
    }

    function crearPDFSemanal(edificio, periodo, regs, incs, datos) {
      var jsPDF = window.jspdf.jsPDF;
      var doc = new jsPDF();
      var pageW = doc.internal.pageSize.getWidth();
      var y = 0;

      // Encabezado
      doc.setFillColor(24, 95, 165);
      doc.rect(0, 0, pageW, 38, "F");
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(20); doc.setFont(undefined, "bold");
      doc.text("CleanTrack", 14, 18);
      doc.setFontSize(11); doc.setFont(undefined, "normal");
      doc.text("Informe semanal de limpieza", 14, 27);

      y = 50;
      doc.setTextColor(44, 44, 42);
      doc.setFontSize(15); doc.setFont(undefined, "bold");
      doc.text(edificio, 14, y);
      y += 7;
      doc.setFontSize(11); doc.setFont(undefined, "normal");
      doc.setTextColor(107, 106, 100);
      doc.text("Período: " + nombrePeriodo(periodo), 14, y);
      y += 5;
      doc.text("Generado: " + new Date().toLocaleDateString("es"), 14, y);

      // Panel de desempeño (4 indicadores)
      y += 14;
      doc.setFillColor(245, 244, 239);
      doc.roundedRect(14, y, pageW - 28, 26, 3, 3, "F");
      var colW = (pageW - 28) / 4;
      doc.setFontSize(16); doc.setFont(undefined, "bold");
      doc.setTextColor(15, 110, 86);
      doc.text(String(datos.nDias), 14 + colW*0.5, y + 11, { align: "center" });
      doc.setTextColor(24, 95, 165);
      doc.text(String(datos.total), 14 + colW*1.5, y + 11, { align: "center" });
      doc.text((datos.nAreasTotal > 0 ? (datos.nAreasCubiertas + " / " + datos.nAreasTotal) : String(datos.nAreasCubiertas)), 14 + colW*2.5, y + 11, { align: "center" });
      doc.setTextColor(133, 79, 11);
      doc.text((datos.incResueltas + " / " + incs.length), 14 + colW*3.5, y + 11, { align: "center" });
      doc.setTextColor(107, 106, 100);
      doc.setFontSize(8); doc.setFont(undefined, "normal");
      doc.text("Días trabajados", 14 + colW*0.5, y + 19, { align: "center" });
      doc.text("Limpiezas", 14 + colW*1.5, y + 19, { align: "center" });
      doc.text("Áreas cubiertas", 14 + colW*2.5, y + 19, { align: "center" });
      doc.text("Incid. resueltas", 14 + colW*3.5, y + 19, { align: "center" });

      // Actividad por día
      y += 38;
      doc.setTextColor(44, 44, 42);
      doc.setFontSize(12); doc.setFont(undefined, "bold");
      doc.text("Actividad por día", 14, y);
      y += 9;

      // Construir conteo por día (7 días del rango)
      var r = rangoFechas(periodo);
      var diasArr = [];
      var nombresDia = ["dom","lun","mar","mié","jue","vie","sáb"];
      var cursor = new Date(r.inicio); cursor.setHours(0,0,0,0);
      for (var i = 0; i < 7; i++) {
        var key = cursor.getFullYear()+"-"+cursor.getMonth()+"-"+cursor.getDate();
        var etiqueta = nombresDia[cursor.getDay()] + " " + cursor.getDate();
        diasArr.push({ key: key, etiqueta: etiqueta, count: 0 });
        cursor.setDate(cursor.getDate() + 1);
      }
      regs.forEach(function(reg){
        var f = new Date(reg.created_at);
        var key = f.getFullYear()+"-"+f.getMonth()+"-"+f.getDate();
        var d = diasArr.find(function(x){ return x.key === key; });
        if (d) d.count++;
      });
      var maxLimp = Math.max.apply(null, diasArr.map(function(d){ return d.count; }));
      if (maxLimp === 0) maxLimp = 1;
      var barMax = pageW - 80;
      diasArr.forEach(function(d){
        doc.setFontSize(9); doc.setFont(undefined, "normal"); doc.setTextColor(44, 44, 42);
        doc.text(d.etiqueta, 16, y + 3);
        var w = d.count === 0 ? 0 : (d.count / maxLimp) * barMax;
        if (w > 0) { doc.setFillColor(24, 95, 165); doc.roundedRect(40, y - 1, w, 5, 1, 1, "F"); }
        doc.setTextColor(107, 106, 100);
        doc.text(d.count === 0 ? "Sin actividad" : (d.count + (d.count === 1 ? " limpieza" : " limpiezas")), 40 + w + 3, y + 3);
        y += 9;
      });

      // Incidencias de la semana
      y += 6;
      if (y > 250) { doc.addPage(); y = 20; }
      doc.setTextColor(44, 44, 42);
      doc.setFontSize(12); doc.setFont(undefined, "bold");
      doc.text("Incidencias de la semana", 14, y);
      y += 8;
      doc.setFontSize(9.5); doc.setFont(undefined, "normal");
      if (incs.length === 0) {
        doc.setTextColor(107, 106, 100);
        doc.text("No se reportaron incidencias esta semana.", 16, y); y += 6;
      } else {
        doc.setTextColor(60, 60, 58);
        doc.text("Se detectaron " + incs.length + " incidencia(s) y se resolvieron " + datos.incResueltas + ".", 16, y);
        y += 7;
        incs.forEach(function(inc){
          if (y > 275) { doc.addPage(); y = 20; }
          var esInsumo = inc.tipo === "insumo";
          var estado = inc.resuelto ? "Resuelta" : "Pendiente";
          if (inc.resuelto) doc.setTextColor(15, 110, 86); else doc.setTextColor(133, 79, 11);
          doc.setFontSize(9);
          var txt = "• " + (esInsumo ? "Falta insumo" : "Problema") + ": " + (inc.descripcion || "");
          if (inc.area) txt += " (" + inc.area + ")";
          txt += " - " + estado;
          var lineas = doc.splitTextToSize(txt, pageW - 36);
          doc.text(lineas, 18, y);
          y += lineas.length * 5 + 1;
        });
      }

      // Pie
      y += 8;
      if (y > 282) { doc.addPage(); y = 20; }
      doc.setDrawColor(226, 224, 216);
      doc.line(14, y, pageW - 14, y);
      y += 6;
      doc.setTextColor(107, 106, 100);
      doc.setFontSize(8);
      doc.text("Informe generado por CleanTrack", 14, y);

      doc.save("Informe_semanal_" + edificio.replace(/[^a-zA-Z0-9]/g, "_") + ".pdf");
    }

    function crearPDF(edificio, periodo, regs, incs, resumen) {
      var jsPDF = window.jspdf.jsPDF;
      var doc = new jsPDF();
      var pageW = doc.internal.pageSize.getWidth();
      var y = 0;

      var titulo = (periodo === "diario") ? "Informe diario de limpieza" : "Informe de servicio de limpieza";

      doc.setFillColor(24, 95, 165);
      doc.rect(0, 0, pageW, 38, "F");
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(20); doc.setFont(undefined, "bold");
      doc.text("CleanTrack", 14, 18);
      doc.setFontSize(11); doc.setFont(undefined, "normal");
      doc.text(titulo, 14, 27);

      y = 50;
      doc.setTextColor(44, 44, 42);
      doc.setFontSize(15); doc.setFont(undefined, "bold");
      doc.text(edificio, 14, y);
      y += 7;
      doc.setFontSize(11); doc.setFont(undefined, "normal");
      doc.setTextColor(107, 106, 100);
      doc.text("Período: " + nombrePeriodo(periodo), 14, y);
      y += 5;
      doc.text("Generado: " + new Date().toLocaleDateString("es"), 14, y);

      // Resumen (4 columnas)
      y += 14;
      doc.setFillColor(245, 244, 239);
      doc.roundedRect(14, y, pageW - 28, 26, 3, 3, "F");
      var colW = (pageW - 28) / 4;
      doc.setTextColor(24, 95, 165);
      doc.setFontSize(16); doc.setFont(undefined, "bold");
      doc.text(String(resumen.total), 14 + colW*0.5, y + 11, { align: "center" });
      doc.text(String(resumen.conFoto), 14 + colW*1.5, y + 11, { align: "center" });
      doc.text(String(resumen.esDiario ? resumen.nEmps : resumen.nDias), 14 + colW*2.5, y + 11, { align: "center" });
      doc.setTextColor(133, 79, 11);
      doc.text(String(incs.length), 14 + colW*3.5, y + 11, { align: "center" });
      doc.setTextColor(107, 106, 100);
      doc.setFontSize(8); doc.setFont(undefined, "normal");
      doc.text("Áreas limpiadas", 14 + colW*0.5, y + 19, { align: "center" });
      doc.text("Con foto", 14 + colW*1.5, y + 19, { align: "center" });
      doc.text(resumen.esDiario ? "Empleados" : "Días activos", 14 + colW*2.5, y + 19, { align: "center" });
      doc.text("Incidencias", 14 + colW*3.5, y + 19, { align: "center" });

      // Tabla de limpiezas
      y += 38;
      doc.setTextColor(44, 44, 42);
      doc.setFontSize(12); doc.setFont(undefined, "bold");
      doc.text("Detalle de limpiezas", 14, y);
      y += 8;

      doc.setFillColor(24, 95, 165);
      doc.rect(14, y - 5, pageW - 28, 8, "F");
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(9); doc.setFont(undefined, "bold");
      doc.text("Fecha/Hora", 16, y);
      doc.text("Área", 56, y);
      doc.text("Empleado", 116, y);
      doc.text("Foto", pageW - 28, y);
      y += 6;

      doc.setTextColor(44, 44, 42);
      doc.setFont(undefined, "normal");
      doc.setFontSize(8.5);

      if (regs.length === 0) {
        doc.setTextColor(107, 106, 100);
        doc.text("No se registraron limpiezas en este período.", 16, y); y += 7;
      } else {
        regs.forEach(function(reg, i) {
          if (y > 275) { doc.addPage(); y = 20; }
          if (i % 2 === 0) { doc.setFillColor(248, 247, 243); doc.rect(14, y - 4, pageW - 28, 7, "F"); }
          doc.setTextColor(44, 44, 42);
          doc.text(fmtFecha(reg.created_at), 16, y);
          doc.text((reg.area || "").substring(0, 30), 56, y);
          doc.text((reg.nombre_empleado || "").substring(0, 20), 116, y);
          if (reg.con_foto && reg.foto_url) {
            doc.setTextColor(24, 95, 165);
            doc.textWithLink("Ver", pageW - 28, y, { url: reg.foto_url });
          } else {
            doc.setTextColor(160, 160, 160);
            doc.text("-", pageW - 27, y);
          }
          y += 7;
        });
      }

      // Sección de incidencias
      y += 8;
      if (y > 250) { doc.addPage(); y = 20; }
      doc.setTextColor(44, 44, 42);
      doc.setFontSize(12); doc.setFont(undefined, "bold");
      doc.text("Incidencias reportadas", 14, y);
      y += 8;

      if (incs.length === 0) {
        doc.setTextColor(107, 106, 100);
        doc.setFontSize(9); doc.setFont(undefined, "normal");
        doc.text("No se reportaron incidencias en este período.", 16, y);
        y += 7;
      } else {
        incs.forEach(function(inc) {
          if (y > 265) { doc.addPage(); y = 20; }
          var esInsumo = inc.tipo === "insumo";
          // Etiqueta de tipo
          if (esInsumo) { doc.setFillColor(230, 241, 251); doc.setTextColor(24, 95, 165); }
          else { doc.setFillColor(250, 238, 218); doc.setTextColor(133, 79, 11); }
          doc.roundedRect(14, y - 4, 28, 6, 1, 1, "F");
          doc.setFontSize(7.5); doc.setFont(undefined, "bold");
          doc.text(esInsumo ? "FALTA INSUMO" : "PROBLEMA", 16, y);
          // Estado
          if (inc.resuelto) { doc.setTextColor(15, 110, 86); doc.text("Resuelta", 46, y); }
          else { doc.setTextColor(133, 79, 11); doc.text("Pendiente", 46, y); }
          // Fecha
          doc.setTextColor(107, 106, 100); doc.setFont(undefined, "normal");
          doc.text(fmtFecha(inc.created_at), pageW - 40, y);
          y += 6;
          // Descripción
          doc.setTextColor(44, 44, 42); doc.setFontSize(9);
          var desc = doc.splitTextToSize((inc.descripcion || "") + (inc.area ? "  (" + inc.area + ")" : ""), pageW - 32);
          doc.text(desc, 16, y);
          y += desc.length * 5 + 4;
        });
      }

      y += 6;
      if (y > 280) { doc.addPage(); y = 20; }
      doc.setDrawColor(226, 224, 216);
      doc.line(14, y, pageW - 14, y);
      y += 6;
      doc.setTextColor(107, 106, 100);
      doc.setFontSize(8);
      doc.text("Informe generado por CleanTrack — Los enlaces 'Ver' abren la foto del registro.", 14, y);

      var nombreArch = "Informe_" + (periodo === "diario" ? "diario" : periodo) + "_" + edificio.replace(/[^a-zA-Z0-9]/g, "_") + ".pdf";
      doc.save(nombreArch);
    }

    verificarAcceso();
  </script>
