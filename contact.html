  <style>
    :root {
      --azul: #185FA5;
      --azul-osc: #0C447C;
      --azul-mas-osc: #0A3A6B;
      --verde: #1D9E75;
      --verde-osc: #178A65;
      --fondo: #ECEBE4;
      --fondo-claro: #F4F3EE;
      --blanco: #FFFFFF;
      --texto: #1B2733;
      --texto-suave: #5A6573;
      --borde: #E2E0D8;
      --rojo: #B23B3B;
      --rojo-claro: #FBEAEA;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Sora", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--texto); background: var(--fondo); line-height: 1.6;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    .frase { font-family: "Fraunces", Georgia, serif; font-style: italic; }

    nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(12,68,124,0.96); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .nav-inner {
      max-width: 1120px; margin: 0 auto; padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { width: 34px; height: 34px; object-fit: contain; }
    .nav-logo .nombre { color: #fff; font-weight: 700; font-size: 19px; }
    .nav-links { display: flex; align-items: center; gap: 8px; }
    .nav-links a {
      color: rgba(255,255,255,0.85); text-decoration: none; font-size: 14.5px;
      font-weight: 500; padding: 9px 14px; border-radius: 9px; transition: all 0.15s;
    }
    .nav-links a:hover { color: #fff; background: rgba(255,255,255,0.10); }
    .nav-links a.login { border: 1.5px solid rgba(255,255,255,0.30); }
    .nav-links a.login:hover { background: rgba(255,255,255,0.15); }
    .menu-btn { display: none; background: none; border: none; cursor: pointer; padding: 6px; }
    .menu-btn span { display: block; width: 24px; height: 2px; background: #fff; margin: 5px 0; border-radius: 2px; }
    @media (max-width: 780px) {
      .menu-btn { display: block; }
      .nav-links {
        position: absolute; top: 100%; left: 0; right: 0; background: var(--azul-osc);
        flex-direction: column; gap: 4px; padding: 0 24px; align-items: stretch;
        max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease;
      }
      .nav-links.abierto { max-height: 320px; padding: 12px 24px 18px; }
      .nav-links a { text-align: center; }
    }

    .head {
      background: linear-gradient(160deg, var(--azul-osc) 0%, var(--azul) 100%);
      color: #fff; text-align: center; padding: 64px 24px 56px;
    }
    .head img { width: 70px; height: 70px; object-fit: contain; margin: 0 auto 20px; display: block; filter: drop-shadow(0 8px 22px rgba(0,0,0,0.3)); }
    .head h1 { font-size: clamp(32px, 5vw, 46px); font-weight: 800; letter-spacing: -0.02em; line-height: 1.08; }
    .head h1 .acento { color: #5FD3A8; }
    .head .linea { width: 60px; height: 4px; background: var(--verde); border-radius: 3px; margin: 20px auto; }
    .head .sub { font-size: 18px; color: rgba(255,255,255,0.84); max-width: 540px; margin: 0 auto; }

    .contenido { flex: 1; max-width: 1000px; margin: -32px auto 0; padding: 0 24px 70px; width: 100%; }
    .grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 26px; align-items: start; }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

    .tarjeta { background: var(--blanco); border-radius: 20px; padding: 34px; box-shadow: 0 14px 40px rgba(12,68,124,0.10); border: 1px solid var(--borde); }
    .tarjeta h2 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .tarjeta .desc { color: var(--texto-suave); font-size: 15px; margin-bottom: 24px; }

    label { display: block; font-size: 13px; font-weight: 600; color: var(--texto); margin-bottom: 7px; }
    .campo { margin-bottom: 18px; }
    input, textarea, select {
      width: 100%; padding: 13px 15px; font-size: 15px; font-family: inherit;
      border: 1.5px solid var(--borde); border-radius: 11px; outline: none;
      background: #FCFBF8; transition: border-color 0.15s, box-shadow 0.15s; color: var(--texto);
    }
    input:focus, textarea:focus, select:focus { border-color: var(--verde); box-shadow: 0 0 0 3px rgba(29,158,117,0.14); background: #fff; }
    textarea { resize: vertical; min-height: 110px; }

    .btn-enviar {
      width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer;
      font-size: 16px; font-weight: 600; color: #fff; font-family: inherit;
      background: linear-gradient(135deg, var(--verde), var(--verde-osc));
      box-shadow: 0 8px 22px rgba(29,158,117,0.35); transition: transform 0.08s, box-shadow 0.15s; margin-top: 4px;
    }
    .btn-enviar:hover { box-shadow: 0 12px 28px rgba(29,158,117,0.5); }
