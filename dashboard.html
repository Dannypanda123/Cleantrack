<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanTrack — Panel del supervisor</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --verde: #1D9E75;
      --verde-claro: #EAF3DE;
      --verde-texto: #0F6E56;
      --azul: #185FA5;
      --azul-claro: #E6F1FB;
      --gris-fondo: #F5F4EF;
      --gris-texto: #6B6A64;
      --gris-borde: #E2E0D8;
      --texto: #2C2C2A;
      --blanco: #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--gris-fondo);
      color: var(--texto);
      min-height: 100vh;
      padding: 20px;
    }
    /* Oculto hasta confirmar sesión, para no mostrar datos antes de verificar */
    .contenedor { max-width: 720px; margin: 0 auto; display: none; }
    .verificando {
      max-width: 720px; margin: 60px auto; text-align: center;
      color: var(--gris-texto); font-size: 15px;
    }

    .top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .top .marca {
      font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gris-texto); font-weight: 600;
    }
    .top h1 { font-size: 22px; font-weight: 600; margin-top: 2px; }
    .top-botones { display: flex; gap: 8px; }
    .btn-refrescar {
      background: var(--azul); color: #fff; border: none;
      padding: 10px 18px; border-radius: 12px; font-size: 14px;
      font-weight: 600; cursor: pointer;
    }
    .btn-salir {
      background: transparent; color: var(--gris-texto);
      border: 1.5px solid var(--gris-borde);
      padding: 10px 18px; border-radius: 12px; font-size: 14px;
      font-weight: 600; cursor: pointer;
    }
    .btn-refrescar:active, .btn-salir:active { transform: scale(0.97); }

    .metricas {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; margin-bottom: 24px;
    }
    .metrica {
      background: var(--blanco); border: 1px solid var(--gris-borde);
      border-radius: 14px; padding: 18px;
    }
    .metrica .label { font-size: 12px; color: var(--gris-texto); margin-bottom: 6px; }
    .metrica .valor { font-size: 28px; font-weight: 600; }

    .seccion-titulo {
      font-size: 13px; font-weight: 600; color: var(--gris-texto);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px;
    }

    .lista { display: flex; flex-direction: column; gap: 10px; }
    .registro {
      background: var(--blanco); border: 1px solid var(--gris-borde);
      border-radius: 14px; padding: 16px;
      display: flex; align-items: center; gap: 14px;
    }
    .miniatura {
      width: 54px; height: 54px; border-radius: 12px;
      object-fit: cover; flex-shrink: 0; cursor: pointer;
      border: 1px solid var(--gris-borde);
    }
    .icono {
      width: 54px; height: 54px; border-radius: 12px;
      background: var(--verde-claro); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 22px;
    }
    .registro .info { flex: 1; min-width: 0; }
    .registro .area { font-size: 15px; font-weight: 600; }
    .registro .detalle { font-size: 13px; color: var(--gris-texto); margin-top: 2px; }
    .registro .hora { font-size: 13px; color: var(--gris-texto); text-align: right; flex-shrink: 0; }

    .badge {
      display: inline-block; font-size: 11px; font-weight: 600;
      padding: 3px 9px; border-radius: 8px; margin-top: 4px;
    }
    .badge-foto { background: var(--azul-claro); color: var(--azul); }
    .badge-sinfoto { background: var(--verde-claro); color: var(--verde-texto); }

    .vacio {
      background: var(--blanco); border: 1px dashed var(--gris-borde);
      border-radius: 14px; padding: 40px 20px; text-align: center;
      color: var(--gris-texto); font-size: 14px;
    }
    .cargando { text-align: center; color: var(--gris-texto); padding: 40px; font-size: 14px; }

    .modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85); z-index: 100;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal.abierto { display: flex; }
    .modal img { max-width: 100%; max-height: 90vh; border-radius: 12px; }
    .modal-cerrar {
      position: absolute; top: 20px; right: 24px; color: #fff;
      font-size: 32px; cursor: pointer; font-weight: 300;
    }
  </style>
</head>
<body>

  <div class="verificando" id="verificando">Verificando sesión...</div>

  <div class="contenedor" id="contenedor">

    <div class="top">
      <div>
        <div class="marca">CleanTrack</div>
        <h1>Panel del supervisor</h1>
      </div>
      <div class="top-botones">
        <a class="btn-salir" href="inicio.html" style="text-decoration:none; display:inline-block;">← Inicio</a>
        <button class="btn-refrescar" onclick="cargar()">Actualizar</button>
        <button class="btn-salir" onclick="salir()">Salir</button>
      </div>
    </div>

    <div class="metricas">
      <div class="metrica">
        <div class="label">Registros hoy</div>
        <div class="valor" id="m-hoy">—</div>
      </div>
      <div class="metrica">
        <div class="label">Con foto</div>
        <div class="valor" id="m-foto">—</div>
      </div>
      <div class="metrica">
        <div class="label">Total histórico</div>
        <div class="valor" id="m-total">—</div>
      </div>
    </div>

    <div class="seccion-titulo">Registros recientes</div>
    <div class="lista" id="lista">
      <div class="cargando">Cargando registros...</div>
    </div>

  </div>

  <div class="modal" id="modal" onclick="cerrarModal()">
    <span class="modal-cerrar">&times;</span>
    <img id="modal-img" src="" alt="Foto ampliada" />
  </div>

  <script>
    const SUPABASE_URL = "https://saoirivninhucrkhckaj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_DeKuX1LvrvruEXzfPvumnw_g5N1Jw4k";

    let db = null;
    try {
      const { createClient } = supabase;
      db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
      console.error("No se pudo conectar a Supabase:", e);
    }

    // ===== PROTECCIÓN: si no hay sesión, mandar al login =====
    async function verificarAcceso() {
      if (!db) {
        document.getElementById("verificando").textContent = "Sin conexión a la base de datos.";
        return;
      }
      const { data } = await db.auth.getSession();
      if (!data.session) {
        // No hay sesión: fuera, al login
        window.location.href = "login.html";
        return;
      }
      // Hay sesión: mostrar el dashboard y cargar datos
      document.getElementById("verificando").style.display = "none";
      document.getElementById("contenedor").style.display = "block";
      cargar();
    }

    async function salir() {
      if (db) await db.auth.signOut();
      window.location.href = "login.html";
    }

    function esHoy(fechaISO) {
      var f = new Date(fechaISO);
      var hoy = new Date();
      return f.getFullYear() === hoy.getFullYear()
        && f.getMonth() === hoy.getMonth()
        && f.getDate() === hoy.getDate();
    }

    function formatHora(fechaISO) {
      var f = new Date(fechaISO);
      var h = f.getHours(), m = f.getMinutes();
      var ampm = h >= 12 ? "pm" : "am";
      h = h % 12; if (h === 0) h = 12;
      m = m < 10 ? "0" + m : m;
      return h + ":" + m + " " + ampm;
    }

    function abrirModal(url) {
      document.getElementById("modal-img").src = url;
      document.getElementById("modal").classList.add("abierto");
    }
    function cerrarModal() {
      document.getElementById("modal").classList.remove("abierto");
    }

    async function cargar() {
      var lista = document.getElementById("lista");
      lista.innerHTML = '<div class="cargando">Cargando registros...</div>';

      if (!db) {
        lista.innerHTML = '<div class="vacio">Sin conexión a la base de datos.</div>';
        return;
      }

      const { data, error } = await db
        .from("registros")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        lista.innerHTML = '<div class="vacio">Error al cargar: ' + error.message + '</div>';
        console.error(error);
        return;
      }

      var total = data.length;
      var hoy = data.filter(function(r){ return esHoy(r.created_at); }).length;
      var conFoto = data.filter(function(r){ return r.con_foto; }).length;

      document.getElementById("m-total").textContent = total;
      document.getElementById("m-hoy").textContent = hoy;
      document.getElementById("m-foto").textContent = conFoto;

      if (total === 0) {
        lista.innerHTML = '<div class="vacio">Aún no hay registros. Cuando un empleado registre un área, aparecerá aquí.</div>';
        return;
      }

      lista.innerHTML = "";
      data.forEach(function(r) {
        var badge = r.con_foto
          ? '<span class="badge badge-foto">📷 Con foto</span>'
          : '<span class="badge badge-sinfoto">✓ Registrado</span>';

        var visual;
        if (r.foto_url) {
          visual = '<img class="miniatura" src="' + r.foto_url + '" alt="Foto" onclick="abrirModal(\'' + r.foto_url + '\')" />';
        } else {
          visual = '<div class="icono"><svg viewBox="0 0 24 24" fill="none" stroke="#5F7268" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:26px;height:26px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg></div>';
        }

        var div = document.createElement("div");
        div.className = "registro";
        div.innerHTML =
          visual +
          '<div class="info">' +
            '<div class="area">' + (r.area || "Área") + '</div>' +
            '<div class="detalle">' + (r.edificio || "") + ' · ' + (r.nombre_empleado || "Empleado") + '</div>' +
            badge +
          '</div>' +
          '<div class="hora">' + formatHora(r.created_at) + '</div>';
        lista.appendChild(div);
      });
    }

    // Arranca verificando el acceso (no carga datos hasta confirmar sesión)
    verificarAcceso();
    setInterval(function(){
      if (document.getElementById("contenedor").style.display === "block") cargar();
    }, 30000);
  </script>
</body>
</html>
