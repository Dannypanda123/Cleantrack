<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanTrack — Panel del supervisor</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="ui.js"></script>

  <style>
    :root {
      --verde: #798C81;
      --verde-claro: #EAEEEB;
      --verde-texto: #5F7268;
      --azul: #798C81;
      --azul-claro: #EAEEEB;
      --gris-fondo: #ECEBE4;
      --gris-texto: #6B6A64;
      --gris-borde: #E2E0D8;
      --texto: #1F2A37;
      --blanco: #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--gris-fondo); color: var(--texto); min-height: 100vh; padding: 20px; }
    .contenedor { max-width: 720px; margin: 0 auto; display: none; }
    .verificando { max-width: 720px; margin: 60px auto; text-align: center; color: var(--gris-texto); font-size: 15px; }

    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .top .marca { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gris-texto); font-weight: 600; }
    .top h1 { font-size: 22px; font-weight: 600; margin-top: 2px; }
    .top-botones { display: flex; gap: 8px; }
    .btn-refrescar { background: linear-gradient(135deg, #798C81, #5F7268); color: #fff; border: none; padding: 10px 18px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(121,140,129,0.3); }
    .btn-salir { background: transparent; color: var(--gris-texto); border: 1.5px solid var(--gris-borde); padding: 10px 18px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
    .btn-refrescar:active, .btn-salir:active { transform: scale(0.97); }

    .selector-cont { margin-bottom: 22px; }
    .selector-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gris-texto); margin-bottom: 8px; }
    .selector { width: 100%; padding: 14px; font-size: 16px; border: 1.5px solid var(--gris-borde); border-radius: 12px; background: var(--blanco); color: var(--texto); outline: none; cursor: pointer; }
    .selector:focus { border-color: var(--verde); }

    .metricas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .metrica { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 14px; padding: 18px; }
    .metrica .label { font-size: 12px; color: var(--gris-texto); margin-bottom: 6px; }
    .metrica .valor { font-size: 28px; font-weight: 600; }

    .seccion-titulo { font-size: 13px; font-weight: 600; color: var(--gris-texto); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .punto-vivo { width: 8px; height: 8px; border-radius: 50%; background: #3C993C; display: inline-block; animation: latir 1.6s ease-in-out infinite; }
    @keyframes latir { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .lista { display: flex; flex-direction: column; gap: 10px; }
    .separador-fecha { display: flex; align-items: center; gap: 12px; margin: 8px 2px 2px; }
    .separador-fecha:first-child { margin-top: 0; }
    .separador-fecha .texto { font-size: 12px; font-weight: 700; color: var(--gris-texto); text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
    .separador-fecha .linea { flex: 1; height: 1px; background: var(--gris-borde); }
    .registro { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 14px; padding: 16px; display: flex; align-items: center; gap: 14px; }
    .miniatura { width: 54px; height: 54px; border-radius: 12px; object-fit: cover; flex-shrink: 0; cursor: pointer; border: 1px solid var(--gris-borde); }
    .icono { width: 54px; height: 54px; border-radius: 12px; background: var(--verde-claro); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .registro .info { flex: 1; min-width: 0; }
    .registro .area { font-size: 15px; font-weight: 600; word-break: break-word; }
    .registro .detalle { font-size: 13px; color: var(--gris-texto); margin-top: 2px; word-break: break-word; }
    .registro .hora { font-size: 13px; color: var(--gris-texto); text-align: right; flex-shrink: 0; }

    .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 8px; margin-top: 4px; }
    .badge svg { width: 13px; height: 13px; }
    .badge-foto { background: var(--azul-claro); color: var(--azul); }
    .badge-sinfoto { background: var(--verde-claro); color: var(--verde-texto); }

    .vacio { background: var(--blanco); border: 1px dashed var(--gris-borde); border-radius: 14px; padding: 40px 20px; text-align: center; color: var(--gris-texto); font-size: 14px; }
    .cargando { text-align: center; color: var(--gris-texto); padding: 40px; font-size: 14px; }

    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .modal.abierto { display: flex; }
    .modal img { max-width: 100%; max-height: 90vh; border-radius: 12px; }
    .modal-cerrar { position: absolute; top: 20px; right: 24px; color: #fff; font-size: 32px; cursor: pointer; font-weight: 300; }
  </style>
</head>
<body>

  <div class="verificando" id="verificando">Verificando sesión...</div>

  <div class="contenedor" id="contenedor">

    <div class="top">
      <div>
        <div class="marca">CleanTrack</div>
        <h1>Registros de limpieza</h1>
      </div>
      <div class="top-botones">
        <a class="btn-salir" href="inicio.html">← Inicio</a>
        <button class="btn-refrescar" onclick="cargar()">Actualizar</button>
        <button class="btn-salir" onclick="salir()">Salir</button>
      </div>
    </div>

    <div class="selector-cont">
      <div class="selector-label">Edificio</div>
      <select class="selector" id="selector-edificio" onchange="mostrar()">
        <option value="">Cargando edificios...</option>
      </select>
    </div>

    <div class="metricas">
      <div class="metrica"><div class="label">Registros hoy</div><div class="valor" id="m-hoy">—</div></div>
      <div class="metrica"><div class="label">Con foto</div><div class="valor" id="m-foto">—</div></div>
      <div class="metrica"><div class="label">Total histórico</div><div class="valor" id="m-total">—</div></div>
    </div>

    <div class="seccion-titulo"><span class="punto-vivo"></span> Registros en tiempo real</div>
    <div class="lista" id="lista">
      <div class="cargando">Cargando registros...</div>
    </div>

  </div>

  <div class="modal" id="modal" onclick="cerrarModal()">
    <span class="modal-cerrar">&times;</span>
    <img id="modal-img" src="" alt="Foto ampliada" />
  </div>

  <script>
    var todosRegistros = [];

    async function verificarAcceso() {
      if (!db) { document.getElementById("verificando").textContent = "Sin conexión a la base de datos."; return; }
      const { data } = await db.auth.getSession();
      if (!data.session) { window.location.href = "login.html"; return; }
      document.getElementById("verificando").style.display = "none";
      document.getElementById("contenedor").style.display = "block";
      cargar();
    }

    async function salir() {
      if (db) await db.auth.signOut();
      window.location.href = "login.html";
    }

    function esHoy(fechaISO) {
      var f = new Date(fechaISO), hoy = new Date();
      return f.getFullYear() === hoy.getFullYear() && f.getMonth() === hoy.getMonth() && f.getDate() === hoy.getDate();
    }

    function formatHora(fechaISO) {
      var f = new Date(fechaISO);
      var h = f.getHours(), m = f.getMinutes();
      var ampm = h >= 12 ? "pm" : "am"; h = h % 12; if (h === 0) h = 12;
      m = m < 10 ? "0" + m : m;
      return h + ":" + m + " " + ampm;
    }

    function claveDia(fechaISO) {
      var f = new Date(fechaISO);
      return f.getFullYear() + "-" + f.getMonth() + "-" + f.getDate();
    }

    function etiquetaDia(fechaISO) {
      var dias = ["domingo", "lunes", "martes", "miércoles", "jueves", "viernes", "sábado"];
      var meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
      var f = new Date(fechaISO);
      var hoy = new Date();
      var ayer = new Date(); ayer.setDate(ayer.getDate() - 1);

      if (claveDia(fechaISO) === claveDia(hoy.toISOString())) return "Hoy";
      if (claveDia(fechaISO) === claveDia(ayer.toISOString())) return "Ayer";

      var f0 = new Date(f.getFullYear(), f.getMonth(), f.getDate());
      var h0 = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
      var difDias = Math.round((h0 - f0) / 86400000);

      if (difDias > 1 && difDias < 7) {
        var d = dias[f.getDay()];
        return d.charAt(0).toUpperCase() + d.slice(1);
      }
      return f.getDate() + " de " + meses[f.getMonth()];
    }

    function abrirModal(url) {
      document.getElementById("modal-img").src = url;
      document.getElementById("modal").classList.add("abierto");
    }
    function cerrarModal() { document.getElementById("modal").classList.remove("abierto"); }

    async function cargar() {
      if (!db) return;
      const { data, error } = await db.from("registros").select("*").order("created_at", { ascending: false });
      if (error) {
        document.getElementById("lista").innerHTML = "";
        var errDiv = document.createElement("div");
        errDiv.className = "vacio";
        errDiv.textContent = "Error al cargar: " + error.message;
        document.getElementById("lista").appendChild(errDiv);
        return;
      }
      todosRegistros = data || [];

      var sel = document.getElementById("selector-edificio");
      var seleccionActual = sel.value;

      var edificios = {};
      todosRegistros.forEach(function(r){ edificios[r.edificio || "Sin edificio"] = true; });
      var lista = Object.keys(edificios).sort();

      if (lista.length === 0) {
        sel.innerHTML = "";
        var optVacio = document.createElement("option");
        optVacio.value = "";
        optVacio.textContent = "No hay datos aún";
        sel.appendChild(optVacio);
      } else {
        sel.innerHTML = "";
        var optTodos = document.createElement("option");
        optTodos.value = "";
        optTodos.textContent = "Todos los edificios";
        sel.appendChild(optTodos);
        lista.forEach(function(e){
          var o = document.createElement("option"); o.value = e; o.textContent = e; sel.appendChild(o);
        });
        if (seleccionActual && (seleccionActual === "" || lista.indexOf(seleccionActual) !== -1)) {
          sel.value = seleccionActual;
        }
      }

      mostrar();
    }

    function mostrar() {
      var edificio = document.getElementById("selector-edificio").value;
      var regs = edificio ? todosRegistros.filter(function(r){ return (r.edificio || "Sin edificio") === edificio; }) : todosRegistros;

      var total = regs.length;
      var hoy = regs.filter(function(r){ return esHoy(r.created_at); }).length;
      var conFoto = regs.filter(function(r){ return r.con_foto; }).length;
      document.getElementById("m-total").textContent = total;
      document.getElementById("m-hoy").textContent = hoy;
      document.getElementById("m-foto").textContent = conFoto;

      var lista = document.getElementById("lista");
      if (total === 0) {
        lista.innerHTML = "";
        var vacioDiv = document.createElement("div");
        vacioDiv.className = "vacio";
        vacioDiv.textContent = edificio ? "Aún no hay registros en este edificio." : "Aún no hay registros. Cuando un empleado registre un área, aparecerá aquí.";
        lista.appendChild(vacioDiv);
        return;
      }

      lista.innerHTML = "";
      var diaActual = null;
      regs.forEach(function(r) {
        // Separador de día cuando cambia la fecha
        var clave = claveDia(r.created_at);
        if (clave !== diaActual) {
          diaActual = clave;
          var sep = document.createElement("div");
          sep.className = "separador-fecha";
          var sepTexto = document.createElement("span");
          sepTexto.className = "texto";
          sepTexto.textContent = etiquetaDia(r.created_at);
          var sepLinea = document.createElement("span");
          sepLinea.className = "linea";
          sep.appendChild(sepTexto);
          sep.appendChild(sepLinea);
          lista.appendChild(sep);
        }

        // Badge (HTML estático, seguro)
        var badge = r.con_foto
          ? '<span class="badge badge-foto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>Con foto</span>'
          : '<span class="badge badge-sinfoto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>Registrado</span>';

        var div = document.createElement("div");
        div.className = "registro";

        // Estructura base sin datos del usuario
        div.innerHTML =
          '<div class="visual-slot"></div>' +
          '<div class="info">' +
            '<div class="area"></div>' +
            '<div class="detalle"></div>' +
          '</div>' +
          '<div class="hora"></div>';

        // Visual (foto o icono). Foto creada con createElement para no inyectar
        // la URL dentro de un atributo onclick.
        var visualSlot = div.querySelector(".visual-slot");
        if (r.foto_url) {
          var img = document.createElement("img");
          img.className = "miniatura";
          img.src = r.foto_url;
          img.alt = "Foto";
          var urlFoto = r.foto_url;
          img.addEventListener("click", function() { abrirModal(urlFoto); });
          visualSlot.replaceWith(img);
        } else {
          var icoDiv = document.createElement("div");
          icoDiv.className = "icono";
          icoDiv.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#5F7268" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:26px;height:26px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
          visualSlot.replaceWith(icoDiv);
        }

        // Badge dentro de .info (HTML estático, seguro)
        div.querySelector(".info").insertAdjacentHTML("beforeend", badge);

        // Datos del usuario con textContent (ANTI-XSS)
        div.querySelector(".area").textContent = r.area || "Área";
        div.querySelector(".detalle").textContent = (r.edificio || "") + " · " + (r.nombre_empleado || "Empleado");
        div.querySelector(".hora").textContent = formatHora(r.created_at);

        lista.appendChild(div);
      });
    }

    verificarAcceso();
    setInterval(function(){
      if (document.getElementById("contenedor").style.display === "block") cargar();
    }, 30000);
  </script>
</body>
</html>
