<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanTrack — Iniciar sesión</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --verde: #1D9E75;
      --verde-claro: #EAF3DE;
      --verde-texto: #0F6E56;
      --azul: #185FA5;
      --azul-claro: #E6F1FB;
      --gris-fondo: #F5F4EF;
      --gris-texto: #6B6A64;
      --gris-borde: #E2E0D8;
      --texto: #2C2C2A;
      --blanco: #FFFFFF;
      --rojo: #A32D2D;
      --rojo-claro: #FCEBEB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--gris-fondo);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .caja {
      width: 100%; max-width: 380px;
      background: var(--blanco);
      border-radius: 24px;
      padding: 36px 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.06);
    }
    .marca {
      text-align: center; font-size: 12px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--gris-texto);
      font-weight: 600; margin-bottom: 8px;
    }
    .logo-img { height: 240px; width: auto; display: block; margin: 0 auto 4px; border-radius: 10px; }
    }
    h1 { text-align: center; font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .sub { text-align: center; font-size: 14px; color: var(--gris-texto); margin-bottom: 28px; }

    label { display: block; font-size: 13px; font-weight: 600; color: var(--gris-texto); margin-bottom: 6px; }
    input {
      width: 100%; padding: 14px; font-size: 16px;
      border: 1.5px solid var(--gris-borde); border-radius: 12px;
      margin-bottom: 18px; outline: none;
    }
    input:focus { border-color: var(--azul); }

    .btn {
      width: 100%; padding: 16px; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      background: var(--azul); color: #fff;
      transition: transform 0.08s, opacity 0.15s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; }

    .mensaje {
      text-align: center; font-size: 13px; margin-top: 16px;
      padding: 10px; border-radius: 10px; display: none;
    }
    .mensaje.error { background: var(--rojo-claro); color: var(--rojo); display: block; }
    .mensaje.cargando { background: var(--azul-claro); color: var(--azul); display: block; }
  </style>
</head>
<body>
  <div class="caja">
    <img src="logo.png" alt="CleanTrack" class="logo-img" />
    <h1>Panel del supervisor</h1>
    <div class="sub">Inicia sesión para continuar</div>

    <label for="email">Correo electrónico</label>
    <input type="email" id="email" placeholder="supervisor@ejemplo.com" autocomplete="email" />

    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password" />

    <button class="btn" id="btn-entrar" onclick="entrar()">Entrar</button>

    <div class="mensaje" id="mensaje"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://saoirivninhucrkhckaj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_DeKuX1LvrvruEXzfPvumnw_g5N1Jw4k";

    let db = null;
    try {
      const { createClient } = supabase;
      db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
      console.error("No se pudo conectar a Supabase:", e);
    }

    function mostrarMensaje(texto, tipo) {
      var m = document.getElementById("mensaje");
      m.textContent = texto;
      m.className = "mensaje " + tipo;
    }

    // Si ya hay sesión activa, ir directo al dashboard
    async function revisarSesion() {
      if (!db) return;
      const { data } = await db.auth.getSession();
      if (data.session) {
        window.location.href = "inicio.html";
      }
    }
    revisarSesion();

    async function entrar() {
      var email = document.getElementById("email").value.trim();
      var password = document.getElementById("password").value;

      if (!email || !password) {
        mostrarMensaje("Escribe tu correo y contraseña.", "error");
        return;
      }

      if (!db) {
        mostrarMensaje("Sin conexión a la base de datos.", "error");
        return;
      }

      document.getElementById("btn-entrar").disabled = true;
      mostrarMensaje("Verificando...", "cargando");

      const { data, error } = await db.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        mostrarMensaje("Correo o contraseña incorrectos.", "error");
        document.getElementById("btn-entrar").disabled = false;
        console.error(error);
        return;
      }

      // Éxito: ir al dashboard
      window.location.href = "inicio.html";
    }

    // Permitir entrar con la tecla Enter
    document.getElementById("password").addEventListener("keydown", function(e) {
      if (e.key === "Enter") entrar();
    });
  </script>
</body>
</html>
