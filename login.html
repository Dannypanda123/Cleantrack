<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanTrack — Iniciar sesión</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --azul-900: #0C447C;
      --azul-700: #185FA5;
      --azul-500: #3D7BC0;
      --azul-claro: #DCE9F5;
      --grafito-900: #2E3640;
      --grafito-700: #3D4654;
      --verde: #1D9E75;
      --gris-fondo: #ECEBE4;
      --gris-texto: #6B6A64;
      --gris-borde: #E2E0D8;
      --texto: #1F2A37;
      --blanco: #FFFFFF;
      --rojo: #A32D2D;
      --rojo-claro: #FCEBEB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      /* Fondo gris pastel suave con un toque de profundidad azul */
      background:
        radial-gradient(circle at 25% 20%, rgba(24,95,165,0.08), transparent 42%),
        radial-gradient(circle at 80% 85%, rgba(12,68,124,0.06), transparent 45%),
        linear-gradient(160deg, #F1F0EA 0%, #E7E6DF 100%);
      position: relative;
      overflow: hidden;
    }
    /* Patrón sutil de cuadrícula muy tenue */
    body::before {
      content: "";
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(0,0,0,0.018) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.018) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }

    .caja {
      position: relative;
      width: 100%; max-width: 400px;
      background: var(--blanco);
      border-radius: 20px;
      padding: 0;
      box-shadow: 0 20px 50px rgba(12,68,124,0.18), 0 4px 12px rgba(0,0,0,0.08);
      overflow: hidden;
      animation: aparecer 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes aparecer { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* Cabecera con el logo sobre banda gris grafito */
    .cabecera {
      background: linear-gradient(135deg, var(--grafito-700), var(--grafito-900));
      padding: 32px 32px 28px;
      text-align: center;
      position: relative;
    }
    .logo-img {
      width: 192px; height: 192px; object-fit: contain; display: block; margin: 0 auto 10px;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.28));
    }
    .marca-nombre {
      font-family: "Sora", -apple-system, sans-serif;
      color: #fff; font-size: 26px; font-weight: 700; letter-spacing: 0.01em;
      text-align: center; line-height: 1;
    }
    .marca-nombre .verde-txt { color: var(--verde); }
    .marca-linea {
      width: 38px; height: 3px; background: var(--verde); border-radius: 3px;
      margin: 12px auto 0;
    }
    .cabecera .titulo { color: #fff; font-size: 17px; font-weight: 600; letter-spacing: 0.01em; margin-top: 14px; }
    .cabecera .subtitulo { color: rgba(255,255,255,0.72); font-size: 13px; margin-top: 4px; letter-spacing: 0.02em; }

    .cuerpo { padding: 30px 32px 34px; }

    label { display: block; font-size: 12.5px; font-weight: 600; color: var(--gris-texto); margin-bottom: 7px; letter-spacing: 0.02em; }
    .campo { margin-bottom: 18px; }
    input {
      width: 100%; padding: 14px 15px; font-size: 15px;
      border: 1.5px solid var(--gris-borde); border-radius: 11px;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
      background: #FCFBF8;
    }
    input:focus { border-color: var(--azul-500); box-shadow: 0 0 0 3px rgba(24,95,165,0.14); background: #fff; }

    .btn {
      width: 100%; padding: 15px; border: none; border-radius: 11px;
      font-size: 15px; font-weight: 600; cursor: pointer; color: #fff;
      background: linear-gradient(135deg, var(--azul-700), var(--azul-900));
      transition: transform 0.08s, box-shadow 0.15s; margin-top: 4px;
      box-shadow: 0 4px 14px rgba(24,95,165,0.35);
    }
    .btn:hover { box-shadow: 0 6px 20px rgba(24,95,165,0.5); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: default; }

    .mensaje { text-align: center; font-size: 13px; margin-top: 16px; padding: 11px; border-radius: 10px; display: none; }
    .mensaje.error { background: var(--rojo-claro); color: var(--rojo); display: block; }
    .mensaje.cargando { background: var(--azul-claro); color: var(--azul-900); display: block; }

    .pie { text-align: center; font-size: 11.5px; color: var(--gris-texto); margin-top: 22px; letter-spacing: 0.03em; }
  </style>
</head>
<body>
  <div class="caja">
    <div class="cabecera">
      <img src="logo-simbolo.png" alt="CleanTrack" class="logo-img" />
      <div class="marca-nombre">Clean<span class="verde-txt">Track</span></div>
      <div class="marca-linea"></div>
      <div class="titulo">Panel del supervisor</div>
      <div class="subtitulo">Gestión profesional de limpieza</div>
    </div>

    <div class="cuerpo">
      <div class="campo">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="tucorreo@empresa.com" autocomplete="email" />
      </div>
      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn" id="btn-entrar" onclick="entrar()">Iniciar sesión</button>

      <div class="mensaje" id="mensaje"></div>

      <div class="pie">CleanTrack · Acceso seguro</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://saoirivninhucrkhckaj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_DeKuX1LvrvruEXzfPvumnw_g5N1Jw4k";

    let db = null;
    try {
      const { createClient } = supabase;
      db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
      console.error("No se pudo conectar a Supabase:", e);
    }

    function mostrarMensaje(texto, tipo) {
      var m = document.getElementById("mensaje");
      m.textContent = texto;
      m.className = "mensaje " + tipo;
    }

    async function revisarSesion() {
      if (!db) return;
      const { data } = await db.auth.getSession();
      if (data.session) {
        window.location.href = "inicio.html";
      }
    }
    revisarSesion();

    async function entrar() {
      var email = document.getElementById("email").value.trim();
      var password = document.getElementById("password").value;

      if (!email || !password) {
        mostrarMensaje("Escribe tu correo y contraseña.", "error");
        return;
      }
      if (!db) {
        mostrarMensaje("Sin conexión a la base de datos.", "error");
        return;
      }

      document.getElementById("btn-entrar").disabled = true;
      mostrarMensaje("Verificando...", "cargando");

      const { data, error } = await db.auth.signInWithPassword({ email: email, password: password });

      if (error) {
        mostrarMensaje("Correo o contraseña incorrectos.", "error");
        document.getElementById("btn-entrar").disabled = false;
        console.error(error);
        return;
      }
      window.location.href = "inicio.html";
    }

    document.getElementById("password").addEventListener("keydown", function(e) {
      if (e.key === "Enter") entrar();
    });
  </script>
</body>
</html>
