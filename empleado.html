<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CleanTrack — Registro de área</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Fraunces:ital,opsz,wght@1,9..144,500&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="idiomas.js"></script>

  <style>
    :root {
      --gris-verde-900: #0C447C;
      --gris-verde-700: #185FA5;
      --gris-verde-500: #8A9D92;
      --gris-verde-claro: #DCE9F5;
      --gris-fondo: #ECEBE4;
      --gris-texto: #6B6A64;
      --gris-borde: #E2E0D8;
      --texto: #1F2A37;
      --blanco: #FFFFFF;
      --rojo: #A32D2D;
      --rojo-claro: #FCEBEB;
      --ambar-claro: #FAEEDA;
      --ambar-texto: #854F0B;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--texto);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      background:
        radial-gradient(circle at 25% 20%, rgba(121,140,129,0.08), transparent 42%),
        radial-gradient(circle at 80% 85%, rgba(95,114,104,0.06), transparent 45%),
        linear-gradient(160deg, #F1F0EA 0%, #E7E6DF 100%);
    }
    .app {
      width: 100%; max-width: 380px;
      background: var(--blanco);
      border-radius: 22px;
      box-shadow: 0 20px 50px rgba(95,114,104,0.18), 0 4px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    /* Cabecera con marca */
    .cabecera {
      background: linear-gradient(135deg, var(--gris-verde-700), var(--gris-verde-900));
      padding: 20px 24px;
      display: flex; flex-direction: row; align-items: center; gap: 8px;
      justify-content: center;
    }
    .cabecera img { height: 70px; width: auto; border-radius: 12px; }
    .cabecera .marca-bloque { text-align: center; }
    .cabecera .marca-texto { font-family: 'Sora', -apple-system, sans-serif; color: #fff; font-size: 22px; font-weight: 700; letter-spacing: 0.04em; display: block; }
    .cabecera .marca-eslogan { font-family: 'Fraunces', Georgia, serif; font-style: italic; font-size: 13px; color: #E8EDE9; margin-top: 2px; display: block; }

    .cuerpo { padding: 24px 24px 30px; }

    .area-info {
      background: linear-gradient(135deg, var(--gris-verde-claro), #E0E6E1);
      border: 1px solid #DCE3DE;
      border-radius: 16px; padding: 18px; text-align: center; margin-bottom: 24px;
    }
    .area-info .ico-area {
      width: 34px; height: 34px; border-radius: 10px; background: var(--gris-verde-700);
      display: flex; align-items: center; justify-content: center; margin: 0 auto 8px;
    }
    .area-info .ico-area svg { width: 19px; height: 19px; stroke: #fff; }
    .area-info .etiqueta { font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gris-verde-700); font-weight: 700; margin-bottom: 4px; }
    .area-info .nombre { font-size: 19px; font-weight: 600; color: var(--texto); }
    .area-info .edificio { font-size: 13px; color: var(--gris-texto); margin-top: 4px; }

    .label { text-align: center; font-size: 14px; color: var(--gris-texto); margin-bottom: 16px; }
    .label.error { color: var(--rojo); font-weight: 600; }

    .pin-dots { display: flex; gap: 14px; justify-content: center; margin-bottom: 26px; }
    .dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--gris-borde); background: transparent; transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), background 0.15s, border-color 0.15s, box-shadow 0.15s; }
    .dot.full { background: var(--gris-verde-900); border-color: var(--gris-verde-900); box-shadow: 0 2px 6px rgba(95,114,104,0.4); animation: dotPop 0.22s cubic-bezier(0.34,1.56,0.64,1); }
    .dot.error { border-color: var(--rojo); background: var(--rojo); }
    @keyframes dotPop { 0% { transform: scale(0.6); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }

    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .key {
      aspect-ratio: 1.6; border: 1px solid var(--gris-borde); border-radius: 14px;
      background: #FFFFFF; font-size: 22px; font-weight: 500; color: var(--texto);
      cursor: pointer; transition: transform 0.08s, background 0.12s, box-shadow 0.12s;
      touch-action: manipulation; -webkit-user-select: none; user-select: none;
    }
    .key:active, .key.key-press { transform: scale(0.94); background: var(--gris-verde-claro); box-shadow: inset 0 2px 8px rgba(95,114,104,0.15); }
    .key.accion { background: transparent; border-color: transparent; font-size: 14px; color: var(--gris-texto); font-weight: 600; box-shadow: none; }
    .key.accion:active, .key.accion.key-press { background: var(--gris-fondo); transform: scale(0.94); }
    .key:disabled { opacity: 0.4; }

    .pantalla { display: none; }
    .pantalla.activa { display: block; animation: aparecer 0.3s ease; }
    @keyframes aparecer { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .icono-circulo {
      width: 64px; height: 64px; border-radius: 50%;
      background: #D6F0E4;
      display: flex; align-items: center; justify-content: center;
      margin: 6px auto 14px;
    }
    .icono-circulo svg { width: 32px; height: 32px; }
    .saludo { text-align: center; padding: 0 0 18px; }
    .saludo .hola { font-size: 18px; font-weight: 600; }
    .saludo .sub { font-size: 13px; color: var(--gris-texto); margin-top: 2px; }

    .aviso {
      background: var(--ambar-claro); color: var(--ambar-texto);
      border-radius: 12px; padding: 12px 14px; font-size: 13px;
      text-align: center; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .aviso svg { width: 17px; height: 17px; flex-shrink: 0; }

    .btn {
      width: 100%; padding: 16px; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: transform 0.08s, box-shadow 0.15s; color: #fff;
      background: linear-gradient(135deg, var(--gris-verde-700), var(--gris-verde-900));
      box-shadow: 0 4px 14px rgba(121,140,129,0.32);
    }
    .btn:hover { box-shadow: 0 6px 20px rgba(121,140,129,0.45); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; }
    .btn-fantasma {
      background: transparent; color: var(--gris-texto);
      border: 1.5px solid var(--gris-borde); font-weight: 500; font-size: 14px;
      padding: 13px; margin-top: 10px; box-shadow: none;
    }
    .btn-fantasma:hover { box-shadow: none; }

    #input-foto { display: none; }
    .preview-foto { max-width: 100%; max-height: 40vh; width: auto; border-radius: 14px; margin: 0 auto 16px; display: none; border: 1.5px solid var(--gris-borde); }

    .exito-circulo {
      width: 76px; height: 76px; border-radius: 50%;
      background: var(--gris-verde-claro);
      display: flex; align-items: center; justify-content: center;
      margin: 8px auto 18px;
    }
    .exito-circulo svg { width: 40px; height: 40px; }
    .exito-titulo { text-align: center; font-size: 22px; font-weight: 600; }
    .exito-dato { text-align: center; font-size: 14px; color: var(--gris-texto); margin-top: 4px; }
    .exito-foto { max-width: 100%; max-height: 40vh; width: auto; border-radius: 14px; margin: 18px auto 0; border: 1.5px solid var(--gris-borde); display: none; }

    .estado-guardado { text-align: center; font-size: 12px; margin-top: 14px; padding: 8px; border-radius: 10px; }
    .estado-ok { background: var(--gris-verde-claro); color: var(--gris-verde-900); }
    .estado-error { background: var(--rojo-claro); color: var(--rojo); }
    .estado-cargando { background: #EEF1EF; color: var(--gris-verde-700); }

    .exito-nota { text-align: center; font-size: 12px; color: var(--gris-texto); margin-top: 14px; line-height: 1.5; }
    .inc-titulo { text-align: center; font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .inc-sub { text-align: center; font-size: 13px; color: var(--gris-texto); margin-bottom: 20px; }
    .inc-tipos { display: flex; gap: 10px; margin-bottom: 20px; }
    .inc-tipo { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px 10px; border: 1.5px solid var(--gris-borde); border-radius: 14px; background: var(--blanco); cursor: pointer; font-size: 13px; font-weight: 600; color: var(--gris-texto); }
    .inc-tipo svg { width: 26px; height: 26px; stroke: var(--gris-verde-700); }
    .inc-tipo.activo { border-color: #377D37; background: #E7F1E7; color: #2A5F2A; }
    .inc-tipo.activo svg { stroke: #377D37; }
    .inc-label { display: block; font-size: 13px; font-weight: 600; color: var(--gris-texto); margin-bottom: 6px; }
    .inc-desc { width: 100%; min-height: 90px; padding: 13px; font-size: 15px; border: 1.5px solid var(--gris-borde); border-radius: 12px; margin-bottom: 16px; outline: none; resize: vertical; font-family: inherit; }
    .inc-desc:focus { border-color: var(--gris-verde-700); }

    /* ===== AJUSTE PARA PANTALLAS DE POCA ALTURA (móviles) ===== */
    /* Comprime la pantalla del PIN para que el teclado completo (incl. 0 y Borrar) */
    /* entre sin hacer scroll. Solo afecta a teléfonos; en desktop queda igual. */
    @media (max-height: 740px) {
      body { padding: 10px; align-items: flex-start; }
      .cabecera { padding: 14px 24px; }
      .cabecera img { height: 52px; }
      .cabecera .marca-texto { font-size: 20px; }
      .cabecera .marca-eslogan { font-size: 12px; }
      .cuerpo { padding: 16px 20px 20px; }
      #p-pin .area-info { padding: 12px; margin-bottom: 14px; }
      #p-pin .area-info .ico-area { width: 28px; height: 28px; margin-bottom: 6px; }
      #p-pin .area-info .nombre { font-size: 17px; }
      #p-pin .label { margin-bottom: 12px; }
      #p-pin .pin-dots { margin-bottom: 16px; }
      #p-pin .keypad { gap: 9px; }
      #p-pin .key { aspect-ratio: 2.0; font-size: 20px; border-radius: 12px; }
      /* Pantalla de confirmar más compacta para que los botones se vean sin scroll */
      #p-confirmar .icono-circulo { width: 48px; height: 48px; margin: 0 auto 8px; }
      #p-confirmar .icono-circulo svg { width: 24px; height: 24px; }
      #p-confirmar .saludo { padding-bottom: 10px; }
      #p-confirmar .aviso { margin-bottom: 10px; padding: 9px 12px; }
      .preview-foto { max-height: 30vh; }
    }
    /* Pantallas aún más bajas (teléfonos pequeños) */
    @media (max-height: 640px) {
      .cabecera img { height: 44px; }
      #p-pin .area-info .edificio { font-size: 12px; }
      #p-pin .keypad { gap: 7px; }
      #p-pin .key { aspect-ratio: 2.3; font-size: 19px; }
    }
  </style>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
</head>
<body>
  <div class="app">
    <div class="cabecera">
      <img src="logo-simbolo.png" alt="CleanTrack" />
      <div class="marca-bloque">
        <span class="marca-texto">CleanTrack</span>
        <span class="marca-eslogan">Every cleaning, verified</span>
      </div>
      <button id="btn-idioma" data-i18n-toggle onclick="I18N.toggle()" aria-label="Cambiar idioma" style="margin-left:auto; background:transparent; border:1.5px solid rgba(0,0,0,0.15); color:inherit; padding:6px 12px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer;">EN</button>
    </div>

    <div class="cuerpo">

      <!-- PANTALLA PIN -->
      <div class="pantalla activa" id="p-pin">
        <div class="area-info">
          <div class="ico-area"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg></div>
          <div class="etiqueta">Área a registrar</div>
          <div class="nombre" id="area-nombre" data-i18n="epl.cargando_area">Cargando área...</div>
          <div class="edificio" id="area-edificio"></div>
        </div>
        <div class="label" id="label-pin" data-i18n="epl.label_pin">Ingresa tu PIN para registrar</div>
        <div class="pin-dots" id="pin-dots">
          <div class="dot" id="dot1"></div>
          <div class="dot" id="dot2"></div>
          <div class="dot" id="dot3"></div>
          <div class="dot" id="dot4"></div>
        </div>
        <div class="keypad" id="keypad">
          <button class="key" onclick="press('1')">1</button>
          <button class="key" onclick="press('2')">2</button>
          <button class="key" onclick="press('3')">3</button>
          <button class="key" onclick="press('4')">4</button>
          <button class="key" onclick="press('5')">5</button>
          <button class="key" onclick="press('6')">6</button>
          <button class="key" onclick="press('7')">7</button>
          <button class="key" onclick="press('8')">8</button>
          <button class="key" onclick="press('9')">9</button>
          <button class="key accion" onclick="borrar()" data-i18n="epl.borrar">Borrar</button>
          <button class="key" onclick="press('0')">0</button>
          <button class="key accion" style="opacity:0;pointer-events:none">·</button>
        </div>
      </div>

      <!-- PANTALLA CONFIRMAR -->
      <div class="pantalla" id="p-confirmar">
        <div class="saludo">
          <div class="icono-circulo">
            <svg viewBox="0 0 24 24" fill="none" stroke="#5F7268" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </div>
          <div class="hola" id="saludo-nombre">Hola</div>
          <div class="sub" id="saludo-area">—</div>
        </div>
        <div class="aviso" id="aviso-foto">
          <svg viewBox="0 0 24 24" fill="none" stroke="#854F0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
          Hoy se requiere una foto de esta área
        </div>

        <img class="preview-foto" id="preview-foto" alt="Foto del área" />
        <input type="file" id="input-foto" accept="image/*" capture="environment" onchange="fotoTomada(event)" />

        <button class="btn" id="btn-principal" onclick="accionPrincipal()" data-i18n="epl.tomar_foto">Tomar foto del área</button>
        <button class="btn btn-fantasma" onclick="abrirIncidencia()" data-i18n="epl.reportar_inc">Reportar una incidencia</button>
      </div>

      <!-- PANTALLA ÉXITO -->
      <div class="pantalla" id="p-exito">
        <div class="exito-circulo">
          <svg viewBox="0 0 24 24" fill="none" stroke="#5F7268" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        </div>
        <div class="exito-titulo" data-i18n="epl.exito_titulo">Área registrada</div>
        <div class="exito-dato" id="exito-hora">9:41 am</div>
        <div class="exito-dato" id="exito-area">—</div>
        <img class="exito-foto" id="exito-foto" alt="Foto registrada" />
        <div class="estado-guardado" id="estado-guardado"></div>
        <button class="btn btn-fantasma" style="margin-top:22px" onclick="abrirIncidencia()" data-i18n="epl.reportar_inc">Reportar una incidencia</button>
        <div class="exito-nota" data-i18n="epl.exito_nota">Escanea el código de la siguiente área cuando termines de limpiarla.</div>
      </div>

      <!-- PANTALLA REPORTAR INCIDENCIA -->
      <div class="pantalla" id="p-incidencia">
        <div class="inc-titulo" data-i18n="epl.inc_titulo">Reportar incidencia</div>
        <div class="inc-sub" id="inc-area-info">—</div>

        <div class="inc-tipos">
          <button class="inc-tipo" id="tipo-insumo" onclick="elegirTipo('insumo')">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            <span data-i18n="epl.inc_insumo">Falta un insumo</span>
          </button>
          <button class="inc-tipo" id="tipo-problema" onclick="elegirTipo('problema')">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12" y2="17.01"></line></svg>
            <span data-i18n="epl.inc_problema">Hay un problema</span>
          </button>
        </div>

        <label class="inc-label" data-i18n="epl.inc_desc_label">Descripción</label>
        <textarea class="inc-desc" id="inc-desc" data-i18n-ph="epl.inc_desc_ph" placeholder="Ej. Se acabó el jabón en el dispensador / El inodoro está tapado"></textarea>

        <img class="preview-foto" id="inc-preview" alt="Foto de la incidencia" />
        <input type="file" id="inc-input-foto" accept="image/*" capture="environment" onchange="incFotoTomada(event)" />
        <button class="btn btn-fantasma" id="inc-btn-foto" onclick="document.getElementById('inc-input-foto').click()" data-i18n="epl.inc_agregar_foto">Agregar foto (opcional)</button>

        <button class="btn" id="inc-btn-enviar" onclick="enviarIncidencia()" data-i18n="epl.inc_enviar">Enviar reporte</button>
        <button class="btn btn-fantasma" onclick="reiniciar()" data-i18n="epl.cancelar">Cancelar</button>
        <div class="estado-guardado" id="inc-estado"></div>
      </div>

    </div>
  </div>

  <script>
    // El cliente de Supabase (db) y las credenciales vienen de config.js
    const db = window.db;

    // Genera un nombre de archivo aleatorio e imposible de adivinar (anti-husmeo de fotos)
    function nombreFotoAleatorio(prefijo) {
      var aleatorio;
      if (window.crypto && crypto.randomUUID) {
        aleatorio = crypto.randomUUID();
      } else if (window.crypto && crypto.getRandomValues) {
        var bytes = new Uint8Array(16);
        crypto.getRandomValues(bytes);
        aleatorio = Array.from(bytes).map(function(b){ return ("0" + b.toString(16)).slice(-2); }).join("");
      } else {
        aleatorio = Date.now() + "_" + Math.random().toString(36).slice(2);
      }
      return prefijo + "_" + aleatorio + ".jpg";
    }

    var datosArea = { id: null, area: "Cargando área...", edificio: "", compania_id: null };
    var pin = "";
    var empleadoNombre = null;
    var pideFoto = false;
    var fotoLista = false;
    var fotoDataURL = null;
    var fotoArchivo = null;
    var verificando = false;

    // Pinta el saludo del empleado en el idioma actual (textContent = anti-XSS)
    function pintarSaludoEmpleado() {
      var el = document.getElementById("saludo-nombre");
      if (!el) return;
      el.textContent = empleadoNombre ? (I18N.t("epl.hola") + ", " + empleadoNombre) : I18N.t("epl.hola");
    }

    // Leer el ?area= del QR y buscar el área real
    async function cargarArea() {
      I18N.aplicar();
      I18N.onChange(function(){ I18N.aplicar(); pintarSaludoEmpleado(); });
      var params = new URLSearchParams(window.location.search);
      var areaId = params.get("area");
      if (!areaId) {
        document.getElementById("area-nombre").textContent = I18N.t("epl.area_no_esp");
        document.getElementById("area-edificio").textContent = I18N.t("epl.escanea_valido");
        return;
      }
      if (!db) return;
      const { data, error } = await db.rpc("obtener_area", { p_area_id: Number(areaId) });
      if (error || !data || data.length === 0) {
        document.getElementById("area-nombre").textContent = I18N.t("epl.area_no_enc");
        document.getElementById("area-edificio").textContent = I18N.t("epl.verifica_qr");
        return;
      }
      var a = data[0];
      datosArea.id = Number(areaId);
      datosArea.area = a.nombre;
      datosArea.edificio = a.edificio;
      pideFoto = a.requiere_foto;
      document.getElementById("area-nombre").textContent = a.nombre;
      document.getElementById("area-edificio").textContent = a.edificio;
    }

    function press(n) {
      if (verificando) return;
      if (pin.length >= 4) return;
      pin += n;
      pintarDots();
      if (pin.length === 4) verificarPin();
    }
    function borrar() {
      if (verificando) return;
      pin = pin.slice(0, -1);
      pintarDots();
    }

    // Feedback visual consistente al tocar cualquier tecla (funciona en todos los móviles)
    function activarFeedbackTeclas() {
      var teclas = document.querySelectorAll("#keypad .key");
      teclas.forEach(function(tecla) {
        function presionar() { tecla.classList.add("key-press"); }
        function soltar() { tecla.classList.remove("key-press"); }
        tecla.addEventListener("touchstart", presionar, { passive: true });
        tecla.addEventListener("touchend", soltar);
        tecla.addEventListener("touchcancel", soltar);
        tecla.addEventListener("mousedown", presionar);
        tecla.addEventListener("mouseup", soltar);
        tecla.addEventListener("mouseleave", soltar);
      });
    }
    function pintarDots(conError) {
      for (var i = 1; i <= 4; i++) {
        var d = document.getElementById("dot" + i);
        d.classList.toggle("full", pin.length >= i && !conError);
        d.classList.toggle("error", !!conError);
      }
    }

    async function verificarPin() {
      if (!db) { mostrarErrorPin(I18N.t("epl.sin_conexion_corta")); return; }
      verificando = true;
      document.getElementById("label-pin").textContent = I18N.t("epl.verificando");
      document.getElementById("label-pin").className = "label";
      try {
        const { data, error } = await db.rpc("verificar_pin_area", { p_area_id: datosArea.id, p_pin: pin });
        if (error) {
          if (error.message && error.message.indexOf("demasiados_intentos") !== -1) {
            mostrarErrorPin(I18N.t("epl.demasiados"));
          } else {
            mostrarErrorPin(I18N.t("epl.error_verificar"));
          }
          return;
        }
        if (data && data.length > 0) {
          empleadoNombre = data[0].nombre;
          verificando = false;
          entrar();
        } else {
          mostrarErrorPin(I18N.t("epl.pin_no_valido"));
        }
      } catch (e) { mostrarErrorPin(I18N.t("epl.error_verificar")); }
    }

    function mostrarErrorPin(mensaje) {
      pintarDots(true);
      var label = document.getElementById("label-pin");
      label.textContent = mensaje;
      label.className = "label error";
      setTimeout(function() {
        pin = ""; pintarDots(); verificando = false;
        label.textContent = I18N.t("epl.label_pin");
        label.className = "label";
      }, 1200);
    }

    function entrar() {
      var aviso = document.getElementById("aviso-foto");
      var btn = document.getElementById("btn-principal");
      fotoLista = false; fotoArchivo = null;
      document.getElementById("preview-foto").style.display = "none";
      pintarSaludoEmpleado();
      document.getElementById("saludo-area").textContent = datosArea.area;
      if (pideFoto) {
        aviso.style.display = "flex";
        btn.textContent = I18N.t("epl.tomar_foto");
      } else {
        aviso.style.display = "none";
        btn.textContent = I18N.t("epl.confirmar");
      }
      ir("p-confirmar");
    }

    function accionPrincipal() {
      if (!pideFoto) { registrar(false); return; }
      if (!fotoLista) { document.getElementById("input-foto").click(); }
      else { registrar(true); }
    }

    function fotoTomada(event) {
      var archivo = event.target.files[0];
      if (!archivo) return;
      fotoArchivo = archivo;
      var lector = new FileReader();
      lector.onload = function(e) {
        fotoDataURL = e.target.result;
        var preview = document.getElementById("preview-foto");
        preview.src = fotoDataURL;
        preview.style.display = "block";
        fotoLista = true;
        document.getElementById("btn-principal").textContent = I18N.t("epl.registrar_con_foto");
        document.getElementById("btn-reintentar-foto").style.display = "block";
        
      };
      lector.readAsDataURL(archivo);
    }

    async function registrar(conFoto) {
      document.getElementById("btn-principal").disabled = true;
      ir("p-exito", conFoto);
      var estado = document.getElementById("estado-guardado");
      estado.className = "estado-guardado estado-cargando";
      estado.textContent = conFoto ? "Subiendo foto..." : "Guardando...";

      if (!db) {
        estado.className = "estado-guardado estado-error";
        estado.textContent = I18N.t("epl.sin_conexion");
        document.getElementById("btn-principal").disabled = false;
        return;
      }

      var fotoUrl = null;
      if (conFoto && fotoArchivo) {
        try {
          var nombreArchivo = nombreFotoAleatorio("foto");
          const { data: subida, error: errorSubida } = await db
            .storage.from("fotos")
            .upload(nombreArchivo, fotoArchivo, { contentType: fotoArchivo.type || "image/jpeg" });
          if (errorSubida) {
            estado.className = "estado-guardado estado-error";
            estado.textContent = I18N.t("epl.error_subir") + errorSubida.message;
            document.getElementById("btn-principal").disabled = false;
            return;
          }
          const { data: urlData } = db.storage.from("fotos").getPublicUrl(nombreArchivo);
          fotoUrl = urlData.publicUrl;
        } catch (e) {
          estado.className = "estado-guardado estado-error";
          estado.textContent = I18N.t("epl.error_subir") + e.message;
          document.getElementById("btn-principal").disabled = false;
          return;
        }
      }

      estado.textContent = I18N.t("epl.guardando");
      try {
        const { data, error } = await db.rpc("registrar_limpieza", {
          p_area_id: datosArea.id,
          p_pin: pin,
          p_con_foto: conFoto,
          p_foto_url: fotoUrl
        });
        if (error) {
          estado.className = "estado-guardado estado-error";
          estado.textContent = I18N.t("epl.no_guardar") + error.message;
        } else if (data && data.ok) {
          estado.className = "estado-guardado estado-ok";
          estado.textContent = conFoto ? "Guardado con foto" : "Guardado correctamente";
        } else {
          estado.className = "estado-guardado estado-error";
          var motivo = (data && data.motivo) || "no_guardado";
          estado.textContent = (motivo === "pin_invalido") ? "PIN no válido al guardar." : "No se pudo guardar.";
        }
      } catch (e) {
        estado.className = "estado-guardado estado-error";
        estado.textContent = I18N.t("epl.error") + e.message;
      }
      document.getElementById("btn-principal").disabled = false;
    }

    function ir(id, conFoto) {
      document.querySelectorAll(".pantalla").forEach(function(p){ p.classList.remove("activa"); });
      document.getElementById(id).classList.add("activa");
      if (id === "p-exito") {
        var ahora = new Date();
        var h = ahora.getHours(), m = ahora.getMinutes();
        var ampm = h >= 12 ? "pm" : "am";
        h = h % 12; if (h === 0) h = 12;
        m = m < 10 ? "0" + m : m;
        document.getElementById("exito-hora").textContent = h + ":" + m + " " + ampm;
        document.getElementById("exito-area").textContent = datosArea.area;
        var exitoFoto = document.getElementById("exito-foto");
        if (conFoto && fotoDataURL) { exitoFoto.src = fotoDataURL; exitoFoto.style.display = "block"; }
        else { exitoFoto.style.display = "none"; }
      }
    }

    function reiniciar() {
      pin = ""; empleadoNombre = null; verificando = false;
      pintarDots();
      document.getElementById("label-pin").textContent = I18N.t("epl.label_pin");
      document.getElementById("label-pin").className = "label";
      fotoLista = false; fotoDataURL = null; fotoArchivo = null;
      document.getElementById("input-foto").value = "";
      document.getElementById("estado-guardado").textContent = "";
      document.getElementById("estado-guardado").className = "estado-guardado";
      ir("p-pin");
    }

    // ===== INCIDENCIAS =====
    var incTipo = null;
    var incFotoArchivo = null;
    var incFotoDataURL = null;

    function abrirIncidencia() {
      incTipo = null;
      incFotoArchivo = null;
      incFotoDataURL = null;
      document.getElementById("inc-desc").value = "";
      document.getElementById("inc-preview").style.display = "none";
      document.getElementById("inc-input-foto").value = "";
      document.getElementById("inc-btn-foto").textContent = I18N.t("epl.inc_agregar_foto");
      document.getElementById("tipo-insumo").classList.remove("activo");
      document.getElementById("tipo-problema").classList.remove("activo");
      document.getElementById("inc-estado").textContent = "";
      document.getElementById("inc-estado").className = "estado-guardado";
      document.getElementById("inc-area-info").textContent = datosArea.area + " · " + datosArea.edificio;
      document.getElementById("inc-btn-enviar").disabled = false;
      ir("p-incidencia");
    }

    function elegirTipo(tipo) {
      incTipo = tipo;
      document.getElementById("tipo-insumo").classList.toggle("activo", tipo === "insumo");
      document.getElementById("tipo-problema").classList.toggle("activo", tipo === "problema");
    }

    function incFotoTomada(event) {
      var archivo = event.target.files[0];
      if (!archivo) return;
      incFotoArchivo = archivo;
      var reader = new FileReader();
      reader.onload = function(e) {
        incFotoDataURL = e.target.result;
        var prev = document.getElementById("inc-preview");
        prev.src = incFotoDataURL;
        prev.style.display = "block";
        document.getElementById("inc-btn-foto").textContent = I18N.t("epl.inc_cambiar_foto");
      };
      reader.readAsDataURL(archivo);
    }

    async function enviarIncidencia() {
      var desc = document.getElementById("inc-desc").value.trim();
      var estado = document.getElementById("inc-estado");

      if (!incTipo) { estado.className = "estado-guardado estado-error"; estado.textContent = I18N.t("epl.inc_elige_tipo"); return; }
      if (!desc) { estado.className = "estado-guardado estado-error"; estado.textContent = I18N.t("epl.inc_describe"); return; }

      document.getElementById("inc-btn-enviar").disabled = true;
      estado.className = "estado-guardado estado-cargando";

      var fotoUrl = null;
      if (incFotoArchivo) {
        estado.textContent = I18N.t("epl.inc_subiendo");
        try {
          var nombreArchivo = nombreFotoAleatorio("incidencia");
          const { error: errSubida } = await db.storage.from("fotos").upload(nombreArchivo, incFotoArchivo, { contentType: incFotoArchivo.type });
          if (errSubida) {
            estado.className = "estado-guardado estado-error";
            estado.textContent = I18N.t("epl.error_subir") + errSubida.message;
            document.getElementById("inc-btn-enviar").disabled = false;
            return;
          }
          const { data: urlData } = db.storage.from("fotos").getPublicUrl(nombreArchivo);
          fotoUrl = urlData.publicUrl;
        } catch (e) {
          estado.className = "estado-guardado estado-error";
          estado.textContent = I18N.t("epl.error_subir") + e.message;
          document.getElementById("inc-btn-enviar").disabled = false;
          return;
        }
      }

      estado.textContent = I18N.t("epl.inc_enviando");
      try {
        const { data, error } = await db.rpc("registrar_incidencia", {
          p_area_id: datosArea.id,
          p_pin: pin,
          p_tipo: incTipo,
          p_descripcion: desc,
          p_foto_url: fotoUrl
        });
        if (error) {
          estado.className = "estado-guardado estado-error";
          estado.textContent = I18N.t("epl.inc_no_enviar") + error.message;
          document.getElementById("inc-btn-enviar").disabled = false;
        } else if (data && data.ok) {
          estado.className = "estado-guardado estado-ok";
          estado.textContent = I18N.t("epl.inc_ok");
          setTimeout(function(){ reiniciar(); }, 1400);
        } else {
          estado.className = "estado-guardado estado-error";
          var motivo = (data && data.motivo) || "no_enviado";
          estado.textContent = (motivo === "pin_invalido") ? "PIN no válido." : "No se pudo enviar.";
          document.getElementById("inc-btn-enviar").disabled = false;
        }
      } catch (e) {
        estado.className = "estado-guardado estado-error";
        estado.textContent = I18N.t("epl.error") + e.message;
        document.getElementById("inc-btn-enviar").disabled = false;
      }
    }

    cargarArea();
    activarFeedbackTeclas();
  </script>
</body>
</html>
