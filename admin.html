<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanTrack — Empleados</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="idiomas.js"></script>
  <script src="ui.js"></script>

  <style>
    :root {
      --azul-osc: #0C447C;
      --azul: #185FA5;
      --azul-suave: #BBD2EA;
      --verde-accion: #178A65;
      --verde-accion-claro: #E7F1E7;
      --gris-verde-700: #798C81;
      --gris-verde-900: #5F7268;
      --gris-verde-claro: #EAEEEB;
      --verde-claro: #E7F1E7;
      --verde-texto: #27500A;
      --gris-fondo: #ECEBE4;
      --gris-texto: #5A6573;
      --gris-borde: #E2E0D8;
      --texto: #1B2733;
      --blanco: #FFFFFF;
      --rojo: #A32D2D;
      --rojo-claro: #FCEBEB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--gris-fondo); color: var(--texto); min-height: 100vh; }
    .verificando { max-width: 600px; margin: 60px auto; text-align: center; color: var(--gris-texto); font-size: 15px; padding: 0 20px; }
    .contenedor { display: none; }

    /* ===== Cabecera azul ===== */
    .cabecera { background: var(--azul-osc); }
    .cab-inner { max-width: 600px; margin: 0 auto; padding: 18px 20px 22px; }
    .cab-fila { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.16); }
    .barra-marca { display: flex; align-items: center; gap: 9px; }
    .logo-simbolo { height: 30px; width: auto; display: block; }
    .marca-texto { font-family: "Sora", sans-serif; font-size: 18px; font-weight: 600; color: var(--blanco); letter-spacing: -0.01em; }
    .cab-botones { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-cab { background: transparent; color: var(--blanco); border: 1.5px solid rgba(255,255,255,0.45); padding: 8px 15px; border-radius: 11px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; font-family: inherit; white-space: nowrap; }
    .btn-cab:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.65); }
    .btn-cab:active { transform: scale(0.97); }
    .cab-titulo { margin-top: 16px; }
    .cab-titulo h1 { font-size: 23px; font-weight: 600; color: var(--blanco); }
    .cab-sub { font-size: 13px; color: var(--azul-suave); margin-top: 3px; }

    /* ===== Cuerpo ===== */
    .main { max-width: 600px; margin: 0 auto; padding: 22px 20px 40px; }

    .tarjeta { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    .tarjeta h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

    label { display: block; font-size: 13px; font-weight: 600; color: var(--gris-texto); margin-bottom: 6px; }
    input.campo-texto { width: 100%; padding: 13px; font-size: 16px; border: 1.5px solid var(--gris-borde); border-radius: 12px; margin-bottom: 14px; outline: none; font-family: inherit; }
    input.campo-texto:focus { border-color: var(--azul); }

    .selector-edificios { margin-bottom: 16px; }
    .chips-caja { background: var(--blanco); border: 1.5px solid var(--gris-borde); border-radius: 12px; padding: 8px; min-height: 48px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; cursor: text; }
    .chips-caja.focus { border-color: var(--azul); }
    .chip { display: inline-flex; align-items: center; gap: 6px; background: var(--verde-accion-claro); color: var(--verde-texto); font-size: 13px; padding: 5px 10px; border-radius: 9px; font-weight: 600; }
    .chip .quitar { cursor: pointer; font-size: 16px; line-height: 1; opacity: 0.7; }
    .chip .quitar:hover { opacity: 1; }
    .chips-input { flex: 1; min-width: 130px; border: none; outline: none; background: transparent; font-size: 15px; padding: 5px; margin: 0; font-family: inherit; }
    .sugerencias { margin-top: 6px; border: 1.5px solid var(--gris-borde); border-radius: 12px; background: var(--blanco); max-height: 170px; overflow-y: auto; display: none; }
    .sugerencias.visible { display: block; }
    .sug-item { padding: 11px 13px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--gris-fondo); display: flex; align-items: center; gap: 9px; }
    .sug-item:last-child { border-bottom: none; }
    .sug-item:hover { background: var(--gris-fondo); }
    .sug-item svg { width: 16px; height: 16px; stroke: var(--gris-texto); flex-shrink: 0; }
    .sug-sin-asignar { background: #FAEEDA; border-bottom: 1px solid #EAD9B5; }
    .sug-sin-asignar:hover { background: #F5E4C5; }
    .sug-sin-asignar svg { stroke: #854F0B; }
    .sug-sin-asignar span { color: #854F0B; font-weight: 600; }
    .sug-hint { font-weight: 400; font-size: 12px; color: #9C7B3A; }
    .sug-vacio { padding: 12px 13px; font-size: 13px; color: var(--gris-texto); }

    .btn-agregar { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; background: var(--verde-accion); color: #fff; font-family: inherit; }
    .btn-agregar:active { transform: scale(0.98); }
    .btn-agregar:disabled { opacity: 0.6; }

    /* Campo PIN con botón Generar al lado */
    .pin-fila { display: flex; gap: 8px; align-items: stretch; margin-bottom: 14px; }
    .pin-fila .pin-input { flex: 1; margin-bottom: 0; }
    .btn-generar { flex-shrink: 0; padding: 0 16px; border: 1.5px solid var(--azul); background: #E6F1FB; color: var(--azul-osc); border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .btn-generar:hover { background: #d8e9f9; }
    .btn-generar:active { transform: scale(0.97); }

    .empleado { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--gris-borde); }
    .empleado:last-child { border-bottom: none; }
    .emp-avatar { width: 42px; height: 42px; border-radius: 50%; background: #E6F1FB; color: var(--azul-osc); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; flex-shrink: 0; }
    .emp-info { flex: 1; min-width: 0; }
    .emp-nombre { font-size: 15px; font-weight: 600; word-break: break-word; }
    .emp-pin { font-size: 13px; color: var(--gris-texto); }
    .emp-inactivo .emp-nombre, .emp-inactivo .emp-pin { opacity: 0.45; }

    .emp-acciones { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
    .btn-icono { width: 34px; height: 34px; border-radius: 9px; border: 1.5px solid var(--gris-borde); background: var(--blanco); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
    .btn-icono svg { width: 16px; height: 16px; }
    .btn-icono.editar svg { stroke: var(--azul-osc); }
    .btn-icono.eliminar svg { stroke: var(--rojo); }
    .btn-icono:active { transform: scale(0.92); }

    .switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; cursor: pointer; }
    .switch input { display: none; }
    .switch-track { position: absolute; inset: 0; background: #D3D1C7; border-radius: 99px; transition: background 0.28s cubic-bezier(0.34,1.56,0.64,1); }
    .switch input:checked + .switch-track { background: #1D9E75; }
    .switch-thumb { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; box-shadow: 0 1px 4px rgba(0,0,0,0.28); transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1); }
    .switch input:checked ~ .switch-thumb { transform: translateX(18px); }
    .switch:active .switch-thumb { width: 21px; }

    .mensaje { text-align: center; font-size: 13px; margin-top: 12px; padding: 10px; border-radius: 10px; display: none; }
    .mensaje.ok { background: var(--verde-claro); color: var(--verde-texto); display: block; }
    .mensaje.error { background: var(--rojo-claro); color: var(--rojo); display: block; }
    .cargando { text-align: center; color: var(--gris-texto); padding: 20px; font-size: 14px; }

    /* ===== Lista de empleados: buscador + filtros + chips ===== */
    .emp-lista-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
    .emp-lista-head h2 { margin-bottom: 0; }
    .emp-contador { font-size: 12px; color: var(--gris-texto); }
    .emp-buscador { margin-bottom: 12px; }
    .emp-filtros { display: flex; gap: 8px; margin-bottom: 16px; }
    .emp-filtro { flex: 1; padding: 8px 10px; border: 1.5px solid var(--gris-borde); background: var(--blanco); color: var(--gris-texto); border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .emp-filtro.activo { background: #E6F1FB; border-color: var(--azul); color: var(--azul-osc); }
    .emp-edificios { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .emp-chip { font-size: 11px; font-weight: 600; background: var(--gris-verde-claro); color: var(--gris-verde-900); padding: 3px 8px; border-radius: 7px; }
    .emp-sin-edificio { font-size: 12px; color: #9C7B3A; margin-top: 5px; }
    .emp-vacio { text-align: center; color: var(--gris-texto); padding: 18px; font-size: 14px; }
    .emp-inactivo .emp-avatar, .emp-inactivo .emp-edificios { opacity: 0.45; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
    .modal.abierto { display: flex; }
    .modal-caja { background: #fff; border-radius: 18px; padding: 26px; max-width: 420px; width: 100%; margin: auto; }
    .modal-titulo { font-size: 18px; font-weight: 600; margin-bottom: 18px; }
    .modal-botones { display: flex; gap: 10px; margin-top: 6px; }
    .btn-guardar { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; color: #fff; background: var(--verde-accion); font-family: inherit; }
    .btn-cancelar { flex: 0 0 auto; padding: 14px 20px; border: 1.5px solid var(--gris-borde); border-radius: 12px; background: transparent; color: var(--gris-texto); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }

    /* ===================== PC (pantallas anchas) ===================== */
    @media (min-width: 980px) {
      .cab-inner { max-width: 1080px; padding: 20px 32px 24px; }
      .cab-titulo h1 { font-size: 25px; }
      .main { max-width: 1080px; padding: 26px 32px 48px; display: grid; grid-template-columns: 380px 1fr; gap: 22px; align-items: start; }
      .col-agregar { position: sticky; top: 22px; margin: 0; }
      .col-lista { margin: 0; }
      .tarjeta { margin-bottom: 0; }
    }
  </style>
</head>
<body>

  <div class="verificando" id="verificando">Verificando sesión...</div>

  <div class="contenedor" id="contenedor">

    <header class="cabecera">
      <div class="cab-inner">
        <div class="cab-fila">
          <div class="barra-marca">
            <img src="logo-simbolo.png" alt="" class="logo-simbolo" />
            <span class="marca-texto">CleanTrack</span>
          </div>
          <div class="cab-botones">
            <a class="btn-cab" href="inicio.html" data-i18n="comun.inicio">← Inicio</a>
            <button class="btn-cab" data-i18n-toggle onclick="I18N.toggle()" aria-label="Cambiar idioma">EN</button>
            <a class="btn-cab" href="dashboard.html" data-i18n="emp.ver_registros">Ver registros</a>
            <button class="btn-cab" onclick="salir()" data-i18n="comun.salir">Salir</button>
          </div>
        </div>
        <div class="cab-titulo">
          <h1 data-i18n="emp.titulo">Empleados</h1>
          <div class="cab-sub" data-i18n="emp.subtitulo">Gestiona el personal de limpieza y sus PIN</div>
        </div>
      </div>
    </header>

    <main class="main">

      <div class="tarjeta col-agregar">
        <h2 data-i18n="emp.agregar_titulo">Agregar empleado</h2>
        <label for="nombre" data-i18n="emp.nombre">Nombre completo</label>
        <input type="text" class="campo-texto" id="nombre" data-i18n-ph="emp.nombre_ph" placeholder="Ej. Ana Torres" />
        <label for="pin" data-i18n="emp.pin">PIN (4 dígitos)</label>
        <div class="pin-fila">
          <input type="text" class="campo-texto pin-input" id="pin" data-i18n-ph="emp.pin_ph" placeholder="Ej. 4892" inputmode="numeric" maxlength="4" />
          <button type="button" class="btn-generar" onclick="generarPin('pin')" data-i18n="emp.generar">Generar</button>
        </div>

        <label data-i18n="emp.edificios">Edificios donde trabaja</label>
        <div class="selector-edificios">
          <div class="chips-caja" id="add-chips-caja" onclick="document.getElementById('add-buscador').focus()">
            <div id="add-chips" style="display:flex; flex-wrap:wrap; gap:6px;"></div>
            <input type="text" class="chips-input" id="add-buscador" data-i18n-ph="emp.buscar_edificio" placeholder="Buscar y agregar edificio..." autocomplete="off" />
          </div>
          <div class="sugerencias" id="add-sugerencias"></div>
        </div>

        <button class="btn-agregar" id="btn-agregar" onclick="agregarEmpleado()" data-i18n="emp.btn_agregar">Agregar empleado</button>
        <div class="mensaje" id="mensaje-agregar"></div>
      </div>

      <div class="tarjeta col-lista">
        <div class="emp-lista-head">
          <h2 data-i18n="emp.lista_titulo">Empleados</h2>
          <span class="emp-contador" id="emp-contador"></span>
        </div>
        <input type="text" class="campo-texto emp-buscador" id="emp-buscador" data-i18n-ph="emp.buscar" placeholder="Buscar por nombre o edificio..." autocomplete="off" />
        <div class="emp-filtros" id="emp-filtros">
          <button type="button" class="emp-filtro activo" data-filtro="todos" data-i18n="emp.f_todos">Todos</button>
          <button type="button" class="emp-filtro" data-filtro="activos" data-i18n="emp.f_activos">Activos</button>
          <button type="button" class="emp-filtro" data-filtro="inactivos" data-i18n="emp.f_inactivos">Inactivos</button>
        </div>
        <div id="lista-empleados">
          <div class="cargando" data-i18n="emp.cargando">Cargando...</div>
        </div>
      </div>

    </main>

  </div>

  <!-- MODAL EDITAR -->
  <div class="modal" id="modal-editar">
    <div class="modal-caja">
      <div class="modal-titulo" data-i18n="emp.editar_titulo">Editar empleado</div>
      <label for="edit-nombre" data-i18n="emp.nombre">Nombre completo</label>
      <input type="text" class="campo-texto" id="edit-nombre" />
      <label for="edit-pin" data-i18n="emp.pin">PIN (4 dígitos)</label>
      <div class="pin-fila">
        <input type="text" class="campo-texto pin-input" id="edit-pin" inputmode="numeric" maxlength="4" />
        <button type="button" class="btn-generar" onclick="generarPin('edit-pin')" data-i18n="emp.generar">Generar</button>
      </div>

      <label data-i18n="emp.edificios">Edificios donde trabaja</label>
      <div class="selector-edificios">
        <div class="chips-caja" id="edit-chips-caja" onclick="document.getElementById('edit-buscador').focus()">
          <div id="edit-chips" style="display:flex; flex-wrap:wrap; gap:6px;"></div>
          <input type="text" class="chips-input" id="edit-buscador" data-i18n-ph="emp.buscar_edificio" placeholder="Buscar y agregar edificio..." autocomplete="off" />
        </div>
        <div class="sugerencias" id="edit-sugerencias"></div>
      </div>

      <div class="mensaje" id="mensaje-editar"></div>
      <div class="modal-botones">
        <button class="btn-cancelar" onclick="cerrarEditar()" data-i18n="emp.cancelar">Cancelar</button>
        <button class="btn-guardar" id="btn-guardar-edit" onclick="guardarEdicion()" data-i18n="emp.guardar">Guardar cambios</button>
      </div>
    </div>
  </div>

  <script>
    var listaEdificios = [];   // nombres de edificios disponibles
    var empleadosCache = [];
    var editandoId = null;

    // Estado de selección para cada selector (agregar / editar)
    var seleccion = { add: [], edit: [] };

    var iconoEdificioSVG = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"></path><path d="M5 21V7l8-4v18"></path><path d="M19 21V11l-6-4"></path></svg>';

    async function verificarAcceso() {
      if (!db) { document.getElementById("verificando").textContent = I18N.t("comun.sin_conexion"); return; }
      const { data } = await db.auth.getSession();
      if (!data.session) { window.location.href = "login.html"; return; }
      document.getElementById("verificando").style.display = "none";
      document.getElementById("contenedor").style.display = "block";
      I18N.aplicar();
      I18N.onChange(function(){ I18N.aplicar(); renderLista(); });
      await cargarEdificios();
      cargarEmpleados();
      configurarFiltrosEmpleados();
      configurarSelector("add");
      configurarSelector("edit");
    }

    async function salir() {
      if (db) await db.auth.signOut();
      window.location.href = "login.html";
    }

    function iniciales(nombre) {
      var partes = (nombre || "").trim().split(" ");
      if (partes.length === 1) return partes[0].substring(0,2).toUpperCase();
      return (partes[0][0] + partes[partes.length-1][0]).toUpperCase();
    }

    async function cargarEdificios() {
      const { data, error } = await db.from("edificios").select("*").eq("activo", true).order("nombre", { ascending: true });
      if (error || !data) { listaEdificios = []; return; }
      listaEdificios = data.map(function(e){ return e.nombre; });
    }

    // ===== SELECTOR DE CHIPS + BUSCADOR (reutilizable) =====
    function configurarSelector(tipo) {
      var buscador = document.getElementById(tipo + "-buscador");
      var caja = document.getElementById(tipo + "-chips-caja");
      buscador.addEventListener("input", function(){ pintarSugerencias(tipo); });
      buscador.addEventListener("focus", function(){ caja.classList.add("focus"); pintarSugerencias(tipo); });
      buscador.addEventListener("blur", function(){
        caja.classList.remove("focus");
        setTimeout(function(){ document.getElementById(tipo + "-sugerencias").classList.remove("visible"); }, 180);
      });
    }

    function pintarChips(tipo) {
      var cont = document.getElementById(tipo + "-chips");
      cont.innerHTML = "";
      seleccion[tipo].forEach(function(nombre) {
        var chip = document.createElement("span");
        chip.className = "chip";
        // El nombre del edificio va como texto (anti-XSS); el botón quitar es estático
        var txt = document.createElement("span");
        txt.textContent = nombre;
        var quitar = document.createElement("span");
        quitar.className = "quitar";
        quitar.innerHTML = "&times;";
        quitar.addEventListener("click", function(e) {
          e.stopPropagation();
          seleccion[tipo] = seleccion[tipo].filter(function(x){ return x !== nombre; });
          pintarChips(tipo);
          pintarSugerencias(tipo);
        });
        chip.appendChild(txt);
        chip.appendChild(document.createTextNode(" "));
        chip.appendChild(quitar);
        cont.appendChild(chip);
      });
    }

    function pintarSugerencias(tipo) {
      var buscador = document.getElementById(tipo + "-buscador");
      var sug = document.getElementById(tipo + "-sugerencias");
      var texto = buscador.value.toLowerCase().trim();

      var disponibles = listaEdificios.filter(function(n){
        return seleccion[tipo].indexOf(n) === -1 && n.toLowerCase().indexOf(texto) !== -1;
      });

      sug.innerHTML = "";

      var mostrarSinAsignar = (tipo === "edit") && (texto === "" || "sin asignar".indexOf(texto) !== -1);
      if (mostrarSinAsignar) {
        var itemSin = document.createElement("div");
        itemSin.className = "sug-item sug-sin-asignar";
        itemSin.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><line x1="17" y1="8" x2="22" y2="13"></line><line x1="22" y1="8" x2="17" y2="13"></line></svg><span>Sin asignar <span class="sug-hint">— quitar de todos los edificios</span></span>';
        itemSin.onmousedown = async function(e) {
          e.preventDefault();
          var tieneEdificios = seleccion[tipo].length > 0;
          if (tieneEdificios) {
            const ok = await uiConfirm("¿Quitar a este empleado de todos sus edificios? Quedará en el grupo 'Sin asignar' (sigue activo en la compañía).", { titulo: "Quitar de todos los edificios", textoOk: "Sí, quitar", peligro: false });
            if (!ok) {
              buscador.focus();
              return;
            }
          }
          seleccion[tipo] = [];
          buscador.value = "";
          pintarChips(tipo);
          pintarSugerencias(tipo);
          buscador.focus();
        };
        sug.appendChild(itemSin);
      }

      if (listaEdificios.length === 0) {
        if (!mostrarSinAsignar) {
          sug.innerHTML = '<div class="sug-vacio">No hay edificios. Créalos primero en "Edificios y áreas".</div>';
        }
        sug.classList.add("visible");
        return;
      }

      if (disponibles.length === 0 && !mostrarSinAsignar) {
        var vacioDiv = document.createElement("div");
        vacioDiv.className = "sug-vacio";
        vacioDiv.textContent = texto ? I18N.t("emp.sin_coincidencias") : I18N.t("emp.todos_agregados");
        sug.appendChild(vacioDiv);
        sug.classList.add("visible");
        return;
      }

      disponibles.forEach(function(nombre) {
        var item = document.createElement("div");
        item.className = "sug-item";
        // icono estático + nombre como texto (anti-XSS)
        item.innerHTML = iconoEdificioSVG;
        var span = document.createElement("span");
        span.textContent = nombre;
        item.appendChild(span);
        item.onmousedown = function(e) {
          e.preventDefault();
          seleccion[tipo].push(nombre);
          buscador.value = "";
          pintarChips(tipo);
          pintarSugerencias(tipo);
          buscador.focus();
        };
        sug.appendChild(item);
      });
      sug.classList.add("visible");
    }

    // ===== LISTA DE EMPLEADOS AGRUPADA =====
    var filtroActual = "todos";

    function edificiosDe(emp) {
      return (emp.edificios || "").split(",").map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 0; });
    }
    function coincideFiltro(emp) {
      if (filtroActual === "activos") return !!emp.activo;
      if (filtroActual === "inactivos") return !emp.activo;
      return true;
    }
    function coincideBusqueda(emp, termino) {
      if (!termino) return true;
      if ((emp.nombre || "").toLowerCase().indexOf(termino) !== -1) return true;
      return edificiosDe(emp).some(function(ed){ return ed.toLowerCase().indexOf(termino) !== -1; });
    }
    function empleadosVisibles() {
      var b = document.getElementById("emp-buscador");
      var termino = b ? b.value.trim().toLowerCase() : "";
      return empleadosCache.filter(function(emp){ return coincideFiltro(emp) && coincideBusqueda(emp, termino); });
    }
    function actualizarContadorEmpleados() {
      var el = document.getElementById("emp-contador");
      if (!el) return;
      var b = document.getElementById("emp-buscador");
      var termino = b ? b.value.trim().toLowerCase() : "";
      var total = empleadosCache.length;
      var vis = empleadosVisibles().length;
      if (termino || filtroActual !== "todos") el.textContent = "Mostrando " + vis + " de " + total;
      else el.textContent = total + (total === 1 ? " empleado" : " empleados");
    }

    async function cargarEmpleados() {
      var cont = document.getElementById("lista-empleados");
      cont.innerHTML = '<div class="cargando" data-i18n="emp.cargando">Cargando...</div>';
      const { data, error } = await db.from("empleados").select("*").order("nombre", { ascending: true });
      if (error) {
        cont.innerHTML = "";
        var errDiv = document.createElement("div");
        errDiv.className = "mensaje error";
        errDiv.style.display = "block";
        errDiv.textContent = "Error: " + error.message;
        cont.appendChild(errDiv);
        return;
      }
      empleadosCache = data || [];
      renderLista();
    }

    function renderLista() {
      var cont = document.getElementById("lista-empleados");
      cont.innerHTML = "";
      if (empleadosCache.length === 0) {
        cont.innerHTML = '<div class="emp-vacio"></div>'; cont.firstChild.textContent = I18N.t("emp.vacio_inicial");
        actualizarContadorEmpleados();
        return;
      }
      var visibles = empleadosVisibles();
      if (visibles.length === 0) {
        cont.innerHTML = '<div class="emp-vacio"></div>'; cont.firstChild.textContent = I18N.t("emp.sin_coincidencias");
        actualizarContadorEmpleados();
        return;
      }
      visibles.forEach(function(emp){ cont.appendChild(filaEmpleado(emp)); });
      actualizarContadorEmpleados();
    }

    // Construye la fila de un empleado de forma SEGURA contra XSS.
    function filaEmpleado(emp) {
      var div = document.createElement("div");
      div.className = "empleado" + (emp.activo ? "" : " emp-inactivo");
      div.dataset.id = emp.id;
      div.innerHTML =
        '<div class="emp-avatar"></div>' +
        '<div class="emp-info">' +
          '<div class="emp-nombre"></div>' +
          '<div class="emp-edificios"></div>' +
          '<div class="emp-pin"></div>' +
        '</div>' +
        '<div class="emp-acciones">' +
          '<button class="btn-icono editar" title="Editar"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"></path></svg></button>' +
          '<button class="btn-icono eliminar" title="Eliminar"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>' +
          '<label class="switch">' +
            '<input type="checkbox" ' + (emp.activo ? "checked" : "") + ' />' +
            '<span class="switch-track"></span><span class="switch-thumb"></span>' +
          '</label>' +
        '</div>';
      div.querySelector(".emp-avatar").textContent = iniciales(emp.nombre);
      div.querySelector(".emp-nombre").textContent = emp.nombre || "";
      div.querySelector(".emp-pin").textContent = I18N.t("emp.pin_label") + (emp.pin || "");
      var edis = edificiosDe(emp);
      var contEdi = div.querySelector(".emp-edificios");
      if (edis.length === 0) {
        contEdi.className = "emp-sin-edificio";
        contEdi.textContent = I18N.t("emp.sin_edificio_asignado");
      } else {
        edis.forEach(function(ed){
          var chip = document.createElement("span");
          chip.className = "emp-chip";
          chip.textContent = ed;
          contEdi.appendChild(chip);
        });
      }
      div.querySelector(".btn-icono.editar").addEventListener("click", function() { abrirEditar(emp.id); });
      div.querySelector(".btn-icono.eliminar").addEventListener("click", function() { eliminarEmpleado(emp.id, emp.nombre, div); });
      div.querySelector(".switch input").addEventListener("change", function(e) { cambiarEstado(emp.id, e.target.checked, div); });
      return div;
    }

    function configurarFiltrosEmpleados() {
      var buscador = document.getElementById("emp-buscador");
      if (buscador) buscador.addEventListener("input", function(){ renderLista(); });
      var filtros = document.querySelectorAll(".emp-filtro");
      filtros.forEach(function(btn){
        btn.addEventListener("click", function(){
          filtros.forEach(function(b){ b.classList.remove("activo"); });
          btn.classList.add("activo");
          filtroActual = btn.dataset.filtro;
          renderLista();
        });
      });
    }

    // Lista de PIN fáciles de adivinar que NO se deben generar
    var PINS_FACILES = {
      "0000":1,"1111":1,"2222":1,"3333":1,"4444":1,"5555":1,"6666":1,"7777":1,"8888":1,"9999":1,
      "1234":1,"2345":1,"3456":1,"4567":1,"5678":1,"6789":1,"7890":1,
      "4321":1,"5432":1,"6543":1,"7654":1,"8765":1,"9876":1,"0987":1,
      "1212":1,"1122":1,"2580":1,"0852":1,"1004":1,"2020":1,"2024":1,"2025":1,"6969":1,"1313":1
    };

    function generarPin(campoId) {
      // PIN ya usados en la compañía (empleadosCache viene filtrado por RLS)
      var usados = {};
      empleadosCache.forEach(function(e){ if (e.pin) usados[String(e.pin)] = 1; });

      var nuevo = null;
      // Hasta 2000 intentos: de sobra para 10.000 combinaciones posibles
      for (var i = 0; i < 2000; i++) {
        var n = Math.floor(Math.random() * 10000);
        var candidato = ("000" + n).slice(-4);   // siempre 4 dígitos
        if (!usados[candidato] && !PINS_FACILES[candidato]) { nuevo = candidato; break; }
      }

      if (!nuevo) {
        uiToast("No se pudo generar un PIN libre. Revisa cuántos empleados tienes.", "error");
        return;
      }
      document.getElementById(campoId).value = nuevo;
    }

    async function agregarEmpleado() {
      var nombre = document.getElementById("nombre").value.trim();
      var pin = document.getElementById("pin").value.trim();
      var msg = document.getElementById("mensaje-agregar");

      if (!nombre || !pin) { msg.textContent = "Escribe el nombre y el PIN."; msg.className = "mensaje error"; return; }
      if (pin.length !== 4 || isNaN(pin)) { msg.textContent = "El PIN debe ser 4 dígitos numéricos."; msg.className = "mensaje error"; return; }
      if (seleccion.add.length === 0) { msg.textContent = "Agrega al menos un edificio."; msg.className = "mensaje error"; return; }
      var pinExiste = empleadosCache.some(function(e){ return e.pin === pin; });
      if (pinExiste) { msg.textContent = "Ese PIN ya está en uso por otro empleado."; msg.className = "mensaje error"; return; }

      document.getElementById("btn-agregar").disabled = true;
      msg.textContent = "Agregando..."; msg.className = "mensaje"; msg.style.display = "block";

      const { error } = await db.from("empleados").insert([{ nombre: nombre, pin: pin, activo: true, edificios: seleccion.add.join(", ") }]);

      if (error) {
        msg.textContent = "Error: " + error.message; msg.className = "mensaje error";
      } else {
        msg.textContent = "✓ Empleado agregado"; msg.className = "mensaje ok";
        document.getElementById("nombre").value = "";
        document.getElementById("pin").value = "";
        seleccion.add = [];
        pintarChips("add");
        cargarEmpleados();
      }
      document.getElementById("btn-agregar").disabled = false;
    }

    function abrirEditar(id) {
      var emp = empleadosCache.find(function(e){ return e.id === id; });
      if (!emp) return;
      editandoId = id;
      document.getElementById("edit-nombre").value = emp.nombre;
      document.getElementById("edit-pin").value = emp.pin;
      document.getElementById("mensaje-editar").className = "mensaje";
      document.getElementById("edit-buscador").value = "";

      seleccion.edit = (emp.edificios || "").split(",").map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 0; });
      pintarChips("edit");
      document.getElementById("edit-sugerencias").classList.remove("visible");
      document.getElementById("modal-editar").classList.add("abierto");
    }

    function cerrarEditar() {
      document.getElementById("modal-editar").classList.remove("abierto");
      editandoId = null;
    }

    async function guardarEdicion() {
      var nombre = document.getElementById("edit-nombre").value.trim();
      var pin = document.getElementById("edit-pin").value.trim();
      var msg = document.getElementById("mensaje-editar");

      if (!nombre || !pin) { msg.textContent = "Escribe el nombre y el PIN."; msg.className = "mensaje error"; return; }
      if (pin.length !== 4 || isNaN(pin)) { msg.textContent = "El PIN debe ser 4 dígitos numéricos."; msg.className = "mensaje error"; return; }
      if (seleccion.edit.length === 0) { msg.textContent = "Agrega al menos un edificio."; msg.className = "mensaje error"; return; }
      var pinExiste = empleadosCache.some(function(e){ return e.pin === pin && e.id !== editandoId; });
      if (pinExiste) { msg.textContent = "Ese PIN ya está en uso por otro empleado."; msg.className = "mensaje error"; return; }

      document.getElementById("btn-guardar-edit").disabled = true;
      msg.textContent = "Guardando..."; msg.className = "mensaje"; msg.style.display = "block";

      const { error } = await db.from("empleados").update({ nombre: nombre, pin: pin, edificios: seleccion.edit.join(", ") }).eq("id", editandoId);

      document.getElementById("btn-guardar-edit").disabled = false;
      if (error) {
        msg.textContent = "Error: " + error.message; msg.className = "mensaje error";
      } else {
        cerrarEditar();
        cargarEmpleados();
      }
    }

    async function eliminarEmpleado(id, nombre, rowEl) {
      const ok = await uiConfirm("¿Eliminar a " + nombre + "? Esta acción no se puede deshacer. (Sus registros de limpieza se conservan.)", { titulo: "Eliminar empleado", textoOk: "Sí, eliminar", peligro: true });
      if (!ok) return;
      const { error } = await db.from("empleados").delete().eq("id", id);
      if (error) { uiToast("No se pudo eliminar: " + error.message, "error"); return; }
      // Quitar de la cache en memoria
      empleadosCache = empleadosCache.filter(function(e){ return e.id !== id; });
      // Quitar solo esa fila, sin recargar (no salta arriba).
      // Si ya no queda ninguna visible, re-render para mostrar el estado vacío correcto.
      if (rowEl && empleadosVisibles().length > 0) {
        rowEl.remove();
        actualizarContadorEmpleados();
      } else {
        renderLista();
      }
    }

    async function cambiarEstado(id, nuevoEstado, rowEl) {
      const { error } = await db.from("empleados").update({ activo: nuevoEstado }).eq("id", id);
      if (error) {
        uiToast("No se pudo cambiar el estado: " + error.message, "error");
        var sw = rowEl ? rowEl.querySelector(".switch input") : null;
        if (sw) sw.checked = !nuevoEstado;  // revertir si falló
        return;
      }
      // Actualizar la cache en memoria
      var emp = empleadosCache.find(function(e){ return e.id === id; });
      if (emp) emp.activo = nuevoEstado;

      if (!rowEl) { renderLista(); return; }
      // Si con el filtro actual la fila ya no debe verse, quitarla; si no, actualizarla en sitio
      if (emp && !coincideFiltro(emp)) {
        rowEl.remove();
      } else {
        rowEl.classList.toggle("emp-inactivo", !nuevoEstado);
      }
      actualizarContadorEmpleados();
    }

    verificarAcceso();
    </script>
</body>
</html>
