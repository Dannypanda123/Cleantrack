<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanTrack — Administración</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --verde: #1D9E75;
      --verde-claro: #EAF3DE;
      --verde-texto: #0F6E56;
      --azul: #185FA5;
      --azul-claro: #E6F1FB;
      --gris-fondo: #F5F4EF;
      --gris-texto: #6B6A64;
      --gris-borde: #E2E0D8;
      --texto: #2C2C2A;
      --blanco: #FFFFFF;
      --rojo: #A32D2D;
      --rojo-claro: #FCEBEB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--gris-fondo);
      color: var(--texto);
      min-height: 100vh;
      padding: 20px;
    }
    .contenedor { max-width: 600px; margin: 0 auto; display: none; }
    .verificando { max-width: 600px; margin: 60px auto; text-align: center; color: var(--gris-texto); font-size: 15px; }

    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .top .marca { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gris-texto); font-weight: 600; }
    .top h1 { font-size: 22px; font-weight: 600; margin-top: 2px; }
    .top-botones { display: flex; gap: 8px; }
    .btn-link { background: transparent; color: var(--azul); border: 1.5px solid var(--azul-claro); padding: 10px 16px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
    .btn-salir { background: transparent; color: var(--gris-texto); border: 1.5px solid var(--gris-borde); padding: 10px 16px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }

    .tarjeta { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    .tarjeta h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

    label { display: block; font-size: 13px; font-weight: 600; color: var(--gris-texto); margin-bottom: 6px; }
    input { width: 100%; padding: 13px; font-size: 16px; border: 1.5px solid var(--gris-borde); border-radius: 12px; margin-bottom: 14px; outline: none; }
    input:focus { border-color: var(--azul); }

    .btn-agregar { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; background: #377D37; color: #fff; }
    .btn-agregar:active { transform: scale(0.98); }
    .btn-agregar:disabled { opacity: 0.6; }

    .empleado { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--gris-borde); }
    .empleado:last-child { border-bottom: none; }
    .emp-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--azul-claro); color: var(--azul); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; flex-shrink: 0; }
    .emp-info { flex: 1; min-width: 0; }
    .emp-nombre { font-size: 15px; font-weight: 600; }
    .emp-pin { font-size: 13px; color: var(--gris-texto); }
    .emp-inactivo .emp-nombre, .emp-inactivo .emp-pin { opacity: 0.45; }

    .switch { position: relative; width: 52px; height: 30px; flex-shrink: 0; cursor: pointer; }
    .switch input { display: none; }
    .switch-track { position: absolute; inset: 0; background: var(--gris-borde); border-radius: 99px; transition: background 0.2s; }
    .switch input:checked + .switch-track { background: #377D37; }
    .switch-thumb { position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .switch input:checked ~ .switch-thumb { transform: translateX(22px); }

    .mensaje { text-align: center; font-size: 13px; margin-top: 12px; padding: 10px; border-radius: 10px; display: none; }
    .mensaje.ok { background: var(--verde-claro); color: var(--verde-texto); display: block; }
    .mensaje.error { background: var(--rojo-claro); color: var(--rojo); display: block; }
    .cargando { text-align: center; color: var(--gris-texto); padding: 20px; font-size: 14px; }
  </style>
</head>
<body>

  <div class="verificando" id="verificando">Verificando sesión...</div>

  <div class="contenedor" id="contenedor">

    <div class="top">
      <div>
        <div class="marca">CleanTrack</div>
        <h1>Administración</h1>
      </div>
      <div class="top-botones">
        <a class="btn-salir" href="inicio.html" style="text-decoration:none; display:inline-block;">← Inicio</a>
        <a class="btn-link" href="dashboard.html">Ver registros</a>
        <button class="btn-salir" onclick="salir()">Salir</button>
      </div>
    </div>

    <div class="tarjeta">
      <h2>Agregar empleado</h2>
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" placeholder="Ej. Ana Torres" />
      <label for="pin">PIN (4 dígitos)</label>
      <input type="text" id="pin" placeholder="Ej. 4892" inputmode="numeric" maxlength="4" />
      <button class="btn-agregar" id="btn-agregar" onclick="agregarEmpleado()">Agregar empleado</button>
      <div class="mensaje" id="mensaje-agregar"></div>
    </div>

    <div class="tarjeta">
      <h2>Empleados</h2>
      <div id="lista-empleados">
        <div class="cargando">Cargando...</div>
      </div>
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://saoirivninhucrkhckaj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_DeKuX1LvrvruEXzfPvumnw_g5N1Jw4k";

    let db = null;
    try {
      const { createClient } = supabase;
      db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
      console.error("No se pudo conectar a Supabase:", e);
    }

    async function verificarAcceso() {
      if (!db) {
        document.getElementById("verificando").textContent = "Sin conexión a la base de datos.";
        return;
      }
      const { data } = await db.auth.getSession();
      if (!data.session) {
        window.location.href = "login.html";
        return;
      }
      document.getElementById("verificando").style.display = "none";
      document.getElementById("contenedor").style.display = "block";
      cargarEmpleados();
    }

    async function salir() {
      if (db) await db.auth.signOut();
      window.location.href = "login.html";
    }

    function iniciales(nombre) {
      var partes = nombre.trim().split(" ");
      if (partes.length === 1) return partes[0].substring(0,2).toUpperCase();
      return (partes[0][0] + partes[partes.length-1][0]).toUpperCase();
    }

    async function cargarEmpleados() {
      var cont = document.getElementById("lista-empleados");
      cont.innerHTML = '<div class="cargando">Cargando...</div>';

      const { data, error } = await db
        .from("empleados")
        .select("*")
        .order("created_at", { ascending: true });

      if (error) {
        cont.innerHTML = '<div class="mensaje error" style="display:block">Error: ' + error.message + '</div>';
        console.error(error);
        return;
      }

      if (!data || data.length === 0) {
        cont.innerHTML = '<div class="cargando">Aún no hay empleados. Agrega el primero arriba.</div>';
        return;
      }

      cont.innerHTML = "";
      data.forEach(function(emp) {
        var div = document.createElement("div");
        div.className = "empleado" + (emp.activo ? "" : " emp-inactivo");
        div.innerHTML =
          '<div class="emp-avatar">' + iniciales(emp.nombre) + '</div>' +
          '<div class="emp-info">' +
            '<div class="emp-nombre">' + emp.nombre + '</div>' +
            '<div class="emp-pin">PIN: ' + emp.pin + ' · ' + (emp.activo ? "Activo" : "Inactivo") + '</div>' +
          '</div>' +
          '<label class="switch">' +
            '<input type="checkbox" ' + (emp.activo ? "checked" : "") + ' onchange="cambiarEstado(' + emp.id + ', this.checked)" />' +
            '<span class="switch-track"></span>' +
            '<span class="switch-thumb"></span>' +
          '</label>';
        cont.appendChild(div);
      });
    }

    async function agregarEmpleado() {
      var nombre = document.getElementById("nombre").value.trim();
      var pin = document.getElementById("pin").value.trim();
      var msg = document.getElementById("mensaje-agregar");

      if (!nombre || !pin) {
        msg.textContent = "Escribe el nombre y el PIN.";
        msg.className = "mensaje error";
        return;
      }
      if (pin.length !== 4 || isNaN(pin)) {
        msg.textContent = "El PIN debe ser 4 dígitos numéricos.";
        msg.className = "mensaje error";
        return;
      }

      document.getElementById("btn-agregar").disabled = true;
      msg.textContent = "Agregando...";
      msg.className = "mensaje";
      msg.style.display = "block";

      const { error } = await db
        .from("empleados")
        .insert([{ nombre: nombre, pin: pin, activo: true }]);

      if (error) {
        msg.textContent = "Error: " + error.message;
        msg.className = "mensaje error";
      } else {
        msg.textContent = "✓ Empleado agregado";
        msg.className = "mensaje ok";
        document.getElementById("nombre").value = "";
        document.getElementById("pin").value = "";
        cargarEmpleados();
      }
      document.getElementById("btn-agregar").disabled = false;
    }

    async function cambiarEstado(id, nuevoEstado) {
      const { error } = await db
        .from("empleados")
        .update({ activo: nuevoEstado })
        .eq("id", id);

      if (error) {
        alert("No se pudo cambiar el estado: " + error.message);
        cargarEmpleados();
      } else {
        cargarEmpleados();
      }
    }

    verificarAcceso();
  </script>
</body>
</html>
