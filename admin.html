<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanTrack — Empleados</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --verde-accion: #377D37;
      --gris-verde-700: #798C81;
      --gris-verde-900: #5F7268;
      --gris-verde-claro: #EAEEEB;
      --verde-claro: #E7F1E7;
      --verde-texto: #2A5F2A;
      --gris-fondo: #ECEBE4;
      --gris-texto: #6B6A64;
      --gris-borde: #E2E0D8;
      --texto: #1F2A37;
      --blanco: #FFFFFF;
      --rojo: #A32D2D;
      --rojo-claro: #FCEBEB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--gris-fondo); color: var(--texto); min-height: 100vh; padding: 20px; }
    .contenedor { max-width: 600px; margin: 0 auto; display: none; }
    .verificando { max-width: 600px; margin: 60px auto; text-align: center; color: var(--gris-texto); font-size: 15px; }

    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .top .marca { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gris-texto); font-weight: 600; }
    .top h1 { font-size: 22px; font-weight: 600; margin-top: 2px; }
    .top-botones { display: flex; gap: 8px; }
    .btn-link { background: transparent; color: var(--gris-verde-900); border: 1.5px solid var(--gris-borde); padding: 10px 16px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
    .btn-salir { background: transparent; color: var(--gris-texto); border: 1.5px solid var(--gris-borde); padding: 10px 16px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }

    .tarjeta { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    .tarjeta h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

    label { display: block; font-size: 13px; font-weight: 600; color: var(--gris-texto); margin-bottom: 6px; }
    input { width: 100%; padding: 13px; font-size: 16px; border: 1.5px solid var(--gris-borde); border-radius: 12px; margin-bottom: 14px; outline: none; }
    input:focus { border-color: var(--gris-verde-700); }

    .edificios-label { margin-bottom: 8px; }
    .edificios-lista { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; max-height: 200px; overflow-y: auto; }
    .check-edificio { display: flex; align-items: center; gap: 10px; padding: 11px 13px; border: 1.5px solid var(--gris-borde); border-radius: 11px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .check-edificio input { width: 18px; height: 18px; margin: 0; accent-color: var(--verde-accion); }
    .check-edificio span { font-size: 14px; }
    .check-edificio.marcado { border-color: var(--verde-accion); background: var(--verde-claro); }
    .sin-edificios { font-size: 13px; color: var(--gris-texto); padding: 10px 0; }

    .btn-agregar { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; background: var(--verde-accion); color: #fff; }
    .btn-agregar:active { transform: scale(0.98); }
    .btn-agregar:disabled { opacity: 0.6; }

    .grupo-edificio { border: 1px solid var(--gris-borde); border-radius: 14px; margin-bottom: 12px; overflow: hidden; background: var(--blanco); }
    .grupo-cabecera { display: flex; align-items: center; gap: 12px; padding: 16px; cursor: pointer; user-select: none; }
    .grupo-cabecera:hover { background: var(--gris-fondo); }
    .grupo-ico { width: 40px; height: 40px; border-radius: 10px; background: var(--gris-verde-claro); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .grupo-ico svg { width: 20px; height: 20px; stroke: #5F7268; }
    .grupo-info { flex: 1; min-width: 0; }
    .grupo-nombre { font-size: 15px; font-weight: 600; }
    .grupo-conteo { font-size: 12px; color: var(--gris-texto); margin-top: 2px; }
    .grupo-flecha { font-size: 14px; color: var(--gris-texto); transition: transform 0.2s; flex-shrink: 0; }
    .grupo-edificio.abierto .grupo-flecha { transform: rotate(90deg); }
    .grupo-cuerpo { display: none; padding: 0 16px 8px; border-top: 1px solid var(--gris-borde); }
    .grupo-edificio.abierto .grupo-cuerpo { display: block; }

    .empleado { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--gris-borde); }
    .empleado:last-child { border-bottom: none; }
    .emp-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--gris-verde-claro); color: var(--gris-verde-900); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; flex-shrink: 0; }
    .emp-info { flex: 1; min-width: 0; }
    .emp-nombre { font-size: 15px; font-weight: 600; }
    .emp-pin { font-size: 13px; color: var(--gris-texto); }
    .emp-inactivo .emp-nombre, .emp-inactivo .emp-pin { opacity: 0.45; }

    .emp-acciones { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-icono { width: 34px; height: 34px; border-radius: 9px; border: 1.5px solid var(--gris-borde); background: var(--blanco); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
    .btn-icono svg { width: 16px; height: 16px; }
    .btn-icono.editar svg { stroke: var(--gris-verde-900); }
    .btn-icono.eliminar svg { stroke: var(--rojo); }
    .btn-icono:active { transform: scale(0.92); }

    .switch { position: relative; width: 48px; height: 28px; flex-shrink: 0; cursor: pointer; }
    .switch input { display: none; }
    .switch-track { position: absolute; inset: 0; background: var(--gris-borde); border-radius: 99px; transition: background 0.2s; }
    .switch input:checked + .switch-track { background: var(--verde-accion); }
    .switch-thumb { position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .switch input:checked ~ .switch-thumb { transform: translateX(20px); }

    .mensaje { text-align: center; font-size: 13px; margin-top: 12px; padding: 10px; border-radius: 10px; display: none; }
    .mensaje.ok { background: var(--verde-claro); color: var(--verde-texto); display: block; }
    .mensaje.error { background: var(--rojo-claro); color: var(--rojo); display: block; }
    .cargando { text-align: center; color: var(--gris-texto); padding: 20px; font-size: 14px; }

    /* Modal de edición */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
    .modal.abierto { display: flex; }
    .modal-caja { background: #fff; border-radius: 18px; padding: 26px; max-width: 420px; width: 100%; margin: auto; }
    .modal-titulo { font-size: 18px; font-weight: 600; margin-bottom: 18px; }
    .modal-botones { display: flex; gap: 10px; margin-top: 6px; }
    .btn-guardar { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; color: #fff; background: var(--verde-accion); }
    .btn-cancelar { flex: 0 0 auto; padding: 14px 20px; border: 1.5px solid var(--gris-borde); border-radius: 12px; background: transparent; color: var(--gris-texto); font-size: 15px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>

  <div class="verificando" id="verificando">Verificando sesión...</div>

  <div class="contenedor" id="contenedor">

    <div class="top">
      <div>
        <div class="marca">CleanTrack</div>
        <h1>Empleados</h1>
      </div>
      <div class="top-botones">
        <a class="btn-salir" href="inicio.html">← Inicio</a>
        <a class="btn-link" href="dashboard.html">Ver registros</a>
        <button class="btn-salir" onclick="salir()">Salir</button>
      </div>
    </div>

    <div class="tarjeta">
      <h2>Agregar empleado</h2>
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" placeholder="Ej. Ana Torres" />
      <label for="pin">PIN (4 dígitos)</label>
      <input type="text" id="pin" placeholder="Ej. 4892" inputmode="numeric" maxlength="4" />
      <label class="edificios-label">Edificios donde trabaja</label>
      <div class="edificios-lista" id="edificios-lista">
        <div class="sin-edificios">Cargando edificios...</div>
      </div>
      <button class="btn-agregar" id="btn-agregar" onclick="agregarEmpleado()">Agregar empleado</button>
      <div class="mensaje" id="mensaje-agregar"></div>
    </div>

    <div class="tarjeta">
      <h2>Empleados por edificio</h2>
      <div id="lista-empleados">
        <div class="cargando">Cargando...</div>
      </div>
    </div>

  </div>

  <!-- MODAL EDITAR -->
  <div class="modal" id="modal-editar">
    <div class="modal-caja">
      <div class="modal-titulo">Editar empleado</div>
      <label for="edit-nombre">Nombre completo</label>
      <input type="text" id="edit-nombre" />
      <label for="edit-pin">PIN (4 dígitos)</label>
      <input type="text" id="edit-pin" inputmode="numeric" maxlength="4" />
      <label class="edificios-label">Edificios donde trabaja</label>
      <div class="edificios-lista" id="edit-edificios-lista"></div>
      <div class="mensaje" id="mensaje-editar"></div>
      <div class="modal-botones">
        <button class="btn-cancelar" onclick="cerrarEditar()">Cancelar</button>
        <button class="btn-guardar" id="btn-guardar-edit" onclick="guardarEdicion()">Guardar cambios</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://saoirivninhucrkhckaj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_DeKuX1LvrvruEXzfPvumnw_g5N1Jw4k";

    let db = null;
    try {
      const { createClient } = supabase;
      db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) { console.error(e); }

    var listaEdificios = [];
    var empleadosCache = [];
    var editandoId = null;

    async function verificarAcceso() {
      if (!db) { document.getElementById("verificando").textContent = "Sin conexión a la base de datos."; return; }
      const { data } = await db.auth.getSession();
      if (!data.session) { window.location.href = "login.html"; return; }
      document.getElementById("verificando").style.display = "none";
      document.getElementById("contenedor").style.display = "block";
      cargarEdificios();
      cargarEmpleados();
    }

    async function salir() {
      if (db) await db.auth.signOut();
      window.location.href = "login.html";
    }

    function iniciales(nombre) {
      var partes = nombre.trim().split(" ");
      if (partes.length === 1) return partes[0].substring(0,2).toUpperCase();
      return (partes[0][0] + partes[partes.length-1][0]).toUpperCase();
    }

    async function cargarEdificios() {
      const { data, error } = await db.from("edificios").select("*").eq("activo", true).order("nombre", { ascending: true });
      var cont = document.getElementById("edificios-lista");
      if (error || !data || data.length === 0) {
        cont.innerHTML = '<div class="sin-edificios">No hay edificios. Crea edificios primero en "Edificios y áreas".</div>';
        listaEdificios = [];
        return;
      }
      listaEdificios = data;
      cont.innerHTML = "";
      data.forEach(function(e) {
        cont.appendChild(crearCasilla(e.nombre, false));
      });
    }

    function crearCasilla(nombreEdificio, marcado) {
      var label = document.createElement("label");
      label.className = "check-edificio" + (marcado ? " marcado" : "");
      label.innerHTML =
        '<input type="checkbox" value="' + nombreEdificio.replace(/"/g, "&quot;") + '" ' + (marcado ? "checked" : "") + ' onchange="this.parentElement.classList.toggle(\'marcado\', this.checked)" />' +
        '<span>' + nombreEdificio + '</span>';
      return label;
    }

    async function cargarEmpleados() {
      var cont = document.getElementById("lista-empleados");
      cont.innerHTML = '<div class="cargando">Cargando...</div>';
      const { data, error } = await db.from("empleados").select("*").order("created_at", { ascending: true });
      if (error) { cont.innerHTML = '<div class="mensaje error" style="display:block">Error: ' + error.message + '</div>'; return; }
      if (!data || data.length === 0) { cont.innerHTML = '<div class="cargando">Aún no hay empleados. Agrega el primero arriba.</div>'; return; }

      empleadosCache = data;

      var grupos = {};
      data.forEach(function(emp) {
        var edificiosEmp = (emp.edificios || "").split(",").map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 0; });
        if (edificiosEmp.length === 0) edificiosEmp = ["Sin edificio asignado"];
        edificiosEmp.forEach(function(ed) {
          if (!grupos[ed]) grupos[ed] = [];
          grupos[ed].push(emp);
        });
      });

      var nombresEdificios = Object.keys(grupos).sort();
      cont.innerHTML = "";
      nombresEdificios.forEach(function(edificio, idx) {
        var emps = grupos[edificio];
        var activos = emps.filter(function(e){ return e.activo; }).length;
        var empsHTML = "";
        emps.forEach(function(emp) {
          empsHTML +=
            '<div class="empleado' + (emp.activo ? "" : " emp-inactivo") + '">' +
              '<div class="emp-avatar">' + iniciales(emp.nombre) + '</div>' +
              '<div class="emp-info">' +
                '<div class="emp-nombre">' + emp.nombre + '</div>' +
                '<div class="emp-pin">PIN: ' + emp.pin + ' · ' + (emp.activo ? "Activo" : "Inactivo") + '</div>' +
              '</div>' +
              '<div class="emp-acciones">' +
                '<button class="btn-icono editar" title="Editar" onclick="abrirEditar(' + emp.id + ')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"></path></svg></button>' +
                '<button class="btn-icono eliminar" title="Eliminar" onclick="eliminarEmpleado(' + emp.id + ', \'' + emp.nombre.replace(/'/g, "\\'") + '\')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>' +
                '<label class="switch">' +
                  '<input type="checkbox" ' + (emp.activo ? "checked" : "") + ' onchange="cambiarEstado(' + emp.id + ', this.checked)" />' +
                  '<span class="switch-track"></span><span class="switch-thumb"></span>' +
                '</label>' +
              '</div>' +
            '</div>';
        });
        var claseAbierto = idx === 0 ? " abierto" : "";
        var grupo = document.createElement("div");
        grupo.className = "grupo-edificio" + claseAbierto;
        grupo.innerHTML =
          '<div class="grupo-cabecera" onclick="this.parentElement.classList.toggle(\'abierto\')">' +
            '<div class="grupo-ico"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"></path><path d="M5 21V7l8-4v18"></path><path d="M19 21V11l-6-4"></path></svg></div>' +
            '<div class="grupo-info">' +
              '<div class="grupo-nombre">' + edificio + '</div>' +
              '<div class="grupo-conteo">' + emps.length + ' empleado' + (emps.length !== 1 ? 's' : '') + ' · ' + activos + ' activo' + (activos !== 1 ? 's' : '') + '</div>' +
            '</div>' +
            '<div class="grupo-flecha">▶</div>' +
          '</div>' +
          '<div class="grupo-cuerpo">' + empsHTML + '</div>';
        cont.appendChild(grupo);
      });
    }

    async function agregarEmpleado() {
      var nombre = document.getElementById("nombre").value.trim();
      var pin = document.getElementById("pin").value.trim();
      var msg = document.getElementById("mensaje-agregar");
      var marcados = [];
      document.querySelectorAll("#edificios-lista input:checked").forEach(function(c){ marcados.push(c.value); });

      if (!nombre || !pin) { msg.textContent = "Escribe el nombre y el PIN."; msg.className = "mensaje error"; return; }
      if (pin.length !== 4 || isNaN(pin)) { msg.textContent = "El PIN debe ser 4 dígitos numéricos."; msg.className = "mensaje error"; return; }
      if (marcados.length === 0) { msg.textContent = "Selecciona al menos un edificio."; msg.className = "mensaje error"; return; }

      // Evitar PIN duplicado
      var pinExiste = empleadosCache.some(function(e){ return e.pin === pin; });
      if (pinExiste) { msg.textContent = "Ese PIN ya está en uso por otro empleado."; msg.className = "mensaje error"; return; }

      document.getElementById("btn-agregar").disabled = true;
      msg.textContent = "Agregando..."; msg.className = "mensaje"; msg.style.display = "block";

      const { error } = await db.from("empleados").insert([{ nombre: nombre, pin: pin, activo: true, edificios: marcados.join(", ") }]);

      if (error) {
        msg.textContent = "Error: " + error.message; msg.className = "mensaje error";
      } else {
        msg.textContent = "✓ Empleado agregado"; msg.className = "mensaje ok";
        document.getElementById("nombre").value = "";
        document.getElementById("pin").value = "";
        document.querySelectorAll("#edificios-lista input:checked").forEach(function(c){ c.checked = false; c.parentElement.classList.remove("marcado"); });
        cargarEmpleados();
      }
      document.getElementById("btn-agregar").disabled = false;
    }

    // ===== EDITAR =====
    function abrirEditar(id) {
      var emp = empleadosCache.find(function(e){ return e.id === id; });
      if (!emp) return;
      editandoId = id;
      document.getElementById("edit-nombre").value = emp.nombre;
      document.getElementById("edit-pin").value = emp.pin;
      document.getElementById("mensaje-editar").className = "mensaje";

      var edificiosEmp = (emp.edificios || "").split(",").map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 0; });
      var cont = document.getElementById("edit-edificios-lista");
      cont.innerHTML = "";
      if (listaEdificios.length === 0) {
        cont.innerHTML = '<div class="sin-edificios">No hay edificios disponibles.</div>';
      } else {
        listaEdificios.forEach(function(e) {
          var marcado = edificiosEmp.indexOf(e.nombre) !== -1;
          cont.appendChild(crearCasilla(e.nombre, marcado));
        });
      }
      document.getElementById("modal-editar").classList.add("abierto");
    }

    function cerrarEditar() {
      document.getElementById("modal-editar").classList.remove("abierto");
      editandoId = null;
    }

    async function guardarEdicion() {
      var nombre = document.getElementById("edit-nombre").value.trim();
      var pin = document.getElementById("edit-pin").value.trim();
      var msg = document.getElementById("mensaje-editar");
      var marcados = [];
      document.querySelectorAll("#edit-edificios-lista input:checked").forEach(function(c){ marcados.push(c.value); });

      if (!nombre || !pin) { msg.textContent = "Escribe el nombre y el PIN."; msg.className = "mensaje error"; return; }
      if (pin.length !== 4 || isNaN(pin)) { msg.textContent = "El PIN debe ser 4 dígitos numéricos."; msg.className = "mensaje error"; return; }
      if (marcados.length === 0) { msg.textContent = "Selecciona al menos un edificio."; msg.className = "mensaje error"; return; }

      // PIN duplicado (excepto él mismo)
      var pinExiste = empleadosCache.some(function(e){ return e.pin === pin && e.id !== editandoId; });
      if (pinExiste) { msg.textContent = "Ese PIN ya está en uso por otro empleado."; msg.className = "mensaje error"; return; }

      document.getElementById("btn-guardar-edit").disabled = true;
      msg.textContent = "Guardando..."; msg.className = "mensaje"; msg.style.display = "block";

      const { error } = await db.from("empleados").update({ nombre: nombre, pin: pin, edificios: marcados.join(", ") }).eq("id", editandoId);

      document.getElementById("btn-guardar-edit").disabled = false;
      if (error) {
        msg.textContent = "Error: " + error.message; msg.className = "mensaje error";
      } else {
        cerrarEditar();
        cargarEmpleados();
      }
    }

    async function eliminarEmpleado(id, nombre) {
      if (!confirm("¿Eliminar a " + nombre + "? Esta acción no se puede deshacer. (Sus registros de limpieza se conservan.)")) return;
      const { error } = await db.from("empleados").delete().eq("id", id);
      if (error) { alert("No se pudo eliminar: " + error.message); return; }
      cargarEmpleados();
    }

    async function cambiarEstado(id, nuevoEstado) {
      const { error } = await db.from("empleados").update({ activo: nuevoEstado }).eq("id", id);
      if (error) alert("No se pudo cambiar el estado: " + error.message);
      cargarEmpleados();
    }

    verificarAcceso();
  </script>
</body>
</html>
