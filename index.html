<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CleanTrack — Registro de área</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --verde: #1D9E75;
      --verde-claro: #EAF3DE;
      --verde-texto: #0F6E56;
      --azul: #185FA5;
      --azul-claro: #E6F1FB;
      --gris-fondo: #F5F4EF;
      --gris-texto: #6B6A64;
      --gris-borde: #E2E0D8;
      --texto: #2C2C2A;
      --blanco: #FFFFFF;
      --rojo: #A32D2D;
      --rojo-claro: #FCEBEB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--gris-fondo);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .app {
      width: 100%;
      max-width: 380px;
      background: var(--blanco);
      border-radius: 24px;
      padding: 28px 24px 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.06);
    }
    .marca {
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gris-texto);
      font-weight: 600;
      margin-bottom: 18px;
    }
    .area-info {
      background: var(--azul-claro);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      margin-bottom: 22px;
    }
    .area-info .nombre { font-size: 18px; font-weight: 600; color: var(--azul); }
    .area-info .edificio { font-size: 13px; color: var(--gris-texto); margin-top: 3px; }

    .label { text-align: center; font-size: 14px; color: var(--gris-texto); margin-bottom: 14px; }
    .label.error { color: var(--rojo); font-weight: 600; }

    .pin-dots { display: flex; gap: 14px; justify-content: center; margin-bottom: 26px; }
    .dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid var(--gris-borde); background: transparent;
      transition: all 0.15s;
    }
    .dot.full { background: var(--azul); border-color: var(--azul); }
    .dot.error { border-color: var(--rojo); background: var(--rojo); }

    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .key {
      aspect-ratio: 1.6;
      border: none;
      border-radius: 14px;
      background: var(--gris-fondo);
      font-size: 22px;
      font-weight: 500;
      color: var(--texto);
      cursor: pointer;
      transition: transform 0.08s, background 0.15s;
    }
    .key:active { transform: scale(0.94); background: var(--gris-borde); }
    .key.accion { background: transparent; font-size: 16px; color: var(--gris-texto); }
    .key:disabled { opacity: 0.4; }

    .pantalla { display: none; }
    .pantalla.activa { display: block; animation: aparecer 0.3s ease; }
    @keyframes aparecer { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .saludo { text-align: center; padding: 6px 0 18px; }
    .circulo {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--verde-claro);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      font-size: 30px;
    }
    .saludo .hola { font-size: 18px; font-weight: 600; }
    .saludo .sub { font-size: 13px; color: var(--gris-texto); margin-top: 2px; }

    .aviso {
      background: #FAEEDA; color: #854F0B;
      border-radius: 12px; padding: 12px 14px;
      font-size: 13px; text-align: center; margin-bottom: 16px;
    }

    .btn {
      width: 100%; padding: 16px;
      border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600;
      cursor: pointer; transition: transform 0.08s, opacity 0.15s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; }
    .btn-verde { background: var(--verde); color: #fff; }
    .btn-azul { background: var(--azul); color: #fff; }
    .btn-fantasma {
      background: transparent; color: var(--gris-texto);
      border: 1.5px solid var(--gris-borde);
      font-weight: 500; font-size: 14px; padding: 13px;
      margin-top: 10px;
    }

    #input-foto { display: none; }

    .preview-foto {
      width: 100%;
      border-radius: 14px;
      margin-bottom: 16px;
      display: none;
      border: 1.5px solid var(--gris-borde);
    }

    .exito-circulo {
      width: 76px; height: 76px; border-radius: 50%;
      background: var(--verde-claro);
      display: flex; align-items: center; justify-content: center;
      margin: 18px auto 18px; font-size: 38px;
    }
    .exito-titulo { text-align: center; font-size: 22px; font-weight: 600; }
    .exito-dato { text-align: center; font-size: 14px; color: var(--gris-texto); margin-top: 4px; }
    .exito-foto {
      width: 100%; border-radius: 14px; margin-top: 18px;
      border: 1.5px solid var(--gris-borde); display: none;
    }
    .siguiente {
      background: var(--gris-fondo); border-radius: 12px;
      padding: 14px; text-align: center; margin-top: 22px;
      font-size: 13px; color: var(--gris-texto);
    }
    .siguiente strong { color: var(--texto); display: block; margin-top: 2px; font-size: 14px; }

    .estado-guardado {
      text-align: center; font-size: 12px; margin-top: 14px;
      padding: 8px; border-radius: 10px;
    }
    .estado-ok { background: var(--verde-claro); color: var(--verde-texto); }
    .estado-error { background: var(--rojo-claro); color: var(--rojo); }
    .estado-cargando { background: var(--azul-claro); color: var(--azul); }
  </style>
</head>
<body>
  <div class="app">

    <div class="pantalla activa" id="p-pin">
      <div class="marca">CleanTrack</div>
      <div class="area-info">
        <div class="nombre" id="area-nombre">Baño Piso 1 — Mujeres</div>
        <div class="edificio" id="area-edificio">Torre Empresarial Norte</div>
      </div>
      <div class="label" id="label-pin">Ingresa tu PIN para registrar</div>
      <div class="pin-dots" id="pin-dots">
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
        <div class="dot" id="dot3"></div>
        <div class="dot" id="dot4"></div>
      </div>
      <div class="keypad" id="keypad">
        <button class="key" onclick="press('1')">1</button>
        <button class="key" onclick="press('2')">2</button>
        <button class="key" onclick="press('3')">3</button>
        <button class="key" onclick="press('4')">4</button>
        <button class="key" onclick="press('5')">5</button>
        <button class="key" onclick="press('6')">6</button>
        <button class="key" onclick="press('7')">7</button>
        <button class="key" onclick="press('8')">8</button>
        <button class="key" onclick="press('9')">9</button>
        <button class="key accion" onclick="borrar()">borrar</button>
        <button class="key" onclick="press('0')">0</button>
        <button class="key accion" style="opacity:0;pointer-events:none">·</button>
      </div>
    </div>

    <div class="pantalla" id="p-confirmar">
      <div class="marca">CleanTrack</div>
      <div class="saludo">
        <div class="circulo">&#128075;</div>
        <div class="hola" id="saludo-nombre">Hola</div>
        <div class="sub" id="saludo-area">Baño Piso 1 — Mujeres</div>
      </div>
      <div class="aviso" id="aviso-foto">&#128247; Hoy se requiere una foto de esta área</div>

      <img class="preview-foto" id="preview-foto" alt="Foto del área" />

      <input type="file" id="input-foto" accept="image/*" capture="environment" onchange="fotoTomada(event)" />

      <button class="btn btn-azul" id="btn-principal" onclick="accionPrincipal()">Tomar foto del área</button>
      <button class="btn btn-fantasma" onclick="registrar(false)">Reportar una incidencia</button>
    </div>

    <div class="pantalla" id="p-exito">
      <div class="marca">CleanTrack</div>
      <div class="exito-circulo">&#9989;</div>
      <div class="exito-titulo">Área registrada</div>
      <div class="exito-dato" id="exito-hora">9:41 am</div>
      <div class="exito-dato" id="exito-area">Baño Piso 1 — Mujeres</div>
      <img class="exito-foto" id="exito-foto" alt="Foto registrada" />
      <div class="estado-guardado" id="estado-guardado"></div>
      <div class="siguiente">
        Siguiente área asignada
        <strong>Pasillo Piso 2</strong>
      </div>
      <button class="btn btn-fantasma" style="margin-top:22px" onclick="reiniciar()">Registrar otra área (reiniciar demo)</button>
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://saoirivninhucrkhckaj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_DeKuX1LvrvruEXzfPvumnw_g5N1Jw4k";

    let db = null;
    try {
      const { createClient } = supabase;
      db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
      console.error("No se pudo conectar a Supabase:", e);
    }

    var datosArea = {
      id: null,
      area: "Cargando área...",
      edificio: ""
    };

    // Leer el ?area= del link del QR y buscar el área en la base de datos
    async function cargarArea() {
      var params = new URLSearchParams(window.location.search);
      var areaId = params.get("area");

      if (!areaId) {
        document.getElementById("area-nombre").textContent = "Área no especificada";
        document.getElementById("area-edificio").textContent = "Escanea un código QR válido";
        return;
      }
      if (!db) return;

      const { data, error } = await db.from("areas").select("*").eq("id", areaId).eq("activa", true).limit(1);

      if (error || !data || data.length === 0) {
        document.getElementById("area-nombre").textContent = "Área no encontrada";
        document.getElementById("area-edificio").textContent = "Verifica el código QR";
        return;
      }

      var a = data[0];
      datosArea.id = a.id;
      datosArea.area = a.nombre;
      datosArea.edificio = a.edificio;
      pideFoto = a.requiere_foto;
      document.getElementById("area-nombre").textContent = a.nombre;
      document.getElementById("area-edificio").textContent = a.edificio;
    }

    var pin = "";
    var empleadoNombre = null;   // Se llena cuando el PIN es válido
    var pideFoto = true;
    var fotoLista = false;
    var fotoDataURL = null;
    var fotoArchivo = null;
    var verificando = false;

    function press(n) {
      if (verificando) return;
      if (pin.length >= 4) return;
      pin += n;
      pintarDots();
      if (pin.length === 4) {
        verificarPin();
      }
    }
    function borrar() {
      if (verificando) return;
      pin = pin.slice(0, -1);
      pintarDots();
    }
    function pintarDots(conError) {
      for (var i = 1; i <= 4; i++) {
        var d = document.getElementById("dot" + i);
        d.classList.toggle("full", pin.length >= i && !conError);
        d.classList.toggle("error", !!conError);
      }
    }

    // ===== VERIFICAR EL PIN CONTRA LA BASE DE DATOS =====
    async function verificarPin() {
      if (!db) {
        mostrarErrorPin("Sin conexión");
        return;
      }
      verificando = true;
      document.getElementById("label-pin").textContent = "Verificando...";
      document.getElementById("label-pin").className = "label";

      try {
        const { data, error } = await db.rpc("verificar_pin", { pin_ingresado: pin });

        if (error) {
          console.error("Error al verificar PIN:", error);
          mostrarErrorPin("Error al verificar. Intenta de nuevo.");
          return;
        }

        if (data && data.length > 0) {
          // PIN válido: guardar el nombre real y continuar
          empleadoNombre = data[0].nombre;
          verificando = false;
          entrar();
        } else {
          // PIN no existe o empleado inactivo
          mostrarErrorPin("PIN no válido");
        }
      } catch (e) {
        console.error(e);
        mostrarErrorPin("Error al verificar. Intenta de nuevo.");
      }
    }

    function mostrarErrorPin(mensaje) {
      pintarDots(true);  // dots en rojo
      var label = document.getElementById("label-pin");
      label.textContent = mensaje;
      label.className = "label error";
      // Borrar el PIN automáticamente después de un instante
      setTimeout(function() {
        pin = "";
        pintarDots();
        verificando = false;
        label.textContent = "Ingresa tu PIN para registrar";
        label.className = "label";
      }, 1200);
    }

    function entrar() {
      var aviso = document.getElementById("aviso-foto");
      var btn = document.getElementById("btn-principal");
      fotoLista = false;
      fotoArchivo = null;
      document.getElementById("preview-foto").style.display = "none";
      // Saludar con el nombre real
      document.getElementById("saludo-nombre").textContent = "Hola, " + empleadoNombre;
      document.getElementById("saludo-area").textContent = datosArea.area;
      if (pideFoto) {
        aviso.style.display = "block";
        btn.textContent = "Tomar foto del área";
      } else {
        aviso.style.display = "none";
        btn.textContent = "Confirmar área limpiada";
      }
      ir("p-confirmar");
    }

    function accionPrincipal() {
      if (!pideFoto) {
        registrar(false);
        return;
      }
      if (!fotoLista) {
        document.getElementById("input-foto").click();
      } else {
        registrar(true);
      }
    }

    function fotoTomada(event) {
      var archivo = event.target.files[0];
      if (!archivo) return;
      fotoArchivo = archivo;
      var lector = new FileReader();
      lector.onload = function(e) {
        fotoDataURL = e.target.result;
        var preview = document.getElementById("preview-foto");
        preview.src = fotoDataURL;
        preview.style.display = "block";
        fotoLista = true;
        document.getElementById("btn-principal").textContent = "Registrar área con esta foto";
        document.getElementById("aviso-foto").style.display = "none";
      };
      lector.readAsDataURL(archivo);
    }

    async function registrar(conFoto) {
      document.getElementById("btn-principal").disabled = true;
      ir("p-exito", conFoto);

      var estado = document.getElementById("estado-guardado");
      estado.className = "estado-guardado estado-cargando";
      estado.textContent = conFoto ? "Subiendo foto..." : "Guardando...";

      if (!db) {
        estado.className = "estado-guardado estado-error";
        estado.textContent = "Sin conexión a la base de datos.";
        document.getElementById("btn-principal").disabled = false;
        return;
      }

      var fotoUrl = null;

      if (conFoto && fotoArchivo) {
        try {
          var nombreArchivo = "foto_" + Date.now() + ".jpg";
          const { data: subida, error: errorSubida } = await db
            .storage.from("fotos")
            .upload(nombreArchivo, fotoArchivo, { contentType: fotoArchivo.type || "image/jpeg" });

          if (errorSubida) {
            estado.className = "estado-guardado estado-error";
            estado.textContent = "Error al subir foto: " + errorSubida.message;
            console.error("Error subida:", errorSubida);
            document.getElementById("btn-principal").disabled = false;
            return;
          }
          const { data: urlData } = db.storage.from("fotos").getPublicUrl(nombreArchivo);
          fotoUrl = urlData.publicUrl;
        } catch (e) {
          estado.className = "estado-guardado estado-error";
          estado.textContent = "Error al subir foto: " + e.message;
          console.error(e);
          document.getElementById("btn-principal").disabled = false;
          return;
        }
      }

      estado.textContent = "Guardando registro...";
      try {
        const { data, error } = await db
          .from("registros")
          .insert([{
            pin_empleado: pin,
            nombre_empleado: empleadoNombre,
            area: datosArea.area,
            edificio: datosArea.edificio,
            con_foto: conFoto,
            foto_url: fotoUrl
          }]);

        if (error) {
          estado.className = "estado-guardado estado-error";
          estado.textContent = "No se pudo guardar: " + error.message;
          console.error("Error al guardar:", error);
        } else {
          estado.className = "estado-guardado estado-ok";
          estado.textContent = conFoto ? "✓ Guardado con foto" : "✓ Guardado en la base de datos";
        }
      } catch (e) {
        estado.className = "estado-guardado estado-error";
        estado.textContent = "Error: " + e.message;
        console.error("Error:", e);
      }

      document.getElementById("btn-principal").disabled = false;
    }

    function ir(id, conFoto) {
      document.querySelectorAll(".pantalla").forEach(function(p){ p.classList.remove("activa"); });
      document.getElementById(id).classList.add("activa");
      if (id === "p-exito") {
        var ahora = new Date();
        var h = ahora.getHours(), m = ahora.getMinutes();
        var ampm = h >= 12 ? "pm" : "am";
        h = h % 12; if (h === 0) h = 12;
        m = m < 10 ? "0" + m : m;
        document.getElementById("exito-hora").textContent = h + ":" + m + " " + ampm;
        var exitoFoto = document.getElementById("exito-foto");
        if (conFoto && fotoDataURL) {
          exitoFoto.src = fotoDataURL;
          exitoFoto.style.display = "block";
        } else {
          exitoFoto.style.display = "none";
        }
      }
    }
    cargarArea();
    function reiniciar() {
      pin = "";
      empleadoNombre = null;
      verificando = false;
      pintarDots();
      document.getElementById("label-pin").textContent = "Ingresa tu PIN para registrar";
      document.getElementById("label-pin").className = "label";
      fotoLista = false;
      fotoDataURL = null;
      fotoArchivo = null;
      document.getElementById("input-foto").value = "";
      document.getElementById("estado-guardado").textContent = "";
      document.getElementById("estado-guardado").className = "estado-guardado";
     
      ir("p-pin");
    }
  </script>
</body>
</html>
