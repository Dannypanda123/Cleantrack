<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanTrack — Soporte</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="idiomas.js"></script>

  <style>
    :root {
      --azul-osc: #0C447C; --azul: #185FA5; --azul-suave: #BBD2EA;
      --verde: #178A65; --verde-claro: #EAF3DE; --verde-texto: #27500A;
      --gris-fondo: #F5F4EF; --gris-texto: #5A6573; --gris-borde: #E2E0D8;
      --texto: #1B2733; --blanco: #FFFFFF; --rojo: #A32D2D; --rojo-claro: #FCEBEB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--gris-fondo); color: var(--texto); min-height: 100vh; }
    .verificando { max-width: 640px; margin: 60px auto; text-align: center; color: var(--gris-texto); font-size: 15px; padding: 0 20px; }
    .contenedor { display: none; }

    /* ===== Cabecera azul ===== */
    .cabecera { background: var(--azul-osc); }
    .cab-inner { max-width: 640px; margin: 0 auto; padding: 18px 20px 22px; }
    .cab-fila { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.16); }
    .barra-marca { display: flex; align-items: center; gap: 9px; }
    .logo-simbolo { height: 30px; width: auto; display: block; }
    .marca-texto { font-family: "Sora", sans-serif; font-size: 18px; font-weight: 600; color: var(--blanco); letter-spacing: -0.01em; }
    .cab-botones { display: flex; gap: 8px; }
    .btn-cab { background: transparent; color: var(--blanco); border: 1.5px solid rgba(255,255,255,0.45); padding: 8px 15px; border-radius: 11px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; font-family: inherit; white-space: nowrap; }
    .btn-cab:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.65); }
    .btn-cab:active { transform: scale(0.97); }
    .cab-titulo { margin-top: 16px; }
    .cab-titulo h1 { font-size: 23px; font-weight: 600; color: var(--blanco); }
    .cab-sub { font-size: 13px; color: var(--azul-suave); margin-top: 3px; }

    /* ===== Cuerpo ===== */
    .main { max-width: 640px; margin: 0 auto; padding: 22px 20px 40px; }

    .buscador-cont { margin-bottom: 22px; position: relative; }
    .buscador-cont .lupa { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; stroke: var(--gris-texto); pointer-events: none; }
    .buscador { width: 100%; padding: 15px 16px 15px 44px; font-size: 16px; border: 1.5px solid var(--gris-borde); border-radius: 14px; outline: none; font-family: inherit; }
    .buscador:focus { border-color: var(--azul); }

    .tarjeta { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 16px; padding: 8px 20px; margin-bottom: 20px; }
    .seccion-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gris-texto); margin: 6px 0 4px; padding: 8px 0; }

    .faq-item { border-bottom: 1px solid var(--gris-borde); }
    .faq-item:last-child { border-bottom: none; }
    .faq-pregunta { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 16px 0; cursor: pointer; font-size: 15px; font-weight: 600; user-select: none; }
    .faq-flecha { color: var(--gris-texto); font-size: 13px; transition: transform 0.2s; flex-shrink: 0; }
    .faq-item.abierto .faq-flecha { transform: rotate(90deg); }
    .faq-respuesta { display: none; padding: 0 0 16px; font-size: 14px; color: var(--gris-texto); line-height: 1.6; }
    .faq-item.abierto .faq-respuesta { display: block; }
    .faq-oculto { display: none; }

    .sin-resultados { text-align: center; color: var(--gris-texto); padding: 24px; font-size: 14px; }

    .form-card { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 16px; padding: 20px; }
    .form-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .form-card .sub { font-size: 13px; color: var(--gris-texto); margin-bottom: 16px; }
    textarea { width: 100%; padding: 13px; font-size: 16px; border: 1.5px solid var(--gris-borde); border-radius: 12px; outline: none; font-family: inherit; resize: vertical; min-height: 90px; margin-bottom: 12px; }
    textarea:focus { border-color: var(--azul); }
    .btn-enviar { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; background: var(--verde); color: #fff; font-family: inherit; }
    .btn-enviar:active { transform: scale(0.98); }
    .btn-enviar:disabled { opacity: 0.6; }
    .mensaje { text-align: center; font-size: 13px; margin-top: 12px; padding: 10px; border-radius: 10px; display: none; }
    .mensaje.ok { background: var(--verde-claro); color: var(--verde-texto); display: block; }
    .mensaje.error { background: var(--rojo-claro); color: var(--rojo); display: block; }

    /* ===================== PC (pantallas anchas) ===================== */
    @media (min-width: 900px) {
      .cab-inner { max-width: 1000px; padding: 20px 32px 24px; }
      .cab-titulo h1 { font-size: 25px; }
      .main { max-width: 1000px; padding: 26px 32px 48px; }
      .buscador-cont { max-width: 560px; }
      .columnas { display: grid; grid-template-columns: 1fr 380px; gap: 22px; align-items: start; }
      .tarjeta { margin-bottom: 0; }
      .col-form { position: sticky; top: 22px; }
    }
  </style>
</head>
<body>

  <div class="verificando" id="verificando">Verificando sesión...</div>

  <div class="contenedor" id="contenedor">

    <header class="cabecera">
      <div class="cab-inner">
        <div class="cab-fila">
          <div class="barra-marca">
            <img src="logo-simbolo.png" alt="" class="logo-simbolo" />
            <span class="marca-texto">CleanTrack</span>
          </div>
          <div class="cab-botones">
            <a class="btn-cab" href="inicio.html" data-i18n="comun.inicio">← Inicio</a>
            <button class="btn-cab" data-i18n-toggle onclick="I18N.toggle()" aria-label="Cambiar idioma">EN</button>
            <button class="btn-cab" onclick="salir()" data-i18n="comun.salir">Salir</button>
          </div>
        </div>
        <div class="cab-titulo">
          <h1 data-i18n="sop.titulo">Centro de ayuda</h1>
          <div class="cab-sub" data-i18n="sop.subtitulo">Preguntas frecuentes y contacto con soporte</div>
        </div>
      </div>
    </header>

    <main class="main">

      <div class="buscador-cont">
        <svg class="lupa" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" class="buscador" id="buscador" data-i18n-ph="sop.buscar" placeholder="Escribe tu duda..." oninput="filtrarFAQ()" />
      </div>

      <div class="columnas">
        <div class="tarjeta">
          <div class="seccion-label" data-i18n="sop.faq_label">Preguntas frecuentes</div>
          <div id="lista-faq"></div>
          <div class="sin-resultados faq-oculto" id="sin-resultados" data-i18n="sop.sin_resultados">No encontramos una respuesta para eso. Envíanos tu pregunta abajo y te ayudaremos.</div>
        </div>

        <div class="form-card col-form">
          <h2 data-i18n="sop.form_titulo">¿No encontraste tu respuesta?</h2>
          <div class="sub" data-i18n="sop.form_sub">Envíanos tu pregunta y la revisaremos</div>
          <textarea id="pregunta" data-i18n-ph="sop.form_ph" placeholder="Escribe tu pregunta aquí..."></textarea>
          <button class="btn-enviar" id="btn-enviar" onclick="enviarPregunta()" data-i18n="sop.enviar">Enviar pregunta</button>
          <div class="mensaje" id="mensaje"></div>
        </div>
      </div>

    </main>

  </div>

  <script>
    // El cliente de Supabase (db) viene de config.js
    var db = window.db;

    var emailUsuario = "";

    async function verificarAcceso() {
      if (!db) { document.getElementById("verificando").textContent = I18N.t("comun.sin_conexion"); return; }
      const { data } = await db.auth.getSession();
      if (!data.session) { window.location.href = "login.html"; return; }
      emailUsuario = data.session.user.email || "";
      document.getElementById("verificando").style.display = "none";
      document.getElementById("contenedor").style.display = "block";
      I18N.aplicar();
      I18N.onChange(function(){ I18N.aplicar(); pintarFAQ(); filtrarFAQ(); });
      pintarFAQ();
    }

    async function salir() {
      if (db) await db.auth.signOut();
      window.location.href = "login.html";
    }

    function pintarFAQ() {
      var cont = document.getElementById("lista-faq");
      cont.innerHTML = "";
      I18N.faq().forEach(function(item, i) {
        var div = document.createElement("div");
        div.className = "faq-item";
        div.setAttribute("data-clave", (item.p + " " + item.clave).toLowerCase());

        var pregunta = document.createElement("div");
        pregunta.className = "faq-pregunta";
        pregunta.addEventListener("click", function() { div.classList.toggle("abierto"); });

        var spanP = document.createElement("span");
        spanP.textContent = item.p;              // texto nuestro, pero por estándar usamos textContent
        var flecha = document.createElement("span");
        flecha.className = "faq-flecha";
        flecha.textContent = "▶";
        pregunta.appendChild(spanP);
        pregunta.appendChild(flecha);

        var respuesta = document.createElement("div");
        respuesta.className = "faq-respuesta";
        respuesta.textContent = item.r;

        div.appendChild(pregunta);
        div.appendChild(respuesta);
        cont.appendChild(div);
      });
    }

    function filtrarFAQ() {
      var texto = document.getElementById("buscador").value.toLowerCase().trim();
      var items = document.querySelectorAll(".faq-item");
      var visibles = 0;
      items.forEach(function(item) {
        var clave = item.getAttribute("data-clave");
        // Coincide si alguna palabra del texto está en la clave
        var palabras = texto.split(" ").filter(function(w){ return w.length > 2; });
        var coincide = texto === "" || palabras.some(function(w){ return clave.indexOf(w) !== -1; });
        if (coincide) { item.classList.remove("faq-oculto"); visibles++; }
        else { item.classList.add("faq-oculto"); }
      });
      document.getElementById("sin-resultados").classList.toggle("faq-oculto", visibles > 0 || texto === "");
    }

    async function enviarPregunta() {
      var pregunta = document.getElementById("pregunta").value.trim();
      var msg = document.getElementById("mensaje");
      if (!pregunta) { msg.textContent = I18N.t("sop.escribe"); msg.className = "mensaje error"; return; }

      document.getElementById("btn-enviar").disabled = true;
      msg.textContent = I18N.t("sop.enviando"); msg.className = "mensaje"; msg.style.display = "block";

      const { error } = await db.from("soporte").insert([{ email_usuario: emailUsuario, pregunta: pregunta, resuelto: false }]);
      document.getElementById("btn-enviar").disabled = false;

      if (error) {
        msg.textContent = I18N.t("sop.error") + error.message; msg.className = "mensaje error";
      } else {
        msg.textContent = I18N.t("sop.ok"); msg.className = "mensaje ok";
        document.getElementById("pregunta").value = "";
      }
    }

    verificarAcceso();
  </script>
</body>
</html>
